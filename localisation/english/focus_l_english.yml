 CHI_focus_2_desc: "黄埔军校军官是新中国不可或缺的一部分，亚洲的统一需要一批读过书的人"
 UP_CHI_pan_asianist_bloc: "Pan-Asianist Faction"
 UP_CHI_pan_asianist_bloc_desc: "The Pan-Asianists believe that endless Sino-Japanese hostility is exhausting East Asia. Diplomacy and economic reconstruction may give Nanjing another path to regional leadership."
 UP_CHI_reconsider_japan_policy: "Reconsider the Japan Question"
 UP_CHI_reconsider_japan_policy_desc: "Two decades of confrontation have weakened East Asia. Is Japan only China's enemy, or a dangerous but necessary partner in a future Asian order?"
 UP_CHI_war_or_peace: "War or Peace?"
 UP_CHI_war_or_peace_desc: "Nanjing will send a reconciliation proposal to Tokyo. Japan's answer will decide whether this road opens a new Asia or collapses as naive fantasy."
 UP_CHI_nanjing_tokyo_joint_declaration: "Nanjing-Tokyo Joint Declaration"
 UP_CHI_nanjing_tokyo_joint_declaration_desc: "A joint declaration will not erase hatred, but it can begin turning the machinery of state toward diplomacy."
 UP_CHI_stop_anti_japanese_propaganda: "End Anti-Japanese Propaganda"
 UP_CHI_stop_anti_japanese_propaganda_desc: "The propaganda organs will be ordered to cool their rhetoric, opening space for a diplomatic thaw."
 UP_CHI_invite_japanese_observers: "Invite Japanese Observers"
 UP_CHI_invite_japanese_observers_desc: "Japanese officers and technical observers will enter Chinese training grounds. Both sides know they will report everything."
 UP_CHI_open_sino_japanese_trade: "Open Sino-Japanese Trade"
 UP_CHI_open_sino_japanese_trade_desc: "Ports, contracts, machines, and freighters will test the real limits of cooperation."
 UP_CHI_joint_development_of_manchuria: "Joint Development of Manchuria"
 UP_CHI_joint_development_of_manchuria_desc: "Manchuria was the core wound of Sino-Japanese conflict. Factories and railways may seal the powder keg for now."
 UP_CHI_sino_japanese_technical_exchange: "Sino-Japanese Technical Exchange"
 UP_CHI_sino_japanese_technical_exchange_desc: "Engineers and railway experts may find a common language before the diplomats do."
 UP_CHI_unify_railway_standards: "Unify Railway Standards"
 UP_CHI_unify_railway_standards_desc: "Railways, depots, and scheduling standards will be brought into common planning."
 UP_CHI_asian_development_bank: "Asian Development Bank"
 UP_CHI_asian_development_bank_desc: "Loans, projects, ports, and trade networks will write Pan-Asian cooperation into the ledger."
 UP_CHI_pan_asianism: "Asia for Asians"
 UP_CHI_pan_asianism_desc: "Nanjing expands the language of reconciliation into Pan-Asianism, touching the foundations of colonial order."
 UP_CHI_oppose_western_imperialism: "Oppose Western Imperialism"
 UP_CHI_oppose_western_imperialism_desc: "Britain, France, and America still dominate sea lanes, colonies, and finance. A new Asia must challenge that order."
 UP_CHI_support_asian_liberation_movements: "Support Asian Liberation Movements"
 UP_CHI_support_asian_liberation_movements_desc: "India, Indochina, Indonesia, and Burma may all become levers of the new order."
 UP_CHI_east_asian_cooperation_council: "East Asian Cooperation Council"
 UP_CHI_east_asian_cooperation_council_desc: "Trade, railways, diplomacy, and security will be placed at the same table."
 UP_CHI_found_east_asian_community: "Found the East Asian Community"
 UP_CHI_found_east_asian_community_desc: "China and Japan will attempt to enter the same faction, transforming rivalry into a larger and more dangerous experiment."
 UP_CHI_joint_military_council: "Joint Military Council"
 UP_CHI_joint_military_council_desc: "The community needs a common military language of training, intelligence, and industry."
 UP_CHI_mutual_defense_treaty: "Mutual Defense Treaty"
 UP_CHI_mutual_defense_treaty_desc: "China and Japan will guarantee each other's independence."
 UP_CHI_new_asian_order: "New Asian Order"
 UP_CHI_new_asian_order_desc: "China and Japan will assume the future of Asia together and end the age of Western domination."
 UP_anti_japanese_propaganda: "Anti-Japanese Propaganda"
 UP_anti_japanese_propaganda_desc: "Long hostility has been written into propaganda, education, and street politics."
 UP_sino_japanese_trade: "Open Sino-Japanese Trade"
 UP_sino_japanese_trade_desc: "Ports, contracts, and freighters are turning political risk into economic reality."
 UP_sino_japanese_technical_exchange: "Sino-Japanese Technical Exchange"
 UP_sino_japanese_technical_exchange_desc: "Technical personnel and blueprints are giving both sides new research experience."
 UP_unified_railway_standards: "Unified Railway Standards"
 UP_unified_railway_standards_desc: "Railways and depots are being standardized for smoother regional logistics."
 UP_asian_development_bank: "Asian Development Bank"
 UP_asian_development_bank_desc: "Loans and industrial contracts are anchoring Pan-Asian cooperation."
 UP_joint_military_council: "Joint Military Council"
 UP_joint_military_council_desc: "The council coordinates limited training and research sharing."
 UP_new_asian_order: "New Asian Order"
 UP_new_asian_order_desc: "The Sino-Japanese community is becoming a new political center in Asia."
 East_Asian_Community: "East Asian Community"
 asian_reconciliation: "Asian Reconciliation"
 anti_western_imperialism: "Anti-Western Imperialism"
 UP_CHI_support_indian_revolution: "Support the Indian Revolution"
 UP_CHI_support_indian_revolution_desc: "Send political funds, propaganda experience, and underground contacts to Indian revolutionaries."
 UP_CHI_support_indochina_independence: "Support Indochinese Independence"
 UP_CHI_support_indochina_independence_desc: "The cracks in French colonial rule are an obvious target for Pan-Asian policy."
 UP_CHI_support_indonesian_nationalism: "Support Indonesian Nationalism"
 UP_CHI_support_indonesian_nationalism_desc: "Nationalists in the southern islands need funds, broadcasts, and recognition."
 UP_CHI_support_burmese_independence: "Support Burmese Independence"
 UP_CHI_support_burmese_independence_desc: "Burma is a key eastern extension of the British imperial system."
 up_asia.140.t: "A Proposal from Nanjing"
 up_asia.140.d: "The revolutionary government in Nanjing has proposed reconciliation through secret channels. Japan must decide whether this is an opportunity, a trap, or a fantasy."
 up_asia.140.a: "Return Taiwan and build a true Asian alliance."
 up_asia.140.b: "Demand recognition of our rights in Manchuria, Tianjin, and Taiwan."
 up_asia.140.c: "Reject these naive fantasies."
 up_asia.141.t: "A New Asian Age Begins"
 up_asia.141.d: "Tokyo has accepted Nanjing's boldest proposal. Taiwan will be returned and the East Asian Community declared."
 up_asia.141.a: "Dangerous, but worth it."
 up_asia.142.t: "Tokyo's Conditions"
 up_asia.142.d: "Japan will continue talks only if China recognizes its existing interests. Nanjing must choose between Pan-Asian ideals and national dignity."
 up_asia.142.a: "For Asia's future, we accept."
 up_asia.142.b: "China will never sell its territory."
 up_asia.143.t: "Tokyo Rejects Reconciliation"
 up_asia.143.d: "Japan has rejected Nanjing's proposal, calling it a diplomatic illusion of the revolutionary regime."
 up_asia.143.a: "Then let them remember this decision."
 UP_CHI_victory_of_revolution: "Victory of the Revolution"
 UP_CHI_victory_of_revolution_desc: "Nanjing has proven that the old order can be defeated. Now the revolution must learn to govern China."
 UP_CHI_consolidate_central_government: "Consolidate the Central Government"
 UP_CHI_consolidate_central_government_desc: "The revolutionary league must build taxation, railways, military administration, and cadres."
 UP_CHI_revolution_still_unfinished: "The Revolution Is Not Finished"
 UP_CHI_revolution_still_unfinished_desc: "Southwest China, South China, the Northwest, Xinjiang, Tibet, and Manchuria remain outside full central authority."
 UP_CHI_chinese_unification_war: "Chinese Unification War"
 UP_CHI_chinese_unification_war_desc: "Not every negotiation begins with war, but every negotiation must feel the weight of the Revolutionary Army."
 UP_CHI_southwest_question: "The Republic of China Question"
 UP_CHI_southwest_question_desc: "The Chongqing remnant government remains entangled with regional forces. Nanjing will handle this political question separately."
 UP_CHI_unlock_southwest_decisions_tt: "Unlocks §YRepublic of China unification decisions§!."
 UP_CHI_remaining_warlords_question: "The Remaining Warlords Question"
 UP_CHI_remaining_warlords_question_desc: "South China, the Northwest, Xinjiang and Tibet still retain different forms of local autonomy. Nanjing will handle them through one shared unification process."
 UP_CHI_unlock_remaining_warlords_decisions_tt: "Unlocks §YSouth China, Northwest, Xinjiang and Tibet unification decisions§!. These decisions may be advanced together or handled separately."
 UP_CHI_manchurian_question_unification: "The Manchurian Question"
 UP_CHI_manchurian_question_unification_desc: "Manchuria requires political preparation before Nanjing can choose peace or force."
 UP_CHI_northeast_revolutionary_committee: "Northeast Revolutionary Committee"
