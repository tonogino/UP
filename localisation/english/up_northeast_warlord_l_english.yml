 UP_JAP_plot_zhang_zuolin_assassination: "Plot to Kill Zhang Zuolin"
 UP_JAP_plot_zhang_zuolin_assassination_desc: "The Kwantung Army and hardliners in Tokyo prepare to remove Zhang Zuolin, now seen as an unreliable Northeastern player. The plot will first alarm Fengtian; if the Northeast refuses to yield, Japan must decide whether to execute the Huanggutun operation."
 up_japan.20.t: "The Huanggutun Plot"
 up_japan.20.d: "Fengtian has rejected Tokyo's pressure, and Zhang Zuolin has begun clearing Japanese influence from the Northeastern Army and railway system. Some in the Kwantung Army argue that the Northeast can no longer be handled through negotiation."
 up_japan.20.a: "Authorize the Kwantung Army operation."
 up_japan.20.b: "Suppress the plot for now."
 up_japan.20.c: "Expand the Fengtian intelligence network first."
 up_japan.24.t: "Zhang Zuolin Is Dead"
 up_japan.24.d: "The explosion at Huanggutun has killed Zhang Zuolin. Fengtian is shaken, and Zhang Xueliang is forced to inherit his father's army. Tokyo has gained an opening, but also created a new Northeast filled with hatred."
 up_japan.24.a: "Manchuria is open."
 up_japan.25.t: "The Huanggutun Operation Fails"
 up_japan.25.d: "The Kwantung Army's bomb failed to kill Zhang Zuolin. Fengtian has sealed the scene, begun purging railway guards and Japanese advisers, and badly damaged Tokyo's network in the Northeast."
 up_japan.25.a: "This will be difficult to contain."
 UP_JAP_second_918_incident: "A Second September 18th Incident"
 UP_JAP_second_918_incident_desc: "A second September 18th Incident is part of the Showa integrated cabinet's new strategy. It will reshape the empire's balance between finance, the army, the navy, and continental policy."
 up_japan.30.t: "A Second September 18th"
 up_japan.30.d: "Japanese representatives deliver an ultimatum demanding that the Northeastern Army recognize Japan's special position in railway, settler, and security affairs. Fengtian understands the choice: accept and become a Tokyo-protected regime, or refuse and face war."
 up_japan.30.a: "The Northeast will not yield."
 up_japan.30.b: "Accept Japanese protection."
 up_xic.9.t: "Tokyo's Dark Hint"
 up_xic.9.d: "Japanese representatives and pro-Japanese officers bring an ambiguous but dangerous message: if Fengtian yields railway, security, and military appointments, Tokyo may continue to recognize Zhang Zuolin's position. The Old Marshal quickly understands that this is not negotiation, but a threat."
 up_xic.9.a: "The Northeast is no one's pawn."
 up_xic.10.t: "Resolving the Huanggutun Plot"
 up_xic.10.d: "The Huanggutun plot is being resolved."
 up_xic.11.t: "The Old Marshal Survives"
 up_xic.11.d: "The explosion tears through the tracks near Huanggutun, but Zhang Zuolin is not dead. His guard altered the route in time, and Japanese agents inside the railway and advisory network are exposed one by one. The old balancing game is over."
 up_xic.11.a: "This time, Fengtian sees the enemy clearly."
 up_xic.12.t: "Zhang Zuolin Assassinated"
 up_xic.12.d: "The Huanggutun explosion shocks China. Zhang Zuolin is dead, and the Northeastern Army's succession accelerates overnight. For Nanjing, the Northeast may become a new anti-Japanese partner, or slide into a more dangerous chaos."
 up_xic.12.a: "Watch the Northeast closely."
 up_xic.13.t: "Zhang Zuolin Survives Huanggutun"
 up_xic.13.d: "News from Fengtian says Zhang Zuolin survived the Huanggutun explosion and has begun dismantling Japan's covert lines in the Northeast. A Northeast still led by the Old Marshal, now fully alert to Japan, may change the balance beyond the Pass."
 up_xic.13.a: "This changes the Northeast."
 up_xic.14.t: "The Old Marshal Hands Over Power"
 up_xic.14.d: "Zhang Zuolin survived Huanggutun, but his era has cracked. To steady the army, win younger officers, and face Japan, the Old Marshal transfers more authority to Zhang Xueliang."
 up_xic.14.a: "The Young Marshal takes up the Northeast."
 up_xic.15.t: "The Young Marshal Takes Command"
 up_xic.15.d: "Zhang Xueliang formally takes power before Fengtian's military and political leadership. Whether the Old Marshal died in the blast or the old Fengtian order can no longer endure, the Northeast has entered the Young Marshal's era."
 up_xic.15.a: "The new Fengtian must survive."
 up_xic.16.t: "Reopening the Shadow of Huanggutun"
 up_xic.16.d: "Fengtian reopens the Huanggutun files. Whether the blast killed the Old Marshal or not, Japan's plot in the Northeast has been exposed, and the old balance can never be restored."
 up_xic.16.a: "Collect the evidence and prepare the next step."
 UP_XIC_china_fengtian_agreement_spirit: "China-Fengtian Agreement"
 UP_XIC_china_fengtian_agreement_spirit_desc: "Fengtian recognizes China's anti-Japanese order while the Chinese center recognizes Northeastern autonomy and its special contribution."
 UP_XIC_tokyo_marshalate_supreme_spirit: "Tokyo Marshalate"
 UP_XIC_tokyo_marshalate_supreme_spirit_desc: "After Fengtian's banner rises over Tokyo, the Northeastern military government gains unmatched prestige, resources, and strategic depth."
 up_xic.17.t: "The Choice Beyond the Pass"
 up_xic.17.d: "The shots at Lugou Bridge have reached Fengtian. Whether the Northeastern Army is ready or not, war between Japan and China forces the Northeast to choose its road."
 up_xic.17.a: "United against Japan."
 up_xic.17.b: "Stand alone."
 up_xic.17.c: "Not a shot fired."
 up_xic.18.t: "The Tokyo Postwar Settlement"
 up_xic.18.d: "Japan has yielded. Using the fall of Tokyo and the Northeastern Army's record as leverage, Fengtian receives Tokyo, Hokkaido, and the homeland beyond the Pass."
 up_xic.18.a: "This is Fengtian's victory."
 up_xic.19.t: "The Tokyo Marshalate"
 up_xic.19.d: "The Zhang marshalate establishes a temporary office in Tokyo. It is both a symbol of victory and a declaration that Fengtian has become an East Asian power."
 up_xic.19.a: "From Fengtian to Tokyo."
 up_xic.20.t: "The Japan-Fengtian Integration Plan"
 up_xic.20.d: "Tokyo demands that Fengtian bind its railways, resources, military, and administration more tightly to the Japanese imperial system. A partner state may remain in name, but the real question is how much autonomy Fengtian can keep."
 up_xic.20.a: "Preserve Fengtian autonomy."
 up_xic.20.b: "Establish a Manchurian Harmony Government."
 up_xic.20.c: "Accept direct control from Tokyo."
 up_xic.21.t: "Japanese Advisers Interfere with Command"
 up_xic.21.d: "Japanese military advisers have begun moving beyond training duties and interfering directly with Northeastern Army deployments, organization, and arms allocation. Accepting this will bring experience, but limiting them will anger Tokyo."
 up_xic.21.a: "Use their experience for now."
 up_xic.21.b: "Restrict the advisers' authority."
 up_xic_news.1.t: "The Northeastern Army Receives Tokyo and Hokkaido"
 up_xic_news.1.d: "After Japan's surrender, the Northeastern Army has used its occupation of Tokyo to receive Tokyo, Hokkaido, and the Northeast homeland. Fengtian's victory speech shakes East Asia and cracks the old order."
 up_xic_news.1.a: "East Asia has changed."
 UP_XIC_mantetsu_privilege_expanded: "Expanded Mantetsu Privileges"
 UP_XIC_mantetsu_privilege_expanded_desc: "Mantetsu gains wider railway and construction privileges. The Northeast develops faster, but Japanese capital sinks deeper beyond the Pass."
 UP_XIC_japanese_advisory_mission: "Japanese Military Advisory Mission"
 UP_XIC_japanese_advisory_mission_desc: "Japanese advisers help train and reorganize the Northeastern Army while attempting to influence Fengtian's command system."
 UP_XIC_anshan_joint_development: "Japan-Fengtian Anshan Development Company"
 UP_XIC_anshan_joint_development_desc: "Anshan steel is jointly developed by Fengtian and Japanese capital, improving output while expanding Japanese economic influence."
 UP_XIC_kwantung_garrison_spirit: "Kwantung Army Garrison"
 UP_XIC_kwantung_garrison_spirit_desc: "The Kwantung Army receives garrison rights, improving short-term security while weakening Fengtian's political autonomy."
 UP_XIC_fengtian_special_partner_spirit: "Fengtian Special Partner State"
 UP_XIC_fengtian_special_partner_spirit_desc: "Fengtian remains within Japan's strategic system as a special partner, gaining industrial aid and limited autonomy."
 UP_XIC_japan_fengtian_integrated_autonomy: "Japan-Fengtian Integration"
 UP_XIC_japan_fengtian_integrated_autonomy_desc: "Fengtian keeps an autonomous shell, but its railways, resources, and armaments are deeply tied to Japanese strategy."
 UP_XIC_japan_fengtian_harmony_government: "Manchurian Harmony Government"
 UP_XIC_japan_fengtian_harmony_government_desc: "Pro-Japanese bureaucrats take greater administrative control, further reducing old Fengtian autonomy."
 UP_XIC_northeast_army_reorganization: "Northeastern Army Reorganization"
 UP_XIC_northeast_army_reorganization_desc: "The Northeastern Army clears away old formations, standardizes training, and restores command efficiency."
