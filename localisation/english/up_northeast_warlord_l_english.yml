 UP_XIC_focus_170_desc: "The Fengtian government pursues this policy as part of its struggle to secure the future of the Northeast."
 UP_XIC_focus_189: "Guide the Imperial Army"
 UP_XIC_focus_189_desc: "Fengtian openly cooperates with Japan, aiding security operations and opening the road into China, though many officers remain uneasy."
 UP_XIC_focus_246: "Reform Fengtian Finances"
 UP_XIC_focus_246_desc: "Old warlord finances must be cleaned up if Fengtian is to support both industry and the army."
 UP_XIC_focus_267: "Northeastern Military Academy"
 UP_XIC_focus_267_desc: "The Fengtian government pursues this policy as part of its struggle to secure the future of the Northeast."
 UP_XIC_focus_176: "Accept the People's Republic's Rule"
 UP_XIC_focus_176_desc: "Fengtian accepts the authority of the People's Republic in the anti-Japanese struggle in exchange for special autonomy and military aid."
 UP_XIC_focus_184: "Self-Reliance"
 UP_XIC_focus_184_desc: "With no reliable aid from Tokyo, Beijing, or the West, the Northeast must survive on its own arsenals, steel, grain, and rail workers."
 UP_XIC_focus_135: "The Future Beyond the Pass"
 UP_XIC_focus_135_desc: "The Fengtian government pursues this policy as part of its struggle to secure the future of the Northeast."
 UP_XIC_focus_247: "Expand the Fengtian Arsenal"
 UP_XIC_focus_247_desc: "The Fengtian Arsenal is the heart of the Northeastern Army. As long as it runs, the army is not wholly dependent on foreign guns."
 UP_XIC_focus_256: "Harbin Machine Works"
 UP_XIC_focus_256_desc: "Harbin can become more than a northern entrepot; it can serve as an industrial and repair center for the whole Northeast."
 UP_XIC_focus_250: "Expand Anshan Heavy Industry"
 UP_XIC_focus_250_desc: "Anshan's mines and steelworks will become the backbone of Northeastern heavy industry."
 UP_XIC_focus_269: "Northeastern Military Academy"
 UP_XIC_focus_269_desc: "The Fengtian government pursues this policy as part of its struggle to secure the future of the Northeast."
 UP_XIC_focus_270: "Northeastern Artillery Tradition"
 UP_XIC_focus_270_desc: "The Fengtian government pursues this policy as part of its struggle to secure the future of the Northeast."
 UP_XIC_focus_180: "Victory of the Northeastern People"
 UP_XIC_focus_180_desc: "The anti-Japanese struggle belongs not only to Fengtian officers, but also to rail workers, villagers, and every defender of the homeland."
 UP_XIC_focus_190: "Stab Japan in the Back"
 UP_XIC_focus_190_desc: "When Japan is weakened, Fengtian tears away the mask of cooperation and launches its prepared betrayal."
 UP_XIC_focus_193: "Serve as Loyal Collaborationists"
 UP_XIC_focus_193_desc: "Fengtian accepts deeper Japanese control in return for stability, arms, and the survival of its nominal government."
 UP_XIC_focus_140: "Independence Beyond the Pass"
 UP_XIC_focus_140_desc: "Zhang Zuolin will no longer balance endlessly between Tokyo, Nanjing, and Russian remnants. The Northeast must be its own master."
 UP_XIC_focus_142: "Tokyo-Fengtian Agreement"
 UP_XIC_focus_142_desc: "Fengtian accepts Japanese guarantees and investment, but opens its railways, mines, and military system to Tokyo in return."
 UP_XIC_focus_252: "Standardized Northeastern Rifles"
 UP_XIC_focus_252_desc: "A unified rifle standard will turn the Northeastern Army from a patchwork warlord force into something closer to a national army."
 UP_XIC_focus_258: "Northeast Railway Administration"
 UP_XIC_focus_258_desc: "The Northeast is stitched together by rail. Without railways, Fengtian cannot move troops, grain, or steel."
 UP_XIC_focus_254: "Fushun Mines and Power Grid"
 UP_XIC_focus_254_desc: "Steel needs coal, and arsenals need electricity. Fushun will power the next stage of Northeastern industry."
 UP_XIC_focus_273: "Harbin Winter Training"
 UP_XIC_focus_273_desc: "The Fengtian government pursues this policy as part of its struggle to secure the future of the Northeast."
 UP_XIC_focus_178: "Restore the Great Qing"
 UP_XIC_focus_178_desc: "Conservatives seek to restore order through imperial symbols, though it remains unclear whether restoration can master Northeastern realities."
 UP_XIC_focus_195: "Counterattack the Japanese General Headquarters"
 UP_XIC_focus_195_desc: "The counteroffensive crosses Liaodong and Korea, carrying the war toward Japan's military center."
 UP_XIC_focus_215: "Expand the Manchurian Collaboration Army"
 UP_XIC_focus_215_desc: "The collaboration army is expanded into a larger security and auxiliary force, further reducing Northeastern autonomy."
 UP_XIC_focus_149: "Purge Japanese Advisers"
 UP_XIC_focus_149_desc: "Japanese advisers, railway guards, company men, and intelligence agents have become too entangled with Northeastern affairs."
 UP_XIC_focus_148: "Reject Mantetsu Expansion"
 UP_XIC_focus_148_desc: "Mantetsu is more than a railway company; it is the nervous system of Japanese influence in the Northeast."
