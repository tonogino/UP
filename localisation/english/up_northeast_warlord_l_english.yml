 UP_XIC_focus_152: "Reclaim Railway Security Rights"
 UP_XIC_focus_152_desc: "Railways are the arteries of the Northeast. Fengtian must reclaim security authority over them from Japan."
 UP_XIC_focus_220: "Japanese Military Advisory Mission"
 UP_XIC_focus_220_desc: "The Fengtian government pursues this policy as part of its struggle to secure the future of the Northeast."
 UP_XIC_focus_264: "War Industry Beyond the Pass"
 UP_XIC_focus_264_desc: "The Fengtian Arsenal, Anshan steel, Fushun coal, Harbin machinery, Northeastern railways, and Dalian docks form a real war industry."
 UP_XIC_focus_233: "White Mountains and Black Waters Return to China"
 UP_XIC_focus_233_desc: "After the shared anti-Japanese struggle, the Northeast and the Chinese center must decide the final place of the white mountains and black waters."
 UP_XIC_focus_208: "Restore Banner Symbols"
 UP_XIC_focus_208_desc: "Old banners, cavalry traditions, and frontier loyalties are repackaged as tools of mobilization."
 UP_XIC_focus_240: "Improve the Northeastern Judicial System"
 UP_XIC_focus_240_desc: "The Fengtian government pursues this policy as part of its struggle to secure the future of the Northeast."
 UP_XIC_focus_231: "Deliver the Victory Speech"
 UP_XIC_focus_231_desc: "Japan has surrendered, and the Northeastern Army controls Tokyo, Hokkaido, and the homeland beyond the Pass. Fengtian will announce its victory."
 UP_XIC_focus_154: "Fengtian National Defense Committee"
 UP_XIC_focus_154_desc: "Fengtian no longer pretends peace can last forever. A defense committee will coordinate railways, arsenals, border troops, and local security."
 UP_XIC_focus_223: "Jointly Develop Anshan Steel"
 UP_XIC_focus_223_desc: "The Fengtian government pursues this policy as part of its struggle to secure the future of the Northeast."
 UP_XIC_focus_210: "Manchurian New Policies"
 UP_XIC_focus_210_desc: "New policies attempt to give the restored regime the administrative and industrial shell of a modern state."
 UP_XIC_focus_242: "Expand Anshan Infrastructure"
 UP_XIC_focus_242_desc: "The Fengtian government pursues this policy as part of its struggle to secure the future of the Northeast."
 UP_XIC_focus_238: "Marshal in Tokyo"
 UP_XIC_focus_238_desc: "From Fengtian to Tokyo, the Marshal's headquarters will proclaim an unprecedented new order."
 UP_XIC_focus_156: "Expand the Fengtian Arsenal"
 UP_XIC_focus_156_desc: "The Northeast cannot rely on Japanese arms to defend itself. The Fengtian Arsenal must expand under its own control."
 UP_XIC_focus_160: "Tokyo's Ultimatum"
 UP_XIC_focus_160_desc: "Tokyo demands that Fengtian abandon its independence drive and accept stricter supervision."
