 UP_XIC_focus_244: "Independent State Beyond the Pass"
 UP_XIC_focus_244_desc: "Independence beyond the Pass is no longer a temporary pose; the Northeast will face the powers as a state of its own."
 UP_XIC_focus_158: "Modernize the Northeastern Army"
 UP_XIC_focus_158_desc: "The Fengtian Army can no longer remain an old-style warlord force in a changing Asia."
