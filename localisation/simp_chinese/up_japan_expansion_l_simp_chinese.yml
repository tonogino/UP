 up_japan.50.t: "满洲皇统的利用价值"
 up_japan.50.d: "关于满洲未来秩序的争论终于摆上御前会议。溥仪与爱新觉罗皇统既可能成为帝国统治东北的合法性工具，也可能成为军管道路上的累赘。统制派主张让这个旧皇统为东京服务，皇道派则看见了另一种帝国神话。"
 up_japan.50.a: "扶持溥仪作为满洲象征"
 up_japan.50.b: "只把他当作宣传工具"
 up_japan.50.c: "满洲不需要皇帝"
 up_japan.51.t: "白军清剿经费不足"
 up_japan.51.d: "远东清剿行动本该是一场快速的治安战，但财政赤字让补给、薪饷和地方收买同时陷入迟滞。白军残党开始学会等待日本预算崩溃的那一天。"
 up_japan.51.a: "账本比步枪更令人头疼。"
 up_japan.52.t: "日本要求建立蒙古军政府"
 up_japan.52.d: "东京提出了一份最后通牒：蒙古边疆应接受日本保护，并组建亲日军政府以稳定北方边境。接受意味着屈从，拒绝则意味着战争。"
 up_japan.52.a: "接受保护。"
 up_japan.52.b: "拒绝东京。"
 up_japan.53.t: "沧海一统"
 up_japan.53.d: "从马六甲到巴达维亚，从台湾到菲律宾，帝国舰队终于将南方资源地带连成一条完整的海上命脉。旧殖民帝国的商港、矿山与总督府已经退潮，日本不再只是大陆边缘的岛帝国，而是四海秩序的制定者。"
 up_japan.53.a: "四海归于皇国。"
 up_japan.53.b: "南洋必须偿还帝国的血债。"
 up_japan.53.c: "让财阀接管航线。"
 up_japan.54.t: "皇军抵达欧亚之门"
 up_japan.54.d: "高加索的山脊出现在参谋本部的地图中央。石油、铁路、冻土与神话在这里交汇，帝国必须决定这场远征究竟是为资源而来，还是为皇道而来。"
 up_japan.54.a: "为了石油。"
 up_japan.54.b: "为了皇道。"
 up_japan.55.t: "八纮北境"
 up_japan.55.d: "从海参崴到赤塔，从外贝加尔到伊尔库茨克，皇军的军靴踏过了曾被视为帝国负担的冻土。北方不再只是赤字、铁路和叛乱的代名词。它成为皇国的边墙、军队的试炼场，也是昭和日本向大陆尽头投下的影子。"
 up_japan.55.a: "北方即皇国之壁。"
 up_japan.55.b: "北方即皇国之剑。"
 up_japan.55.c: "北方必须自己供养自己。"
