 up_japan.10.t: "御前会议召开"
 up_japan.10.d: "首相、陆海军大臣、宫内省代表与财政官僚齐聚御前。远东胜利的账单、满洲的诱惑、南洋的资源线与北方军人的野心同时摆上会议桌。自今日起，帝国的方向不再由某一个机关单独决定。"
 up_japan.10.a: "帝国必须作出选择。"
 up_japan.30.t: "九一八再现"
 up_japan.30.d: "日本代表递交最后通牒，要求东北军承认日本在铁路、侨民与安全事务上的特殊地位。奉天的空气凝固了：接受意味着成为东京保护下的政权，拒绝则意味着战争。"
 up_japan.30.a: "接受日本保护。"
 up_japan.30.b: "东北不能屈服。"
 up_japan.31.t: "日本提议合力清剿剩余势力"
 up_japan.31.d: "东京提出合作方案，希望南京与日本共同清剿仍在抵抗的地方势力。接受提议能换来日本承认与军事协助，也意味着中国将被卷入日本主导的战略体系。"
 up_japan.31.a: "暂时合作。"
 up_japan.31.b: "拒绝日本人的陷阱。"
