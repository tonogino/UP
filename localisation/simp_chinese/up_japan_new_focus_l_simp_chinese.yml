 up_japan.40.t: "帕奈号事件"
 up_japan.40.d: "长江上的枪声让美国人的名字突然出现在御前会议桌上。海军部坚持这是战区混乱下的误击，强硬派则认为华中水道不该容许任何外来旗帜干涉帝国行动。"
 up_japan.40.a: "道歉并赔偿。"
 up_japan.40.b: "拒绝低头。"
 up_japan.41.t: "珍珠港作战案"
 up_japan.41.d: "联合舰队提交了完整的太平洋第一击计划。若奇袭成功，美国太平洋舰队将在战争最初阶段陷入混乱；若失败，日本将把整个帝国押上赌桌。"
 up_japan.41.a: "执行奇袭。"
 up_japan.41.b: "有限打击菲律宾与关岛。"
 up_japan.41.c: "取消计划，转入防御。"
 up_japan.42.t: "卢沟桥事变"
 up_japan.42.d: "华北的枪声把大陆战略推到临界点。参谋本部提出有限冲突方案，陆军强硬派则要求趁势发动全面战争。"
 up_japan.42.a: "控制冲突规模。"
 up_japan.42.b: "全面战争不可避免。"
 up_japan.43.t: "二十一条要求"
 up_japan.43.d: "日本递交了一组苛刻要求：资源、通行、顾问与贸易特权。接受会暂时避免战争，拒绝则会给东京一个进军理由。"
 up_japan.43.a: "暂时让步。"
 up_japan.43.b: "中国不会再接受这种条约。"
