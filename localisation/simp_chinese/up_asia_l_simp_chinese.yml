 UP_CHI_integrate_bandits_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_chinese_tanks: "中国坦克"
 UP_CHI_chinese_tanks_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_self_propelled_artillery: "自行火炮"
 UP_CHI_self_propelled_artillery_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_secret_contact_zhang_guotao: "秘密接触张国焘"
 UP_CHI_secret_contact_zhang_guotao_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_dare_to_die_corps: "敢死队"
 UP_CHI_dare_to_die_corps_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_whampoa_graduates_gathering: "黄埔优秀毕业生聚会（林彪成为法西斯政治顾问）"
 UP_CHI_whampoa_graduates_gathering_desc: "黄埔毕业生重新进入南京的军政网络。林彪被推到台前，成为青年军官、空军建设派和强硬民族主义者都能暂时接受的人选。"
 UP_CHI_fighters_among_tigers: "老虎中的战斗机"
 UP_CHI_fighters_among_tigers_desc: "空军学校将优先培养战斗机飞行员。夺取制空权比地面上的每一次胜利都更难，也更昂贵。"
 UP_CHI_tigers_in_the_sky: "天上的老虎"
 UP_CHI_tigers_in_the_sky_desc: "新的中国空军需要自己的神话。训练场、航校和维修厂将被纳入同一套现代化计划。"
 UP_CHI_support_planes_among_tigers: "老虎中的支援机"
 UP_CHI_support_planes_among_tigers_desc: "中国的战场辽阔而破碎，支援机能把前线指挥官的命令变成更直接的火力。"
 UP_CHI_whampoa_air_force_academy: "黄埔空军学院"
 UP_CHI_whampoa_air_force_academy_desc: "黄埔系不愿让空军成为独立山头。新的空军学院会把飞行员教育、政治审查和军官团忠诚绑定在一起。"
 UP_CHI_plot_to_assassinate_mao: "密谋刺杀毛泽东（解锁决议）"
 UP_CHI_plot_to_assassinate_mao_desc: "黄埔系将开始策划针对毛泽东的行动。完成后会解锁刺杀决议，初始成功率为50%。"
 UP_CHI_rebuild_blue_shirts: "重建蓝衣社"
 UP_CHI_rebuild_blue_shirts_desc: "蓝衣社重新建立。它会提高刺杀成功率，但也会带来稳定度损失和政治极化。"
 UP_CHI_juntong_system: "军统系统"
 UP_CHI_juntong_system_desc: "军统系统将成为黄埔线的情报中枢。完成后若拥有相关功能会自动建立情报部门，并解锁戴笠顾问。"
 UP_CHI_direct_armed_seizure: "直接武装夺权（直接开启内战）"
 UP_CHI_direct_armed_seizure_desc: "放弃阴谋路线，直接动员黄埔军官和地方部队发动武装夺权。刺杀决议将立刻关闭。"
 UP_CHI_assassination_failed: "刺杀行动失败"
 UP_CHI_assassination_failed_desc: "刺杀失败后的路线国策。黄埔系必须在肃清和反扑中保住自己的网络。"
 UP_CHI_assassination_success: "刺杀行动圆满成功"
 UP_CHI_assassination_success_desc: "刺杀成功后的路线国策。林彪将作为过渡领袖上台，但新秩序仍然不稳。"
 UP_CHI_expand_recruitment: "扩大招募"
 UP_CHI_expand_recruitment_desc: "蓝衣社将在青年军官、学校和城市社团中扩大招募。这能提高刺杀成功率，但会刺激社会紧张。"
 UP_CHI_secret_surveillance: "秘密监视（启用戴笠）"
 UP_CHI_secret_surveillance_desc: "戴笠的情报网将对警卫、交通和党内通讯进行监控。这能提高行动把握，也会让政府越来越依赖阴影。"
 UP_CHI_seek_german_support: "寻求德国支持"
 UP_CHI_seek_german_support_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_seek_japanese_support: "寻求日本支持"
 UP_CHI_seek_japanese_support_desc: "黄埔派需要外部承认，也需要打破外交孤立。东京不会免费提供支持，但它愿意认真观察南京的新秩序。"
 UP_CHI_central_guard_regiment: "中央警卫团"
 UP_CHI_central_guard_regiment_desc: "中央警卫团将被重组为只听命于军官团核心的政治武装。这会提高行动成功率，也会让党内恐惧进一步扩散。"
 UP_CHI_underground_printing_house: "地下印刷厂"
 UP_CHI_underground_printing_house_desc: "地下印刷所将为黄埔派制造传单、口号和伪造命令。纸张有时比子弹更适合摧毁一个政府的神经。"
 UP_CHI_underground_communications: "地下通讯"
 UP_CHI_underground_communications_desc: "秘密通信网将连接军营、警卫、蓝衣社行动组和南京城内的联络人。"
 UP_CHI_victory_of_armed_seizure: "武装夺权的胜利"
 UP_CHI_victory_of_armed_seizure_desc: "军官团已经掌握中央要地。武装夺权结束后，国家必须尽快恢复行政秩序，否则胜利本身会继续制造混乱。"
 UP_CHI_he_zhonghan_takes_party_center: "贺衷寒接管党中央"
 UP_CHI_he_zhonghan_takes_party_center_desc: "贺衷寒接管党中央后，黄埔军官、蓝衣社和军统系统将被重新编入一个统一的党国核心。"
 UP_CHI_eliminate_dissenters: "清除意见人士"
 UP_CHI_eliminate_dissenters_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_build_blacklist: "建立黑名单"
 UP_CHI_build_blacklist_desc: "军统和蓝衣社将整理一份目标名单。名单越精确，行动越可能成功；名单越长，社会越难保持安静。"
 UP_CHI_fate_of_mao: "毛泽东的命运"
 UP_CHI_fate_of_mao_desc: "新政权必须处理毛泽东留下的政治遗产。只有这一关被处理，黄埔线才会真正开始转入正面建设。"
 UP_CHI_japanese_congratulations: "来自日本的贺电"
 UP_CHI_japanese_congratulations_desc: "东京向南京新政权发来贺电。它不是友谊的证明，而是日本愿意承认中国政治变化已经成为新的事实。"
 UP_CHI_chinese_revival_government: "中华人民复兴政府成立"
 UP_CHI_chinese_revival_government_desc: "中华人民复兴政府正式成立。黄埔线前期积累的混乱和阴影将被新的国家机器部分吸收。"
 UP_CHI_establish_royal_air_force: "建立皇家空军"
 UP_CHI_establish_royal_air_force_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_sino_japanese_co_prosperity_sphere: "中日共建的大东亚共荣圈"
 UP_CHI_sino_japanese_co_prosperity_sphere_desc: "南京和东京将把反西方、反苏俄残余与大陆秩序问题包装成共同事业。合作会带来收益，也会制造新的民族主义裂痕。"
 UP_CHI_anti_japanese_treaty: "反日条约"
 UP_CHI_anti_japanese_treaty_desc: "即使新政权与日本短暂互相试探，东北、朝鲜和远东问题仍可能把双方推回战争。"
 UP_CHI_raise_air_standards: "提高门槛"
 UP_CHI_raise_air_standards_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_lower_air_standards: "降低门槛"
 UP_CHI_lower_air_standards_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_expand_blue_shirts: "蓝衣军扩权"
 UP_CHI_expand_blue_shirts_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_air_supremacy_over_asia: "亚洲的空中霸权"
 UP_CHI_air_supremacy_over_asia_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_state_supremacy: "国家至上"
 UP_CHI_state_supremacy_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_partition_manchuria: "瓜分东北（像日本发送事件之类的）"
 UP_CHI_partition_manchuria_desc: "东北不只是领土问题，也是中日两国能否共同管理大陆秩序的试金石。南京将向东京提出新的东北安排。"
 UP_CHI_chinese_nationalism: "中华民族主义"
 UP_CHI_chinese_nationalism_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_seek_sino_german_friendship: "寻求中德友好"
 UP_CHI_seek_sino_german_friendship_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_chen_shaokuan_oceanic_mission: "陈绍宽下西洋"
 UP_CHI_chen_shaokuan_oceanic_mission_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_east_asian_new_order_pact: "东亚新秩序协定"
 UP_CHI_east_asian_new_order_pact_desc: "如果日本接受南京的邀请，东亚将出现一个由中日共同塑造的新集团。它的口号是亚洲自决，它的现实则是权力再分配。"
 UP_CHI_war_against_japan: "对日作战"
 UP_CHI_war_against_japan_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_aim_at_america: "剑指美洲"
 UP_CHI_aim_at_america_desc: "远洋舰队的任务不再只是护航。南京将把战争推向太平洋另一端，直接挑战美国与加拿大在美洲和太平洋上的安全体系。"
 UP_CHI_southern_advance: "南进"
 UP_CHI_southern_advance_desc: "南洋的港口、橡胶、锡矿和航道决定中国能否成为真正的海权国家。南京将准备向东南亚投射力量。"
 UP_CHI_northern_advance: "北上"
 UP_CHI_northern_advance_desc: "北方的草原、铁路和西伯利亚边疆仍处于俄国崩溃后的真空中。南京将把边境安全推进到更远处。"
 UP_CHI_greater_asian_co_prosperity_sphere: "大亚洲共荣圈"
 UP_CHI_greater_asian_co_prosperity_sphere_desc: "战争、投资和政治承诺将被包装成新的亚洲共同繁荣。现实会更粗糙，但南京已经有能力把秩序推广到国境之外。"
 UP_CHI_new_asia_under_china: "中华治下的新亚洲"
 UP_CHI_new_asia_under_china_desc: "中国将不再只是亚洲革命或民族主义的一支力量，而会成为新亚洲秩序的中心。周边国家必须重新理解南京的分量。"

 UP_whampoa_shadow_cabal: "黄埔暗流"
 UP_whampoa_shadow_cabal_desc: "黄埔军官团开始在南京政府内部形成稳定网络。他们带来纪律和效率，也带来了对党务和群众政治的敌意。"
 UP_whampoa_officer_pressure: "军官团压力"
 UP_whampoa_officer_pressure_desc: "军官团的扩张让军队更容易统一指挥，但也让地方委员会和文官体系感到威胁。"
 UP_whampoa_command_state: "黄埔指挥国家"
 UP_whampoa_command_state_desc: "黄埔军官团开始把军令、人事和行政系统压进同一套指挥链。军队更听话了，国家也更紧绷了。"
 UP_blue_shirts_reborn: "重生的蓝衣社"
 UP_blue_shirts_reborn_desc: "蓝衣社用组织、监控和青年动员重新回到政治舞台。它能压制秩序问题，也会进一步撕裂南京的合法性。"
 UP_blue_shirts_mass_recruitment: "蓝衣社扩大招募"
 UP_blue_shirts_mass_recruitment_desc: "蓝衣社不再只是少数核心成员的秘密组织。快速扩张带来更多人手，也带来渗透、失控和街头政治暴力。"
 UP_juntong_state: "军统国家"
 UP_juntong_state_desc: "情报机构已经渗入政府、军队和地方派系。它能让国家更容易掌握阴影，也让阴影更容易掌握国家。"
 UP_juntong_surveillance_state: "军统监控国家"
 UP_juntong_surveillance_state_desc: "军统把邮电、警察、军营和地方档案串成一张更密的网。情报效率提高了，社会信任则继续下降。"
 UP_assassination_preparations: "刺杀准备"
 UP_assassination_preparations_desc: "一个针对最高领袖的阴谋正在形成。每一个环节都需要政治代价，而任何失误都可能把中国拖入更深的危机。"
 UP_assassination_failed_crackdown: "失败后的肃清"
 UP_assassination_failed_crackdown_desc: "刺杀失败后，南京进入全面紧急状态。政府尚在运转，但信任已经被砸碎。"
 UP_lin_biao_interregnum: "林彪过渡政府"
 UP_lin_biao_interregnum_desc: "林彪被推到台前，以军事权威维持新政权。这是一个过渡秩序，不是稳固国家。"
 UP_he_zhonghan_party_center: "贺衷寒接管中央"
 UP_he_zhonghan_party_center_desc: "贺衷寒将蓝衣社、军官团和新的党国机器结合起来。南京终于有了新的中心。"
 UP_revival_government_consolidated: "复兴政府稳固"
 UP_revival_government_consolidated_desc: "黄埔派经过阴谋、清洗和权力转移后，终于把新政权组织成一个能运转的国家机器。"
 UP_sino_japanese_hardline_alignment: "中日强硬派协调"
 UP_sino_japanese_hardline_alignment_desc: "南京和东京的强硬派正在用反西方秩序和大陆安全问题包装合作。双方关系升温，但这种合作缺乏柔软的民意基础。"
 UP_armed_seizure_disruption: "武装夺权的混乱"
 UP_armed_seizure_disruption_desc: "黄埔派放弃了暗杀和谈判，直接把国家推向军事决裂。"
 UP_CHI_lin_biao_advisor: "林彪"
 UP_CHI_lin_biao: "林彪"
 UP_CHI_lin_biao_air_chief: "林彪"
 UP_CHI_dai_li_advisor: "戴笠"
