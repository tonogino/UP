 UP_JAP_fiscal_pressure_minus_15_tt: "财政压力：§G-15§!"
 UP_JAP_fiscal_pressure_minus_25_tt: "财政压力：§G-25§!"
 up_japan.1.t: "远东驻军的真实成本"
 up_japan.1.d: "审计报告显示，远东驻军成本远高于陆军最初承诺。铁路维护、港口重建、粮食运输、矿山开发和治安战正在吞噬帝国财政。"
 up_japan.1.a: "这是必要的牺牲。"
 up_japan.1.b: "必须重新评估北方战略。"
 up_japan.1.c: "把预算转向海军。"
 up_japan.2.t: "满洲资源报告"
 up_japan.2.d: "调查显示，满洲拥有日本远东占领区无法提供的工业基础。煤炭、钢铁、粮食、人口和铁路使满洲成为帝国真正的大陆心脏。"
 up_japan.2.a: "这正是帝国需要的。"
 up_japan.2.b: "满洲必须服从皇道。"
 up_japan.2.c: "大陆会吞掉我们的舰队预算。"
 up_japan.3.t: "南洋预算争论"
 up_japan.3.d: "海军部提交了新的南洋舰队预算案。陆军认为这是对大陆战略的背叛，财阀则认为南洋资源开发拥有巨大收益。"
 up_japan.3.a: "批准舰队预算。"
 up_japan.3.b: "削减预算，优先满洲。"
 up_japan.3.c: "让财阀承担费用。"
 up_japan.4.t: "青年军官请愿"
 up_japan.4.d: "一批青年军官向宫内省递交请愿书，要求清洗腐败财阀与软弱内阁。他们没有发动叛乱，但所有人都知道，如果东京继续无视他们，枪声迟早会响起。"
 up_japan.4.a: "安抚他们。"
 up_japan.4.b: "逮捕首谋。"
 up_japan.4.c: "把他们送去远东。"
 up_japan.5.t: "财阀的条件"
 up_japan.5.d: "财阀愿意继续购买国债，但要求政府给予铁路、矿山、港口和军需合同特权。"
 up_japan.5.a: "接受条件。"
 up_japan.5.b: "拒绝勒索。"
 up_japan.5.c: "成立国家经济统制委员会。"
 up_japan.6.t: "三月财政危机"
 up_japan.6.d: "东京的账本已经无法被修饰。远东驻军要求粮食，海军要求钢铁，统制派要求满洲预算，财阀要求还款。首相官邸外，军官、记者、银行家和抗议者都在等待一个答案：帝国到底还能不能支付自己的胜利？"
 up_japan.6.a: "削减远东军费。"
 up_japan.6.b: "冻结南洋舰队预算。"
 up_japan.6.c: "推迟满洲作战计划。"
 up_japan.6.e: "强制财阀借款。"
 up_japan.6.f: "内阁总辞职。"
 UP_JAP_second_northern_advance_council: "第二次北进御前裁可"
 UP_JAP_second_northern_advance_council_desc: "皇道派宣称远东战争并非帝国的错误，而是未完成的天命。只要再次获得御前裁可，陆军就能越过漫长边境，把北方胜利推进到最后。"
 UP_JAP_total_war_state_system: "国家总力战体制"
 UP_JAP_total_war_state_system_desc: "统制派认为，日本不能再让军费、工业、铁路和财政各自为政。帝国若要夺回满洲，就必须先把国家改造成能承受总体战争的机器。"
 UP_JAP_manchurian_operation_plan: "满洲作战计划"
 UP_JAP_manchurian_operation_plan_desc: "参谋本部重新打开六年前被搁置的满洲档案。奉天、新京、南满铁路、煤矿与钢铁厂被标成一组清晰的作战目标。"
 UP_JAP_kwantung_army_reorganization: "重组关东军"
 UP_JAP_kwantung_army_reorganization_desc: "关东军必须从边境武装集团变成真正服从东京战略的大陆军核心。统制派将用参谋、预算和纪律重新塑造它。"
 UP_JAP_southern_resource_sphere_council: "南方资源圈裁定"
 UP_JAP_southern_resource_sphere_council_desc: "海军部认为帝国不能继续被大陆冻土和满洲铁路绑架。南洋的石油、橡胶、锡矿与海上交通线才是日本真正的生命线。"
 UP_JAP_national_total_war_research_association: "国策研究会"
 UP_JAP_national_total_war_research_association_desc: "军官、官僚、工程师和经济学家被召入新的研究机构。日本要研究的不只是下一场战役，而是如何把社会、财政和工业全部纳入战争。"
 UP_JAP_showa_planning_board: "昭和企划院"
 UP_JAP_showa_planning_board_desc: "统制派要求建立一个跨越内阁、陆军省、商工省和财界的企划机关。它不会立刻解决财政问题，但会让帝国第一次像一台机器那样思考。"
 UP_JAP_army_budget_standardization: "陆军预算标准化"
 UP_JAP_army_budget_standardization_desc: "远东、朝鲜、关东军和本土师团各有自己的预算口径。统制派必须先弄清楚钱流向哪里，才能决定把钱投向满洲。"
 UP_JAP_mobilization_law_draft: "总动员法草案"
 UP_JAP_mobilization_law_draft_desc: "官僚们开始起草总动员法。工厂、运输、劳工、价格和原料都将被写入国家控制的法律框架，哪怕法案本身还会引发长期争论。"
 UP_JAP_general_staff_supremacy: "参谋本部优越"
 UP_JAP_general_staff_supremacy_desc: "统制派不相信青年军官的激情，也不相信临时命令能够赢得现代战争。帝国陆军必须回到参谋、图上作业、统计表和冷静计划之中。"
 UP_JAP_suppress_young_officer_cells: "压制青年军官小组"
 UP_JAP_suppress_young_officer_cells_desc: "皇道派的青年军官仍在军营、学校和前线传播清君侧的语言。统制派将用调任、审查和军纪处分把他们从权力中心推开。"
 UP_JAP_standard_division_tables: "标准师团编制表"
 UP_JAP_standard_division_tables_desc: "每支部队都不能再按地方习惯和派系关系自行组织。陆军省将统一师团编制、装备口径和补充流程，让帝国陆军变得更像一个整体。"
 UP_JAP_staff_college_expansion: "扩大陆军大学校"
 UP_JAP_staff_college_expansion_desc: "统制派需要的不是会喊口号的军官，而是懂铁路、火力、动员、工业和后勤的参谋。陆军大学校将成为新陆军的神经中枢。"
 UP_JAP_integrated_artillery_schools: "炮兵协同学校"
 UP_JAP_integrated_artillery_schools_desc: "大陆战争不能只靠步兵勇气推进。炮兵观测、通信、弹药调度和步炮协同将被纳入正式训练体系。"
 UP_JAP_motorized_logistics_experiments: "摩托化后勤实验"
 UP_JAP_motorized_logistics_experiments_desc: "满洲和华北的距离会惩罚一切浪漫主义。汽车、铁路转运、野战仓库和维修队将决定部队能走多远。"
 UP_JAP_army_air_ground_coordination: "陆空协同研究"
 UP_JAP_army_air_ground_coordination_desc: "陆军航空兵不能只是侦察和威慑工具。统制派要求把空中侦察、近接支援和地面突破计划写进同一份作战命令。"
 UP_JAP_continental_breakthrough_doctrine: "大陆突破学说"
 UP_JAP_continental_breakthrough_doctrine_desc: "满洲的经验将被整理成新的突破学说：火力压制、机械牵引、快速补给和参谋协调共同撕开大陆防线。"
 UP_JAP_total_war_officer_corps: "总力战军官团"
 UP_JAP_total_war_officer_corps_desc: "新军官团不再只服务于某个师团或派系，而是服务于总体战争国家。军官必须理解工厂、铁路、财政和政治，因为这些都已经成为战场。"
 UP_JAP_army_ministry_industrial_committee: "陆军省产业委员会"
 UP_JAP_army_ministry_industrial_committee_desc: "陆军省要求直接参与军需分配。财阀可以继续生产，但生产的顺序、规模和方向必须服从国家战略。"
 UP_JAP_zaibatsu_procurement_talks: "财阀采购谈判"
 UP_JAP_zaibatsu_procurement_talks_desc: "统制派不能完全绕开财阀。钢铁、机械、船运和贷款仍在财界手中，陆军省必须把命令伪装成合同，把征用写成采购。"
 UP_JAP_expand_dairen_arsenal: "扩建大连兵工设施"
 UP_JAP_expand_dairen_arsenal_desc: "若满洲将成为大陆战争的基地，大连就不能只是港口和商社仓库。新的军需设施将把海运、铁路和陆军补给接在一起。"
 UP_JAP_manchurian_railway_plan: "满洲铁路计划"
 UP_JAP_manchurian_railway_plan_desc: "满铁不仅是商业公司，也是大陆战争的血管。铁路、车站、仓库和矿区将被纳入一张面向战争的运输图。"
 UP_JAP_mantetsu_survey_teams: "满铁调查队"
 UP_JAP_mantetsu_survey_teams_desc: "工程师、测绘员、会计和铁路警备人员被派往满洲。他们记录桥梁、矿区和车站，也记录东北军的迟疑与裂缝。"
 UP_JAP_border_railway_guards: "边境铁路守备队"
 UP_JAP_border_railway_guards_desc: "铁路守备队的职责被扩大。保护铁路、保护侨民、保护商业利益，这些词语在东京文件里逐渐变成同一件事。"
 UP_JAP_kwantung_supply_stockpiles: "关东军补给仓库"
 UP_JAP_kwantung_supply_stockpiles_desc: "弹药、罐头、煤炭、医疗包和铁路备件被送往关东军仓库。财政官员看到的是赤字，参谋看到的是作战半径。"
 UP_JAP_fengtian_special_service: "奉天特务机关"
 UP_JAP_fengtian_special_service_desc: "满洲不能只靠公开外交解决。特务机关将进入奉天、哈尔滨和新京，收买军官、制造裂痕，并为即将到来的行动铺路。"
 UP_JAP_subvert_fengtian_command: "瓦解奉天指挥部"
 UP_JAP_subvert_fengtian_command_desc: "东北军并非铁板一块。亲日军官、旧白军顾问、地方商人和铁路派系都可以被利用。统制派希望在枪声响起前，先让命令失去重量。"
 UP_JAP_manchurian_border_incident: "满洲国境事件"
 UP_JAP_manchurian_border_incident_desc: "边境巡逻、铁路警备和地方冲突正在接近临界点。统制派需要一个事件，把御前会议上的地图变成军队可以执行的命令。"
 UP_JAP_second_mukden_incident: "第二次奉天事件"
 UP_JAP_second_mukden_incident_desc: "东京终于不再回避满洲问题。若东北军拒绝让步，帝国陆军将以保护铁路、侨民和商业利益为名发动全面行动。"
 UP_JAP_prepare_xinjing_civil_administration: "准备新京民政班"
 UP_JAP_prepare_xinjing_civil_administration_desc: "军队可以进入城市，却不能独自管理税收、粮食、警察和铁路票据。内务官僚与满铁人员开始准备接收新京。"
 UP_JAP_enter_xinjing: "进入新京"
 UP_JAP_enter_xinjing_desc: "满洲的政治中心已经暴露在日本军队面前。现在的问题不是能否进入新京，而是进入之后如何统治这片帝国真正需要的土地。"
 UP_JAP_secure_south_manchurian_railway: "确保南满铁路"
 UP_JAP_secure_south_manchurian_railway_desc: "南满铁路是满洲统治的脊梁。军队控制城市，满铁控制运输，而运输决定这场胜利究竟是资产还是负担。"
 UP_JAP_restore_fushun_coal_output: "恢复抚顺煤矿产出"
 UP_JAP_restore_fushun_coal_output_desc: "煤炭比宣言更真实。抚顺的产量将决定满洲是否能回报日本，也决定统制派能否证明自己的战略选择没有错。"
 UP_JAP_dalian_port_authority: "大连港务局"
 UP_JAP_dalian_port_authority_desc: "大连港被改造成满洲资源外运和军需输入的核心口岸。陆军、海军、满铁和财阀都想在这座港口留下自己的印章。"
 UP_JAP_manchurian_industrial_five_year_plan: "满洲产业五年计划"
 UP_JAP_manchurian_industrial_five_year_plan_desc: "满洲必须成为帝国的煤、铁、机械和军需基地。统制派将用计划、贷款和军工订单重塑这片土地。"
 UP_JAP_continental_military_supply_system: "大陆军需补给体系"
 UP_JAP_continental_military_supply_system_desc: "远东战争证明，胜利无法靠地图维持。铁路、粮食、弹药、医疗和汽车运输必须在下一场大陆战争前完成整合。"
 UP_JAP_north_china_garrison_studies: "华北驻屯研究"
 UP_JAP_north_china_garrison_studies_desc: "满洲以南就是华北。参谋本部开始研究铁路节点、驻屯范围和地方政权，哪怕内阁还没有承认这意味着下一场战争。"
 UP_JAP_nanjing_backchannel: "南京秘密渠道"
 UP_JAP_nanjing_backchannel_desc: "日本并不一定要立刻与南京开战。外交官、商社和军部中间人开始试探一个问题：满洲利益能否用谈判暂时固定下来？"
 UP_JAP_manchurian_autonomy_charter: "满洲自治章程"
 UP_JAP_manchurian_autonomy_charter_desc: "无论是军管、傀儡还是满铁托管，满洲都需要一套能写给外界看的政治外壳。自治章程就是这层外壳。"
 UP_JAP_final_policy_toward_china: "对华最终方针"
 UP_JAP_final_policy_toward_china_desc: "满洲只是大陆战略的第一步。东京必须决定，是继续把中国视为敌人、寻找南京合作，还是暂时把全部精力投入满洲总动员。"
 UP_JAP_continental_total_war_state: "大陆总力战国家"
 UP_JAP_continental_total_war_state_desc: "统制派路线抵达了它的完整形态：军队、官僚、工业、铁路和财政被共同压进一个面向大陆战争的国家机器中。"
 UP_JAP_toseiha_route_complete_tt: "§Y统制派满洲路线§!已经完成。日本将以满洲为核心，进入大陆总力战阶段。"
 UP_JAP_total_war_research_council: "总力战研究会"
 UP_JAP_total_war_research_council_desc: "统制派组织军官、官僚和技术人员研究现代战争。它提高了国家学习能力，也让政治决策更依赖军部和专家机关。"
 UP_JAP_manchurian_operation_plan_idea: "满洲作战计划"
 UP_JAP_manchurian_operation_plan_idea_desc: "满洲的铁路、城市和军队部署被重新标记。参谋本部已经准备把资源调查变成作战命令。"
 UP_JAP_kwantung_reorganized: "关东军重组"
 UP_JAP_kwantung_reorganized_desc: "关东军被重新整编为大陆行动的核心力量。它更有效率，也更确信自己代表帝国真正的战略意志。"
 UP_JAP_general_staff_supremacy_idea: "参谋本部优越"
 UP_JAP_general_staff_supremacy_idea_desc: "参谋本部在统制派路线下重新取得压倒性地位。军队行动更有计划，但政治空间也被军部表格一点点挤压。"
 UP_JAP_standard_division_tables_idea: "标准师团编制"
 UP_JAP_standard_division_tables_idea_desc: "统一编制表让训练、补充和装备生产更容易协调。旧式地方化部队正在被现代军政体系取代。"
 UP_JAP_integrated_artillery_schools_idea: "炮兵协同学校"
 UP_JAP_integrated_artillery_schools_idea_desc: "炮兵训练不再只是单独射击，而是与步兵、通信和补给共同运作。"
 UP_JAP_motorized_logistics_experiments_idea: "摩托化后勤实验"
 UP_JAP_motorized_logistics_experiments_idea_desc: "汽车运输和维修体系仍然昂贵而稚嫩，但它们让陆军第一次认真面对大陆战争的距离问题。"
 UP_JAP_continental_breakthrough_doctrine_idea: "大陆突破学说"
 UP_JAP_continental_breakthrough_doctrine_idea_desc: "统制派把火力、速度和后勤合并成新的突破学说，试图让日本陆军不再只依赖步兵韧性。"
 UP_JAP_total_war_officer_corps_idea: "总力战军官团"
 UP_JAP_total_war_officer_corps_idea_desc: "新一代统制派军官把战争视为国家整体工程。战场、铁路、工厂和国库都在他们的作战图上。"
 UP_JAP_army_ministry_industrial_committee_idea: "陆军省产业委员会"
 UP_JAP_army_ministry_industrial_committee_idea_desc: "陆军开始直接协调军需生产和产业订单。日本的工厂获得方向，民间经济则感到压力。"
 UP_JAP_mantetsu_revival: "满铁复兴计划"
 UP_JAP_mantetsu_revival_desc: "满铁系统被重新赋予战略地位。铁路、矿区和仓库将成为大陆扩张的物质基础。"
 UP_JAP_fengtian_intelligence_network: "奉天情报网"
 UP_JAP_fengtian_intelligence_network_desc: "日本情报人员、商社、铁路警备和地方联系人正在满洲地下编织一张网络。"
 UP_JAP_manchurian_operation_momentum: "满洲行动势头"
 UP_JAP_manchurian_operation_momentum_desc: "第二次奉天事件让军队获得了政治授权。短时间内，统制派可以把犹豫转化为进攻。"
 UP_JAP_manchurian_military_administration: "满洲军管行政"
 UP_JAP_manchurian_military_administration_desc: "满洲由日本军队直接管理。资源可以更快被调动，但驻军、治安和财政负担也随之上升。"
 UP_JAP_new_manchurian_state_clients: "新满洲国代理体系"
 UP_JAP_new_manchurian_state_clients_desc: "日本没有直接吞并满洲，而是扶植一个服从东京的东北政权。它更便宜，也更依赖政治操控。"
 UP_JAP_mantetsu_economic_trusteeship: "满铁经济托管"
 UP_JAP_mantetsu_economic_trusteeship_desc: "满洲的统治被交给满铁、财阀和技术官僚共同执行。它能减轻国库压力，却让经济权力进一步集中到财界手中。"
 UP_JAP_manchurian_industrial_plan: "满洲产业计划"
 UP_JAP_manchurian_industrial_plan_desc: "满洲工业化被纳入国家计划。煤、铁、机械和军工将服务于日本的大陆战略。"
 UP_JAP_continental_supply_system: "大陆补给体系"
 UP_JAP_continental_supply_system_desc: "日本开始把铁路、仓储、补给和部队编制作为一个整体规划。大陆战争不再只是战场问题，而是运输问题。"
 UP_JAP_continental_total_war_state_idea: "大陆总力战国家"
 UP_JAP_continental_total_war_state_idea_desc: "日本国家机器被统制派重塑。军工、技术、财政和陆军战略共同指向一个目标：在大陆上赢得下一场战争。"
 UP_XIC_japanese_infiltration: "日本渗透"
 UP_XIC_japanese_infiltration_desc: "日本商社、情报人员和亲日军官已经深入东北军体系。张作霖政权的命令开始在铁路和军营之间失去确定性。"
 UP_XIC_japanese_client_state: "日本保护下的东北政权"
 UP_XIC_japanese_client_state_desc: "东北军保留了旗帜和官僚，却不得不接受日本顾问、驻军和经济控制。"
 UP_XIC_mantetsu_trusteeship: "满铁托管"
 UP_XIC_mantetsu_trusteeship_desc: "满铁和日本财界掌握了东北经济命脉。工业建设加速，政治独立则被一点点抽空。"
 up_japan.20.t: "满洲国境事件"
 up_japan.20.d: "奉天附近的铁路警备队与东北军巡逻部队爆发冲突。东京收到的报告互相矛盾：有人说这是地方误判，有人说这是东北军挑衅，也有人暗示整件事本来就在计划之内。御前会议必须决定是否让边境火星变成大陆战略的火焰。"
 up_japan.20.a: "让事件继续扩大。"
 up_japan.20.b: "控制冲突，等待时机。"
 up_japan.20.c: "让奉天特务机关接手。"
 up_japan.21.t: "第二次奉天事件"
 up_japan.21.d: "边境事件已经被东京定性为东北军对帝国权益的威胁。陆军省要求立刻授权关东军行动，以保护铁路、侨民和商业利益。财政官员还在计算成本，参谋们已经开始移动旗标。"
 up_japan.21.a: "满洲问题将由军队解决。"
 up_japan.22.t: "进入新京"
 up_japan.22.d: "日本军队进入新京后，满洲的政治命运被交到东京手中。直接军管可以最快榨取资源，扶植新政权可以降低统治成本，而满铁托管则能把经济建设交给财界和技术官僚。"
 up_japan.22.a: "直接军管满洲。"
 up_japan.22.b: "扶植新满洲国。"
 up_japan.22.c: "交给满铁经济托管。"
 up_japan.23.t: "对华最终方针"
 up_japan.23.d: "满洲问题暂时落定，但中国问题仍然横在帝国面前。统制派内部出现三种方案：以满洲为跳板控制华北，与南京达成利益交换，或者暂缓扩张，先把满洲改造成真正的军需基地。"
 up_japan.23.a: "以武力控制华北。"
 up_japan.23.b: "寻求东京-南京轴心。"
 up_japan.23.c: "暂缓对华，完成满洲总动员。"
