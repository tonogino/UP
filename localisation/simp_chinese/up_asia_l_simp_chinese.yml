 up_map.1.t: "1936年的世界版图"
 up_map.1.d: "一战没有以原本历史中的方式结束。德国在东欧维持庞大的保护体系，俄国没有形成苏联而是裂为数个继承政权，奥斯曼帝国仍掌握安纳托利亚、两河与黎凡特，奥匈则以简化后的多瑙联邦形态苟延残喘。亚洲方面，日本提前介入远东并扶植保护领，印度则在权力移交中分裂为红色革命势力、黑色等级主义政权与英属残余影响区。"
 up_map.1.a: "世界已经改变。"
 UP_germany_focus: "德意志帝国国策树"
 UP_GER_the_incomplete_victory: "不完整的胜利"
 UP_GER_the_incomplete_victory_desc: "德国赢得了东线，却没有赢得一场干净的战争。东欧保护体系、法国复仇主义和英国离岸平衡共同构成了帝国的1936年。"
 UP_GER_audit_the_eastern_order: "审计东方秩序"
 UP_GER_audit_the_eastern_order_desc: "波兰、乌克兰与波罗的保护国为德国提供粮食、铁路和缓冲，也不断索要驻军、补贴和政治耐心。"
 UP_GER_secure_the_rhine_frontier: "巩固莱茵边境"
 UP_GER_secure_the_rhine_frontier_desc: "阿尔萨斯、洛林和马奇诺防线已经在德国手中。法国不会忘记这道伤口，帝国也不能忽视西线。"
 UP_GER_imperial_conservative_reform: "帝国保守改革"
 UP_GER_imperial_conservative_reform_desc: "修补帝国，而非推翻帝国。保守派希望用有限改革、财政整顿和保护国自治来延长德意志帝国的寿命。"
 UP_GER_constitutional_cabinet: "立宪内阁"
 UP_GER_constitutional_cabinet_desc: "帝国需要一个能处理工人、军方、容克和工商界的政府，而不是永远靠总参谋部维持秩序。"
 UP_GER_autonomy_for_the_protectorates: "保护国自治方案"
 UP_GER_autonomy_for_the_protectorates_desc: "东欧不能永远只靠刺刀维持。给予保护国有限自治，也许能把负担变成体系。"
 UP_GER_ordered_imperial_recovery: "有序的帝国复苏"
 UP_GER_ordered_imperial_recovery_desc: "德国不会放弃霸权，但可以让霸权变得更便宜、更稳定、更像一个制度，而不是无休止的军事占领。"
 UP_GER_national_radical_agitation: "民族激进派鼓动"
 UP_GER_national_radical_agitation_desc: "激进派宣称半胜利和平是软弱保守派的背叛。德国本该取得完整胜利，而不是被东方泥潭和旧宫廷拖住。"
 UP_GER_break_the_old_court: "打碎旧宫廷"
 UP_GER_break_the_old_court_desc: "君主、贵族和老派官僚被指责为帝国停滞的根源。激进派准备把国家从旧秩序手中夺走。"
 UP_GER_totalize_the_eastern_question: "总体化东方问题"
 UP_GER_totalize_the_eastern_question_desc: "东欧不能再是谈判桌上的保护体系，而必须变成德国民族国家的战略空间。"
 UP_GER_the_unfinished_war: "未完成的战争"
 UP_GER_the_unfinished_war_desc: "1918年的和平只是停顿，不是终点。激进德国将把所有旧账重新摊开。"
 UP_GER_workers_against_the_victory_peace: "工人反对胜利和平"
 UP_GER_workers_against_the_victory_peace_desc: "德国赢得了东线，但工人没有赢得面包、和平或权力。没有苏联的世界里，德国左翼必须自己寻找革命道路。"
 UP_GER_factory_councils: "工厂委员会"
 UP_GER_factory_councils_desc: "工厂、矿区和铁路枢纽正在出现新的组织网络。它们不是莫斯科的影子，而是德国本土矛盾的产物。"
 UP_GER_soldiers_and_railway_cells: "士兵与铁路小组"
 UP_GER_soldiers_and_railway_cells_desc: "帝国靠铁路维系东欧，也靠士兵压住保护国。若这些网络转向革命，德国的霸权机器会从内部颤动。"
 UP_GER_red_central_europe: "红色中欧"
 UP_GER_red_central_europe_desc: "工人革命派不想重建旧帝国，而要把莱茵、鲁尔、多瑙与东欧铁路变成新的红色共同体。"
 UP_GER_mitteleuropa_command: "中欧霸权司令部"
 UP_GER_mitteleuropa_command_desc: "不改革，不革命，只把帝国机器推到极限。军方和工业界将把保护国体系改造成真正的中欧霸权。"
 UP_GER_standardize_the_protectorate_railways: "标准化保护国铁路"
 UP_GER_standardize_the_protectorate_railways_desc: "轨距、调度、军需仓库和边境车站必须服从同一个中心。德国的霸权首先写在铁路时刻表上。"
 UP_GER_eastern_security_treaties: "东方安全条约"
 UP_GER_eastern_security_treaties_desc: "波兰、乌克兰和波罗的保护国将被纳入更明确的军事义务体系。名义独立可以保留，战略选择必须交给柏林。"
 UP_GER_the_central_european_machine: "中欧机器"
 UP_GER_the_central_european_machine_desc: "当铁路、粮食、军工、关税和驻军被同一套计划驱动时，中欧不再只是地图概念，而是一台德国制造的机器。"
 UP_CHI_revolutionary_league_1933: "1933年的革命同盟"
 UP_CHI_revolutionary_league_1933_desc: "南京已经落入革命军手中，但革命同盟仍是由共产党人、地方农民武装、左翼残党和失意军官拼接起来的政权。"
 UP_CHI_nanjing_revolutionary_government: "南京革命政府"
 UP_CHI_nanjing_revolutionary_government_desc: "革命同盟必须证明自己不只是攻城军队，而是能治理城市、铁路、税收和粮食的国家核心。"
 UP_CHI_the_chongqing_question: "重庆问题"
 UP_CHI_the_chongqing_question_desc: "残余国民政府退入重庆，并与华南地方军阀结成同盟。南京若要统一中国，就必须决定如何处理西南的旧秩序。"
 UP_CHI_rebuild_the_revolutionary_army: "重建革命军"
 UP_CHI_rebuild_the_revolutionary_army_desc: "革命军由农民武装、旧军倒戈部队和青年军官组成。它打下了南京，但还不是一支真正统一的现代军队。"
 UP_CHI_rural_reform_bloc: "农村改革派"
 UP_CHI_rural_reform_bloc_desc: "农村改革派认为革命的根基在土地、乡村组织和基层动员。只有先重塑农村，中国革命才不会成为又一个城市政权。"
 UP_CHI_militarist_bloc: "秘密重建黄埔军校"
 UP_CHI_militarist_bloc_desc: "军国主义派认为分裂中国只能靠军队重新缝合。革命不能被乡村会议拖慢，必须建立纪律、参谋部和统一战争机器。"
 UP_CHI_land_reformists: "土地改革派"
 UP_CHI_land_reformists_desc: "土地改革派要求把革命承诺兑现到田地上。地主、旧乡绅和地方债权网络必须让位于农会和新政权。"
 UP_CHI_redistribute_the_lower_yangtze: "重分长江下游土地"
 UP_CHI_redistribute_the_lower_yangtze_desc: "南京周边的乡村不只是粮仓，也是革命合法性的试验场。"
 UP_CHI_peasant_association_state: "农会国家"
 UP_CHI_peasant_association_state_desc: "乡村组织将不再只是战争动员工具，而会成为基层治理、征粮、教育和治安的骨架。"
 UP_CHI_revolution_from_the_villages: "从村庄继续革命"
 UP_CHI_revolution_from_the_villages_desc: "中国革命不是从莫斯科传来，而是从村庄、集市、渡口和粮仓里长出来。"
 UP_CHI_modernizing_diplomats: "现代化外交派"
 UP_CHI_modernizing_diplomats_desc: "现代化外交派认为革命不能只靠乡村热情。南京需要工程师、贸易渠道、外部承认和现代国家机构。"
 UP_CHI_open_the_shanghai_channels: "打开上海渠道"
 UP_CHI_open_the_shanghai_channels_desc: "上海仍是中国与世界连接的窗口。革命政府需要港口、银行、工程师和机器，而不仅是口号。"
 UP_CHI_seek_foreign_recognition: "寻求外国承认"
 UP_CHI_seek_foreign_recognition_desc: "没有苏联的世界里，南京必须自己争取外交空间，在列强、德国、英国、日本和亚洲革命之间寻找缝隙。"
 UP_CHI_revolutionary_modernization: "革命现代化"
 UP_CHI_revolutionary_modernization_desc: "若革命不能修铁路、办工厂、训练技术官僚，它就无法赢下下一阶段的中国。"
 UP_CHI_whampoa_officer_corps: "黄埔军官团派"
 UP_CHI_whampoa_officer_corps_desc: "不少黄埔军官在蒋介石死后倒向南京。他们相信革命需要现代军官团，而不是无休止的群众动员。"
 UP_CHI_absorb_defected_cadets: "吸收倒戈军校生"
 UP_CHI_absorb_defected_cadets_desc: "倒戈军校生带来了战术、纪律和旧国民革命军的经验，也带来了新的派系风险。"
 UP_CHI_nanjing_general_staff: "南京总参谋部"
 UP_CHI_nanjing_general_staff_desc: "统一中国不能靠临时会议指挥。南京需要一个能规划多战线战争的总参谋部。"
 UP_CHI_revolutionary_military_state: "革命军事国家"
 UP_CHI_revolutionary_military_state_desc: "军队将成为革命政权的脊梁。中国必须先被组织成军营，才能被组织成国家。"
 UP_CHI_inherit_sun_yat_sen: "继承孙中山派"
 UP_CHI_inherit_sun_yat_sen_desc: "这一路线主张南京革命政府才是国民革命的真正继承者。蒋介石死后，重庆只是旧官僚和地方军阀的避难所。"
 UP_CHI_second_northern_expedition: "第二次北伐"
 UP_CHI_second_northern_expedition_desc: "革命尚未完成，军阀仍在。南京将以新的旗帜继承北伐的未竟事业。"
 UP_CHI_three_principles_under_red_banner: "红旗下的三民主义"
 UP_CHI_three_principles_under_red_banner_desc: "民族、民权、民生不必属于重庆。南京可以把孙中山的遗产重新解释为革命同盟的合法性。"
 UP_CHI_republican_revolutionary_claim: "共和革命正统"
 UP_CHI_republican_revolutionary_claim_desc: "南京宣布自己既是社会革命的中心，也是国民革命的继承者。重庆的旗帜已经褪色。"
 UP_CHI_launch_new_land_reform: "发动新土改"
 UP_CHI_launch_new_land_reform_desc: "南京革命政府将把土地问题重新推向前台。农民获得动员，地主阶级则开始把革命视为生死威胁。"
 UP_CHI_deepen_the_countryside: "深入乡村"
 UP_CHI_deepen_the_countryside_desc: "革命不能只停留在城市和军队。工作队、农会和基层干部将进入乡村，把南京的命令变成地方秩序。"
 UP_CHI_establish_people_communes: "建立人民公社"
 UP_CHI_establish_people_communes_desc: "人民公社将生产、动员和基层治理结合起来。它们能创造新的建设速度，也会让社会承受更大压力。"
 UP_CHI_mass_line: "群众路线"
 UP_CHI_mass_line_desc: "群众路线把革命政府重新拉回基层。政策必须从群众中来，再回到群众中去。"
 UP_CHI_rectify_local_revolutionary_committees: "整顿地方革命委员会"
 UP_CHI_rectify_local_revolutionary_committees_desc: "地方革命委员会曾经帮助南京夺取政权，如今却可能成为新的山头。中央必须重新握住基层权力。"
 UP_CHI_continue_land_revolution: "继续土地革命"
 UP_CHI_continue_land_revolution_desc: "土地革命不能在南京胜利后停下。农村社会仍然是中国革命最深的战场。"
 UP_CHI_export_revolution: "革命输出"
 UP_CHI_export_revolution_desc: "南京将不再把革命局限在国境之内。亚洲各地的工人、农民和殖民地士兵都可能成为火种。"
 UP_CHI_asian_revolution_center: "亚洲革命中心"
 UP_CHI_asian_revolution_center_desc: "没有苏联的世界里，中国可以成为新的亚洲革命中心。"
 UP_CHI_spark_of_world_revolution: "世界革命的火种"
 UP_CHI_spark_of_world_revolution_desc: "革命政府将把战争、宣传和地下组织结合起来，让世界意识到东方的新中心已经出现。"
 UP_CHI_east_is_red_over_asia: "东方红照耀亚洲"
 UP_CHI_east_is_red_over_asia_desc: "南京不再只是中国的革命政府，而是亚洲红色运动的灯塔。"
 UP_CHI_restore_national_economy: "恢复国民经济"
 UP_CHI_restore_national_economy_desc: "革命需要面包、煤炭、机器和铁路。南京必须从战争中恢复国民经济。"
 UP_CHI_first_five_year_plan: "第一个五年计划"
 UP_CHI_first_five_year_plan_desc: "计划经济将把零散的工业、铁路和资源建设纳入统一节奏。"
 UP_CHI_agricultural_collectivization: "农业合作化"
 UP_CHI_agricultural_collectivization_desc: "农业合作化将提高粮食组织能力，也让农村生产与国家计划更紧密地连接。"
 UP_CHI_peoples_industrialization: "人民工业化"
 UP_CHI_peoples_industrialization_desc: "没有工业，革命就无法保卫自己。人民工业化将培养工程师、技术员和新的科研体系。"
 UP_CHI_revolutionary_modern_state: "革命现代国家"
 UP_CHI_revolutionary_modern_state_desc: "革命不能永远停留在动员阶段。中国式社会主义将把国家建设、工业生产和社会改造结合起来。"
 UP_CHI_army_above_parties: "军队高于党派"
 UP_CHI_army_above_parties_desc: "军国主义派宣布革命同盟不能再被地方委员会、派系争论和党务纠缠拖住。军队必须高于党派，国家必须服从统一命令。"
 UP_CHI_purge_localism: "清洗地方主义"
 UP_CHI_purge_localism_desc: "地方主义是统一战争的毒药。南京将解锁整合地方军阀的决议，把分裂势力逐步纳入中央。"
 UP_CHI_establish_national_military_council: "成立国家军事委员会"
 UP_CHI_establish_national_military_council_desc: "国家军事委员会将取代松散的革命军会议，把作战计划、军官任免和全国动员纳入同一指挥体系。"
 UP_CHI_young_officer_mobilization: "青年军官动员"
 UP_CHI_young_officer_mobilization_desc: "新一代军官不愿再等待旧中国自然腐烂。他们要求训练、纪律和快速动员。"
 UP_CHI_national_revival_movement: "国家复兴运动"
 UP_CHI_national_revival_movement_desc: "革命不再只是阶级口号，也将成为民族复兴的工具。南京要把社会动员转化为国家主义热情。"
 UP_CHI_expand_the_juntong: "军统扩权"
 UP_CHI_expand_the_juntong_desc: "情报机关将获得更大权力，监控地方派系、军队异动和政治反对者。秩序有时需要阴影。"
 UP_CHI_unify_thought: "统一思想"
 UP_CHI_unify_thought_desc: "国家不能被多种旗帜撕碎。南京将以统一思想压制派系争论。"
 UP_CHI_party_state_unity: "党国一体"
 UP_CHI_party_state_unity_desc: "党、军、国家将被合成同一套统治机器。威权民族主义成为南京政权的新面孔。"
 UP_CHI_iron_blood_republic: "铁血共和国"
 UP_CHI_iron_blood_republic_desc: "共和国将以钢铁、军营和工厂重新定义自己。代价是社会不再拥有喘息空间。"
 UP_CHI_recover_the_northeast: "收复东北"
 UP_CHI_recover_the_northeast_desc: "满洲问题是中国统一的伤口。南京不会承认脱离中国的东北政权。"
 UP_CHI_revenge_against_japan: "对日复仇"
 UP_CHI_revenge_against_japan_desc: "日本的远东扩张必须被清算。复仇不只是情绪，也是国家战略。"
 UP_CHI_new_order_in_east_asia: "东亚新秩序"
 UP_CHI_new_order_in_east_asia_desc: "南京将宣称朝鲜、蒙古和远东地区属于中国势力范围，旧帝国主义秩序必须被新的东亚秩序取代。"
 UP_CHI_greater_asian_expedition: "大亚细亚远征"
 UP_CHI_greater_asian_expedition_desc: "中国将不再只追求边境安全，而要扶植亚洲卫星国，建立自己的势力圈。"
 UP_CHI_asia_for_asians: "亚洲属于亚洲人"
 UP_CHI_asia_for_asians_desc: "在南京的旗帜下，亚洲应摆脱欧洲、日本和旧帝国残余的支配。新的秩序将由中国主导。"
 UP_CHI_pan_asianist_bloc: "泛亚主义派"
 UP_CHI_pan_asianist_bloc_desc: "泛亚主义派认为中日长期对抗正在消耗整个东亚。若中国能够以外交和经济重建亚洲秩序，南京也许能用另一种方式取得主导权。"
 UP_CHI_reconsider_japan_policy: "重新审视日本问题"
 UP_CHI_reconsider_japan_policy_desc: "长达二十年的中日对抗已经严重削弱了整个东亚。日本究竟只能是敌人，还是也可能成为未来亚洲秩序中危险但必要的伙伴？"
 UP_CHI_war_or_peace: "战争还是和平？"
 UP_CHI_war_or_peace_desc: "南京将向东京提出和解试探。日本的回应会决定这条路线是打开新亚洲的大门，还是成为强硬派嘲笑的天真幻想。"
 UP_CHI_nanjing_tokyo_joint_declaration: "南京-东京联合宣言"
 UP_CHI_nanjing_tokyo_joint_declaration_desc: "若双方愿意暂时放下最尖锐的敌意，一份联合宣言将成为外交破冰的第一块石头。它不会消除仇恨，但会让国家机器开始转向。"
 UP_CHI_stop_anti_japanese_propaganda: "停止反日宣传"
 UP_CHI_stop_anti_japanese_propaganda_desc: "宣传机关将被要求降温。街头标语、报纸社论和学校教材不会一夜改变，但政府会开始把怒火收进抽屉。"
 UP_CHI_invite_japanese_observers: "邀请日本观察团"
 UP_CHI_invite_japanese_observers_desc: "日本军官和技术观察员将进入中国训练场。双方都知道他们会记录一切，但这正是交易的一部分。"
 UP_CHI_open_sino_japanese_trade: "开放中日贸易"
 UP_CHI_open_sino_japanese_trade_desc: "贸易比宣言更冷，也更可靠。港口、合同、机器和货船将试探双方合作的真实边界。"
 UP_CHI_joint_development_of_manchuria: "联合开发满洲"
 UP_CHI_joint_development_of_manchuria_desc: "满洲曾经是中日冲突的核心伤口。若双方都不准备立刻撕开它，就先用工厂、铁路和投资把火药桶封住。"
 UP_CHI_sino_japanese_technical_exchange: "中日技术交流"
 UP_CHI_sino_japanese_technical_exchange_desc: "工程师、军械专家和铁路技术员会比外交官更早说上同一种语言。技术合作让双方都获得喘息。"
 UP_CHI_unify_railway_standards: "统一铁路标准"
 UP_CHI_unify_railway_standards_desc: "如果货物、军队和机器无法顺畅流动，泛亚主义只是口号。铁路、仓库和调度标准将被纳入共同规划。"
 UP_CHI_asian_development_bank: "建立亚洲开发银行"
 UP_CHI_asian_development_bank_desc: "新的亚洲秩序不能只靠军队维持，也需要贷款、工程、港口和贸易网络。开发银行将把合作写进账本。"
 UP_CHI_pan_asianism: "亚洲属于亚洲人"
 UP_CHI_pan_asianism_desc: "南京开始把外交语言从中日和解扩大为泛亚主义。旧列强不会喜欢这种口号，因为它开始触碰殖民秩序本身。"
 UP_CHI_oppose_western_imperialism: "共同反对西方帝国主义"
 UP_CHI_oppose_western_imperialism_desc: "英法美仍控制海路、殖民地和金融秩序。中日若要建立新亚洲，就必须公开挑战西方帝国主义。"
 UP_CHI_support_asian_liberation_movements: "支援亚洲民族解放运动"
 UP_CHI_support_asian_liberation_movements_desc: "印度、印度支那、印尼和缅甸的民族运动都能成为新秩序的筹码。南京将解锁对应决议。"
 UP_CHI_east_asian_cooperation_council: "东亚合作委员会"
 UP_CHI_east_asian_cooperation_council_desc: "合作不能永远依靠临时密谈。东亚合作委员会将把贸易、铁路、外交和安全议题放进同一张桌子。"
 UP_CHI_found_east_asian_community: "成立东亚共同体"
 UP_CHI_found_east_asian_community_desc: "中国与日本将尝试进入同一阵营。亚洲政治从敌对走向一种更危险、更庞大的共同体实验。"
 UP_CHI_joint_military_council: "联合军事委员会"
 UP_CHI_joint_military_council_desc: "共同体需要共同参谋语言。联合军事委员会将推动训练、情报和军工经验的交换。"
 UP_CHI_mutual_defense_treaty: "共同防御条约"
 UP_CHI_mutual_defense_treaty_desc: "一旦共同体被攻击，中日将互相保证独立。这个承诺会让许多人不安，也会让许多人重新计算风险。"
 UP_CHI_new_asian_order: "新亚洲秩序"
 UP_CHI_new_asian_order_desc: "中国与日本将共同承担亚洲的未来，并彻底终结西方列强主导亚洲命运的时代。"
 UP_anti_japanese_propaganda: "反日宣传"
 UP_anti_japanese_propaganda_desc: "长期敌意被写进宣传、教育和街头政治。停止它会降低战争热情，却能为外交破冰留出空间。"
 UP_sino_japanese_trade: "中日贸易开放"
 UP_sino_japanese_trade_desc: "港口、合同和货船正在把政治上的冒险变成经济上的现实。"
 UP_sino_japanese_technical_exchange: "中日技术交流"
 UP_sino_japanese_technical_exchange_desc: "技术人员和工程图纸的流动正在让双方获得新的科研经验。"
 UP_unified_railway_standards: "统一铁路标准"
 UP_unified_railway_standards_desc: "铁路、仓库和调度标准正在被统一，区域补给体系因此更顺畅。"
 UP_asian_development_bank: "亚洲开发银行"
 UP_asian_development_bank_desc: "开发银行用贷款、工程和工业合同把泛亚合作固定下来。"
 UP_joint_military_council: "联合军事委员会"
 UP_joint_military_council_desc: "联合军事委员会推动训练、情报和军事研究的有限共享。"
 UP_new_asian_order: "新亚洲秩序"
 UP_new_asian_order_desc: "中日共同体正在成为亚洲政治的新中心。它承诺摆脱西方支配，也带来了全新的权力风险。"
 East_Asian_Community: "东亚共同体"
 asian_reconciliation: "亚洲和解"
 anti_western_imperialism: "反西方帝国主义"
 UP_CHI_support_indian_revolution: "支持印度革命"
 UP_CHI_support_indian_revolution_desc: "向印度革命者提供政治资金、宣传经验和地下联络。"
 UP_CHI_support_indochina_independence: "支持印度支那独立"
 UP_CHI_support_indochina_independence_desc: "法国殖民体系的裂缝，是泛亚主义最容易敲开的门。"
 UP_CHI_support_indonesian_nationalism: "支持印尼民族主义"
 UP_CHI_support_indonesian_nationalism_desc: "南洋群岛的民族主义者需要资金、广播和外部承认。"
 UP_CHI_support_burmese_independence: "支持缅甸独立"
 UP_CHI_support_burmese_independence_desc: "缅甸是英属印度体系向东延伸的关键一环，也是新亚洲秩序必须触碰的边界。"
 up_asia.140.t: "来自南京的提议"
 up_asia.140.d: "南京革命政府通过秘密渠道提出和解：中日应停止互相消耗，转而共同塑造亚洲未来。东京必须决定这是机会、陷阱，还是彻头彻尾的幻想。"
 up_asia.140.a: "归还台湾，建立真正的亚洲同盟。"
 up_asia.140.b: "要求中国承认帝国在东北、天津与台湾的权益。"
 up_asia.140.c: "拒绝这些天真的幻想。"
 up_asia.141.t: "亚洲新时代开始了"
 up_asia.141.d: "东京接受了南京最大胆的提议。台湾被归还，中日将共同宣布东亚共同体的诞生。街头仍有怀疑，军队仍在戒备，但历史已经转弯。"
 up_asia.141.a: "危险，但值得。"
 up_asia.142.t: "东京提出条件"
 up_asia.142.d: "日本拒绝完全让步，只愿在中国承认其既有权益的前提下继续谈判。南京现在必须在泛亚主义理想与国家尊严之间做出艰难选择。"
 up_asia.142.a: "为了亚洲的未来，我们接受。"
 up_asia.142.b: "中国绝不会出卖自己的领土。"
 up_asia.143.t: "东京拒绝和解"
 up_asia.143.d: "日本政府拒绝了南京的提议，并将其称为革命政权的外交幻术。泛亚主义派遭受重击，强硬派则要求准备下一场战争。"
 up_asia.143.a: "那就让他们记住这个决定。"
 UP_army_above_parties: "军队高于党派"
 UP_army_above_parties_desc: "军队正在压过地方委员会和党内派系，成为南京政权的真正脊梁。"
 UP_purge_localism: "清洗地方主义"
 UP_purge_localism_desc: "地方主义被视为国家统一的障碍。南京开始以军事和政治手段削弱地方割据。"
 UP_national_military_council: "国家军事委员会"
 UP_national_military_council_desc: "国家军事委员会统一军队规划，提高作战组织和计划速度。"
 UP_young_officer_mobilization: "青年军官动员"
 UP_young_officer_mobilization_desc: "青年军官推动征兵、训练和纪律改革，让南京军队更像一台现代战争机器。"
 UP_chinese_revivalism: "中华复兴主义"
 UP_chinese_revivalism_desc: "民族复兴被置于革命之上。稳定、战争支持和国家主义热情随之上升。"
 UP_juntong_expansion: "军统扩权"
 UP_juntong_expansion_desc: "扩权后的军统压制抵抗、监控地方并降低政治整合成本。"
 UP_unified_thought: "统一思想"
 UP_unified_thought_desc: "统一思想运动推动威权民族主义上升，并暂时稳定国家。"
 UP_iron_blood_republic: "铁血共和国"
 UP_iron_blood_republic_desc: "铁血共和国用工厂和兵源换取扩张能力，但社会稳定受到压迫。"
 UP_greater_asian_order: "大亚细亚秩序"
 UP_greater_asian_order_desc: "中国主导的大亚细亚秩序强调快速正当化战争、陆军攻势和对附庸体系的动员。"
 UP_china_asian_sphere_decisions: "中国势力圈"
 UP_CHI_establish_chinese_sphere: "建立中国势力圈"
 UP_CHI_pressure_mongolia: "迫使蒙古入圈"
 UP_CHI_pressure_far_east: "迫使远东入圈"
 UP_CHI_prepare_korean_satellite: "扶植朝鲜卫星国"
 UP_new_land_reform: "新土改"
 UP_new_land_reform_desc: "土地改革让农村动员更深入，也让地主阶级和旧乡绅的不满迅速上升。"
 UP_landlord_discontent: "地主阶级不满"
 UP_landlord_discontent_desc: "旧乡绅、地主和地方债权网络正在抵抗南京的农村改革。"
 UP_rural_grassroots_organization: "农村基层组织"
 UP_rural_grassroots_organization_desc: "乡村工作队、农会和地方干部网络让南京政府得以更深入地控制基层。"
 UP_people_communes: "人民公社"
 UP_people_communes_desc: "人民公社提高了组织化建设能力，但也让消费品和社会稳定承受压力。"
 UP_mass_line: "群众路线"
 UP_mass_line_desc: "群众路线提高了政权的政治动员能力，并稳住了革命政府与基层社会之间的关系。"
 UP_centralization_reform: "中央集权改革"
 UP_centralization_reform_desc: "南京开始削弱地方革命委员会的自治空间，把地方权力重新纳入中央。"
 UP_permanent_land_revolution: "永久土地革命"
 UP_permanent_land_revolution_desc: "土地革命被继续推进，农村人口动员和革命热情进一步增强。"
 UP_asian_revolution_center: "亚洲革命中心"
 UP_asian_revolution_center_desc: "南京开始承担亚洲革命中心的角色，向周边输出组织、宣传和经验。"
 UP_spark_of_world_revolution: "世界革命的火种"
 UP_spark_of_world_revolution_desc: "中国革命不再只防御自身，它准备在世界革命中主动出击。"
 UP_eastern_revolution_center: "东方革命中心"
 UP_eastern_revolution_center_desc: "东方红照耀亚洲。南京成为亚洲革命者仰望的新中心。"
 UP_first_five_year_plan: "第一个五年计划"
 UP_first_five_year_plan_desc: "第一个五年计划将工业建设和基础设施纳入国家计划。"
 UP_agricultural_collectivization: "农业合作化"
 UP_agricultural_collectivization_desc: "农业合作化提高了粮食组织能力，并推动农村人口和生产进入计划体系。"
 UP_chinese_socialism: "中国式社会主义"
 UP_chinese_socialism_desc: "中国革命把工业化、科研体系和本土社会主义建设结合成自己的道路。"
 UP_mao_support_high: "领袖支持度"
 UP_mao_support_high_desc: "毛泽东的政治支持处于高位，中央命令更容易贯彻，社会动员也更顺畅。但过高的个人权威正在挤压技术讨论和正常行政。"
 UP_mao_support_above_average: "领袖支持度"
 UP_mao_support_above_average_desc: "毛泽东仍然拥有较强政治支持，路线争论暂时没有压垮行政秩序。少量个人权威成本仍然存在。"
 UP_mao_support_below_average: "领袖支持度"
 UP_mao_support_below_average_desc: "毛泽东的政治支持低于安全线，行政稳定受到影响；但较弱的个人权威也给技术官僚和务实派留下了更多操作空间。"
 UP_mao_support_low: "领袖支持度"
 UP_mao_support_low_desc: "毛泽东的政治支持明显不足，怀疑、观望和派系串联正在削弱中央治理。与此同时，务实部门获得了更大的政策空间。"
 UP_revolutionary_army_production_drive: "革命军生产动员"
 UP_revolutionary_army_production_drive_desc: "军队整编带动了兵工系统和训练体系的集中投入。"
 UP_standardized_army_production: "标准化军械生产"
 UP_standardized_army_production_desc: "统一编制、统一口径和统一补给标准，让军事生产获得更高效率。"
 UP_whampoa_modernization_board: "黄埔现代化委员会"
 UP_whampoa_modernization_board_desc: "黄埔系军官建立了面向参谋、训练、军工和技术装备的现代化协调机构。"
 UP_china_foreign_revolution_decisions: "支持外国革命"
 UP_CHI_support_red_india: "支援红色印度"
 UP_CHI_support_asian_cells: "扶持亚洲地下小组"
 up_asia.130.t: "地方革命委员会骚动"
 up_asia.130.d: "中央整顿命令抵达地方后，一些革命委员会拒绝交出既得权力。它们没有足够力量挑战南京，却足以制造混乱、拖延征粮和削弱基层秩序。"
 up_asia.130.a: "把他们压下去。"
 UP_long_march_myth: "长征神话"
 UP_long_march_myth_desc: "在这个世界里，长征不只是撤退求生，而是穿透中国内陆、吸纳农民军和地方革命者的胜利行军。"
 UP_reconstruction_ruins: "百废待兴"
 UP_reconstruction_ruins_desc: "南京已经被革命军夺下，但工厂、铁路、财政、军队和地方治理都需要从战争废墟中重新建立。"
 UP_local_revolutionary_committees: "地方革命委员会"
 UP_local_revolutionary_committees_desc: "地方革命委员会能迅速动员群众和兵员，却也让南京政府面对大量分散、激进、难以约束的基层权力。"
 UP_unfinished_revolution: "未完成的革命"
 UP_unfinished_revolution_desc: "重庆仍在，华南军阀仍在，边疆地方势力仍在。南京革命政府夺下了中心，却还没有完成中国革命。"
 UP_northern_mire: "北进泥潭"
 UP_northern_mire_desc: "远东、满洲和西伯利亚方向给陆军带来经验与荣耀，也不断吞噬帝国的人力和战略余裕。"
 UP_zaibatsu_rule: "财阀统治"
 UP_zaibatsu_rule_desc: "财阀支撑了帝国工业和投资网络，也用资本、银行和军需合同拖慢政府决策。"
 UP_army_navy_rivalry: "陆海军对立"
 UP_army_navy_rivalry_desc: "陆军和海军都声称自己才代表帝国未来。两个体系各自强大，却让国家战略被撕成两半。"
 UP_revolutionary_reconstruction: "革命建国创伤"
 UP_revolutionary_reconstruction_desc: "中华人民共和国已经统一大部分中国本土，但旧军阀、地方派系、旧国民政府残余和革命群众组织仍在新国家内部互相拉扯。胜利不是终点，而是重建的开始。"
 UP_asian_red_center: "亚洲红色中心"
 UP_asian_red_center_desc: "十月革命失败后，欧亚大陆没有形成稳定的红色中心。中国革命没有得到外部庇护，却在自己的土地上杀出了一条道路。"
 UP_china_history_booklet: "《赤潮东来》小册子"
 UP_china_history_booklet_desc: "这本小册子记录了本世界线中中国革命的分歧点：没有苏联，没有外部红色中心，只有被迫本土化的革命、崩塌的国民政府，以及从长征中杀出的人民共和国。"
 UP_chinese_marxist_consolidation: "中国特色马克思主义道路"
 UP_chinese_marxist_consolidation_desc: "共和国选择继续走本土化马克思主义道路。革命不再依赖外部中心，而要在中国自己的土地、军队、工厂和群众组织中完成制度化。"
 UP_people_war_resistance: "人民战争抵抗"
 UP_people_war_resistance_desc: "日本若试图扑灭中国革命，就会发现它面对的不是一个旧式政权，而是一整个被组织起来的社会。"
 UP_civilian_mobilization_card: "民工动员卡"
 UP_civilian_mobilization_card_desc: "基层组织、合作社、地方干部和群众动员网络被投入重建。它们不能立刻制造坦克，却能把国家重新缝合起来。"
 UP_military_mobilization_card: "军工动员卡"
 UP_military_mobilization_card_desc: "共和国将分散的兵工厂、旧军阀仓库和新建军工体系纳入统一调度，准备打一场真正的现代战争。"
 UP_china_rising: "中华崛起"
 UP_china_rising_desc: "没有苏联的庇护，中国革命仍然胜利。一个统一、动员、工业化中的人民共和国正在亚洲中心重新站起来。"
 UP_liberation_offensive: "先发制人解放论"
 UP_liberation_offensive_desc: "东京与哈尔滨的存在本身就是对中国革命的威胁。与其等待战争降临，不如先把战争推向敌人的边界。"
 UP_asian_liberation_claim: "亚洲解放宣言"
 UP_asian_liberation_claim_desc: "中国宣布自己不再只是防御革命成果，而要主动改写亚洲秩序。"
 UP_sino_japanese_research_pact: "中日科技同盟"
 UP_sino_japanese_research_pact_desc: "北京与东京之间建立了有限科技交换机制。这不是信任，而是共同承认：亚洲不能永远由欧洲决定命运。"
 UP_asian_cooperation_boom: "亚洲协作建设"
 UP_asian_cooperation_boom_desc: "中日缓和使资金、技术、港口和工业计划开始跨国流动。和平虽然脆弱，但工厂已经开始运转。"
 UP_cadre_rectification: "干部整风"
 UP_cadre_rectification_desc: "共和国开始清理胜利行军中遗留的临时指挥、地方山头和旧式官僚习气。革命必须从运动变成国家机器。"
 UP_revolutionary_planning_commission: "革命计划委员会"
 UP_revolutionary_planning_commission_desc: "从铁路、粮食、煤炭到机器进口，建设不再依靠地方自发，而由中央计划机构统筹推进。"
 UP_youth_cultural_workgroups: "青年文化工作队"
 UP_youth_cultural_workgroups_desc: "学生、画师、剧团、放映队和新式连环画作者被组织起来，把革命叙事送进工厂、学校和前线。"
 UP_new_china_economic_miracle: "新中国经济奇迹"
 UP_new_china_economic_miracle_desc: "三年制度化建设终于结出果实。中国革命从夺取政权走向重建国家，工厂、铁路、学校、兵工厂和基层组织被纳入同一个发展节奏。"
 UP_border_liberation_staff: "边境解放参谋部"
 UP_border_liberation_staff_desc: "共和国组建专门参谋机构，研究满洲、日本和远东残余势力。战争不再是临时反应，而是长期计划。"
 UP_forward_military_industry: "前进军工体系"
 UP_forward_military_industry_desc: "军工生产开始向北方和沿海战略方向倾斜。铁路、仓库和兵工厂围绕下一场战争重新布置。"
 UP_liberation_broadcast_network: "解放广播网"
 UP_liberation_broadcast_network_desc: "电台、传单、电影车和前线宣传队共同告诉亚洲：北京不只是要夺回边疆，还要改写旧秩序。"
 UP_liberated_asia_economic_miracle: "解放亚洲经济奇迹"
 UP_liberated_asia_economic_miracle_desc: "扩张带来的港口、铁路、军工订单和动员体系被整合成新的增长机器。中国以战争打开边界，又以建设巩固战果。"
 UP_sino_japanese_coordination_office: "中日协调办公室"
 UP_sino_japanese_coordination_office_desc: "双方都不真正信任对方，但工程师、贸易代表和军方联络员已经开始在同一张桌子上工作。"
 UP_shared_asian_standards: "亚洲共同标准"
 UP_shared_asian_standards_desc: "铁路规格、机器零件、港口流程和技术教材被逐步标准化。合作的政治语言仍然刺耳，但工业语言已经先一步统一。"
 UP_tokyo_shanghai_media_current: "东京-上海媒体潮"
 UP_tokyo_shanghai_media_current_desc: "报纸、动画短片、广播剧和通俗杂志开始塑造一种奇异的亚洲现代感：红色中国与日本帝国在同一个画面里互相试探。"
 UP_co_prosperity_economic_miracle: "共荣经济奇迹"
 UP_co_prosperity_economic_miracle_desc: "中日合作从危险试探变成制度化秩序。港口、资本、技术标准和大陆市场共同推动了亚洲协作阵线的经济爆发。"
 UP_imperial_overstretch: "帝国过伸"
 UP_imperial_overstretch_desc: "日本赢得了远东，却失去了帝国的平衡。满洲、朝鲜、滨海边疆和太平洋压力正在同时吞噬东京的财政、军队与政治耐心。"
 UP_kwantung_autonomy_crisis: "关东军自主危机"
 UP_kwantung_autonomy_crisis_desc: "远东扩张让关东军获得了过大的权力。东京的命令越过海峡抵达满洲时，已经常常变成建议。"
 UP_japan_overstretch_audit: "帝国过伸审计"
 UP_japan_overstretch_audit_desc: "东京终于开始承认问题：远东不是战利品清单，而是一张不断索要驻军、铁路、补给、顾问和政治耐心的账单。"
 UP_japan_army_ascendant: "陆军主导"
 UP_japan_army_ascendant_desc: "陆军声称帝国的真正威胁来自大陆。它要求更多预算、更多铁路、更多驻军，以及更少来自海军和文官的阻挠。"
 UP_japan_siberian_buffer_plan: "西伯利亚缓冲计划"
 UP_japan_siberian_buffer_plan_desc: "若俄国已经碎裂，日本就不该等待新的强权从废墟中爬出。远东需要一圈由东京扶植的缓冲政权。"
 UP_japan_navy_ascendant: "海军主导"
 UP_japan_navy_ascendant_desc: "海军拒绝继续把资源丢进远东泥潭。南方的石油、橡胶、港口和海上通道才是帝国生存的关键。"
 UP_japan_southern_resource_plan: "南方资源计划"
 UP_japan_southern_resource_plan_desc: "日本将重新计算南洋资源、航线、炼油与海军基地。远东带来压力，南方才可能带来燃料。"
 UP_japan_showa_mobilization: "昭和总动员"
 UP_japan_showa_mobilization_desc: "青年军官要求国家摆脱党派、财阀和软弱内阁的拖累。帝国将被重新塑造成一个军事动员机器。"
 UP_japan_purged_zaibatsu_state: "清洗财阀特权"
 UP_japan_purged_zaibatsu_state_desc: "财阀没有消失，只是被迫跪在军靴旁重新签署合同。利润仍在，但国家控制已经插进每一座工厂。"
 UP_japan_imperial_contraction_plan: "帝国收缩计划"
 UP_japan_imperial_contraction_plan_desc: "放弃一部分虚荣，保住真正的核心。帝国收缩派试图把日本从满洲、远东和国内军部的三重压力中拉回来。"
 UP_japan_pacific_defense_circle: "太平洋防御圈"
 UP_japan_pacific_defense_circle_desc: "日本将放弃无限扩张的幻想，转向岛链、港口、岸防和舰队补给组成的防御体系。"
 UP_japan_manchurian_reconquest_staff: "满洲再征服参谋部"
 UP_japan_manchurian_reconquest_staff_desc: "哈尔滨的背叛不能被忘记。东京开始准备一套更直接、更粗暴的满洲方案。"
 UP_japan_restored_balance: "帝国平衡恢复"
 UP_japan_restored_balance_desc: "不论通过北进、南进还是收缩，帝国至少暂时找回了方向。各派仍然互相仇视，但国家机器终于重新开始运转。"
 UP_unleashed_puppet: "脱缰的傀儡"
 UP_unleashed_puppet_desc: "满洲保皇派曾是日本扶植的缓冲工具，如今却在日本内耗中坐大。它名义独立，实际夹在中国、日本和俄国残余之间。"
 UP_imperial_claims_in_exile: "流亡帝统"
 UP_imperial_claims_in_exile_desc: "清室与旧官僚仍在东北维持正统幻梦。对一些人来说，满洲只是避难所；对另一些人来说，这里是反攻北京的起点。"
 UP_delhi_transfer_crisis: "德里移交危机"
 UP_delhi_transfer_crisis_desc: "英国提前移交权力，却没有解决军队、土邦、种姓政治和土地问题。自由降临印度的当天，红色民兵与黑色卫队已经开始拔枪。"
 UP_russian_collapse: "俄国崩解"
 UP_russian_collapse_desc: "1917年的革命失败没有拯救旧帝国。布尔什维克被临时政府强硬镇压，但军队、民族边疆和粮食系统仍然崩溃。如今的俄国不是苏联，而是一片由军政府、共和国、地方联盟、农民军和复辟派争夺的废墟。"

 up_asia.1.t: "赤潮东来"
 up_asia.1.d: "十月革命失败后，中国共产党失去了外部红色中心的庇护。1927年，蒋介石在北伐期间遇刺身亡，国民政府随即陷入分裂。毛泽东、周恩来等革命者趁机联合残党、地方农民武装与失意青年军官，于1928年组建中华人民革命同盟。1933年，革命军攻占南京并建立革命政府。\n\n但中国并未统一。重庆国民政府仍在西南坚持，华南地方军阀与其结成同盟，新疆、西藏和各地边疆势力依旧保持事实自治。南京的革命胜利只是新内战的开端。"
 up_asia.1.a: "革命夺下了南京，还没有夺下整个中国。"
 up_asia.2.t: "远东真空"
 up_asia.2.d: "俄国没有形成苏联，莫斯科最终无力维持西伯利亚铁路以东的控制。日本趁机提前北进，建立从满洲到滨海边疆的军事影响圈。但扩张太早也意味着负担太重。陆军、海军、财阀和文官政府都在争夺帝国的方向，而满洲保皇派正在东京的犹豫中逐渐脱离掌控。"
 up_asia.2.a: "帝国赢得了土地，却输掉了余裕。"
 up_asia.3.t: "哈尔滨宣言"
 up_asia.3.d: "满洲保皇派宣布废除与日本签订的不平等军事协定，要求日本撤出全部顾问和驻军。东京陆军震怒，海军拒绝为远东战争买单，中国则宣称东北问题属于中国革命未竟事业。哈尔滨的电报让整个远东同时屏住了呼吸。"
 up_asia.3.a: "傀儡已经学会自己开口。"
 up_asia.4.t: "德里移交危机"
 up_asia.4.d: "英国宣布提前移交印度权力，但殖民军队、土邦利益、种姓政治和土地问题都被留在原地。移交当天，红色民兵和黑色卫队在德里、加尔各答、孟买同时冲突。自由没有带来统一，反而把印度推向红与黑的撕裂。"
 up_asia.4.a: "帝国退场，内战登台。"
 up_asia.5.t: "没有苏联的俄国"
 up_asia.5.d: "1917年，二月革命后的临时政府比原本历史更强硬地镇压了布尔什维克。十月革命失败了，但沙皇帝国并没有因此得救。前线军队继续瓦解，粮食系统崩溃，民族边疆纷纷脱离，旧官僚和军官团只能守住破碎的核心地区。到1936年，俄国已不再是苏联，而是彼得格勒共和国、莫斯科军政府、高加索联盟、西伯利亚共和国和各类白俄、农民军、无政府主义者并存的残破空间。"
 up_asia.5.a: "革命失败了，帝国也失败了。"
 up_asia.10.t: "关东军拒绝沉默"
 up_asia.10.d: "哈尔滨的挑衅正在满洲各地扩散。关东军军官要求东京立刻恢复军事协定，陆军省也在向内阁施压；但海军和财阀都警告，远东泥潭可能拖垮整个帝国。"
 up_asia.10.a: "暂时压下他们。"
 up_asia.10.b: "让边境听见军靴声。"
 up_asia.11.t: "满洲要求独立"
 up_asia.11.d: "哈尔滨宣言抵达东京。满洲保皇派宣布废除与日本签订的不平等军事协定，要求撤出顾问和驻军。陆军将此视为对帝国威信的公开羞辱；海军和财阀则警告，若日本为满洲再打一场远东战争，帝国过伸将变成帝国崩塌。"
 up_asia.11.a: "承认满洲独立。"
 up_asia.11.b: "拒绝。关东军将恢复秩序。"
 up_asia.12.t: "满洲再征服"
 up_asia.12.d: "满洲保皇派的独立尝试已经被帝国军队粉碎。东京决定不再让溥仪的宫廷承担缓冲区的政治风险，而是扶植更适合合作的汪精卫政权。满洲重新成为日本附庸，但这场胜利也证明：帝国只能用战争维持自己的边界。"
 up_asia.12.a: "让汪精卫接管哈尔滨。"

 up_asia.100.t: "开局背景：中华人民革命同盟"
 up_asia.100.d: "这个世界没有苏联。十月革命失败后，中国革命失去了外部红色中心；1927年蒋介石遇刺后，国民政府核心崩塌，革命者、地方农民武装、左翼残党与失意青年军官重新集结。\n\n1933年，革命军攻占南京并建立中华人民革命同盟，毛泽东成为南京革命政府的领袖。但重庆国民政府、华南地方军阀、新疆、西藏和边疆军阀依旧存在。你开局控制的是一个赢得南京、尚未赢得中国的革命政权。"
 up_asia.100.a: "明白。"
 up_asia.101.t: "开局背景：日本帝国"
 up_asia.101.d: "在原本历史中，日本仍在争论北进与南进；在这个世界，日本已经更早介入远东。俄国退出后，日本扶植满洲、控制朝鲜，并试图把滨海边疆纳入军事影响圈。但扩张太早让帝国财政、陆海军关系、财阀利益和殖民地安全同时承压。哈尔滨宣言将迫使东京决定：承认满洲独立以保住帝国平衡，还是让关东军重新点燃远东战争。"
 up_asia.102.t: "开局背景：满洲保皇派"
 up_asia.102.d: "满洲不再只是原版历史中的日本傀儡。日本过早扩张远东后陷入内耗，给了满洲保皇派坐大的机会。溥仪仍是开局领袖，但他的政权夹在日本、中国和俄国残余之间。哈尔滨宣言会要求日本承认满洲独立；若东京拒绝，满洲必须立刻面对帝国军队。"
 up_asia.103.t: "开局背景：印度"
 up_asia.103.d: "这个世界的印度不是原版的殖民自治领，也不是简单的印巴分治。英国提前移交权力，却留下军队、土邦、种姓政治和土地问题。红色印度主张废除种姓、土地革命和工农武装；黑色印度则以婆罗门等级秩序、宗教权威和现代国家机器反共。印度的自由从第一天起就带着内战阴影。"
 up_asia.104.t: "开局背景：俄国废墟"
 up_asia.104.d: "原版的苏联在这个世界不存在。1917年二月革命后，临时政府更强硬地镇压布尔什维克，使十月革命失败；但沙皇也没能保住帝国。军队、民族边疆和粮食系统继续崩溃，俄国碎成彼得格勒共和国、莫斯科军政府、高加索联盟、西伯利亚共和国等继承者。你现在代表的是莫斯科周边的军政府核心，而不是一个统一的红色超级国家。"
 up_asia.105.t: "开局背景：德意志帝国泥潭"
 up_asia.105.d: "德国在东线赢得了比原本历史更彻底的胜利，但这并没有带来稳定。俄国没有苏联，东欧也不是安静的傀儡带，而是长期燃烧的民族战争地带。德国必须维持巨大的占领与保护体系，面对民族主义、泛斯拉夫主义、白俄复辟派、农民军和无政府主义者的轮番冲击。东线胜利正在变成帝国泥潭。"
 UP_china_focus: "中华人民共和国国策树"
 UP_CHI_revolutionary_foundation: "革命建国"
 UP_CHI_revolutionary_foundation_desc: "革命已经夺取国家，但新国家仍要把军队、财政、地方政权和群众组织重新编成可以运转的整体。"
 UP_CHI_open_political_question: "共和国路线问题"
 UP_CHI_open_political_question_desc: "统一只是开始。共和国必须决定自己如何生存：巩固革命，主动扩张，或与最危险的邻国达成交易。"
 UP_CHI_continue_chinese_marxism: "延续中国特色马克思主义道路"
 UP_CHI_continue_chinese_marxism_desc: "中国革命不是莫斯科模板的复制品。没有苏联的世界里，我们必须把马克思主义深深扎进中国自己的土地。中央将把农民战争、民族主义青年军官、工人组织和旧军阀残部压进同一个制度框架，让革命拥有自己的行政骨骼。"
 UP_CHI_first_party_congress: "第一届全国党代表大会"
 UP_CHI_first_party_congress_desc: "胜利后的党比长征时期庞大得多，也混杂得多。各地干部、红军旧部、城市地下党、投诚军官和群众组织代表将在首都重新定义共和国的路线。"
 UP_CHI_rectify_cadres: "干部整风"
 UP_CHI_rectify_cadres_desc: "战争胜利掩盖了很多问题：地方主义、临时任命、军队山头、旧官僚习气。整风不是单纯清洗，而是把运动型革命改造成能治理亿万人口的国家机器。"
 UP_CHI_clean_old_state_debris: "清理旧国家残余"
 UP_CHI_clean_old_state_debris_desc: "旧国民政府、地方军阀、投机官僚和半独立基层网络仍在新共和国体内留下碎片。共和国若要稳定，就必须拆掉这些旧国家残骸，同时避免让清算本身摧毁刚刚建立的秩序。"
 UP_CHI_rebuild_county_governments: "重建县级政权"
 UP_CHI_rebuild_county_governments_desc: "北京的命令若不能抵达县城、乡镇和粮仓，就只是一纸宣言。共和国将训练基层干部，重建税收、治安、粮食调拨和地方法院。"
 UP_CHI_mass_line_industry: "群众路线工业化"
 UP_CHI_mass_line_industry_desc: "工业化不能只靠城市技术官僚。农民、工人、地方干部和军队工程队都必须成为建设机器的一部分。每一座桥、每一条窄轨铁路、每一间修械所都将被纳入国家计划。"
 UP_CHI_model_communes: "模范合作社"
 UP_CHI_model_communes_desc: "土地改革之后，农村需要新的组织形式。模范合作社将承担粮食、教育、卫生、民兵和小工业任务，把分散乡村接入共和国的发展计划。"
 UP_CHI_revolutionary_animation_brigades: "革命动画放映队"
 UP_CHI_revolutionary_animation_brigades_desc: "文化工作者提出了一个有些古怪却有效的方案：用动画短片、连环画和巡回放映讲述土地改革、识字运动和前线英雄。年轻人愿意看，干部也就愿意试。"
 UP_CHI_literacy_and_technical_schools: "识字与技术学校"
 UP_CHI_literacy_and_technical_schools_desc: "没有识字率，就没有现代军队和现代工厂。共和国将在城市与乡村建立速成学校，让士兵、工人和农民学会阅读图纸、表格和命令。"
 UP_CHI_light_industry_push: "轻工业推进"
 UP_CHI_light_industry_push_desc: "重工业需要时间，但人民立刻需要布匹、药品、工具和日用品。轻工业恢复既能稳定社会，也能为长期工业化积累技术与资金。"
 UP_CHI_heavy_industry_commission: "重工业委员会"
 UP_CHI_heavy_industry_commission_desc: "煤、钢、机械和化工将决定共和国能否独立。中央建立重工业委员会，集中稀缺工程师、旧厂设备和外购机器。"
 UP_CHI_balance_civil_and_military: "军民建设平衡"
 UP_CHI_balance_civil_and_military_desc: "新中国不能只建兵工厂，也不能在日本威胁面前只建民用工厂。计划部门必须在防御、生活、运输和长期增长之间找到平衡。"
 UP_CHI_people_armaments: "人民军工体系"
 UP_CHI_people_armaments_desc: "旧仓库、地方兵工厂和新建工业区将被统一整合。革命必须拥有自己的钢铁与炮弹。"
 UP_CHI_anti_japanese_resistance_protocol: "抗日抵抗预案"
 UP_CHI_anti_japanese_resistance_protocol_desc: "若日本主动宣战，共和国不能只依靠正规军。铁路破袭、地方民兵、城市地下组织和前线宣传都将进入同一份预案。"
 UP_CHI_ten_year_development_outline: "十年发展纲要"
 UP_CHI_ten_year_development_outline_desc: "共和国终于可以把目光从战后清理转向长期建设。十年纲要将工业、教育、交通、农业和国防统一为一个庞大而耐心的工程。"
 UP_CHI_new_china_economic_miracle: "新中国经济奇迹"
 UP_CHI_new_china_economic_miracle_desc: "中国失去了苏联，却赢得了自己的革命。三年艰苦制度化后，一个统一、动员、工业化中的人民共和国正在亚洲中心重新站起来。"
 UP_CHI_preemptive_liberation_line: "先发制人解放路线"
 UP_CHI_preemptive_liberation_line_desc: "日本和满洲不会永远等待。共和国若要避免被包围，就必须先把战火推向威胁的源头。这条路线把东北问题、日本过伸和亚洲革命联系成一场主动战争。"
 UP_CHI_emergency_war_council: "紧急战争委员会"
 UP_CHI_emergency_war_council_desc: "党、军队、铁路部门、兵工厂和情报组织将进入战争委员会统一协调。共和国不能在开战后才学会战争。"
 UP_CHI_map_the_northeast: "重绘东北作战地图"
 UP_CHI_map_the_northeast_desc: "东北不是抽象口号，而是铁路、矿山、森林、要塞和城市组成的复杂战场。参谋部将重新整理满洲地图，准备把革命带回山海关外。"
 UP_CHI_secure_manchuria_claims: "东北未竟事业"
 UP_CHI_secure_manchuria_claims_desc: "满洲保皇派不是独立国家，而是旧秩序在东北的最后幻梦。共和国将公开宣布东北属于中国革命未竟事业，并为收回当地建立宣称与核心。"
 UP_CHI_forward_military_industry: "前进军工体系"
 UP_CHI_forward_military_industry_desc: "北方战争需要离前线更近的仓库、兵工厂和修械所。军工体系将向战略方向前移。"
 UP_CHI_border_railway_commands: "边境铁路司令部"
 UP_CHI_border_railway_commands_desc: "战争首先是一场运输竞赛。边境铁路司令部将把铁路、仓库、桥梁和军需调拨纳入统一指挥。"
 UP_CHI_japan_contingency_staff: "对日应急参谋部"
 UP_CHI_japan_contingency_staff_desc: "日本帝国已经过伸，但仍然拥有舰队、工业和老练军官。共和国需要一套专门对付日本的长期作战方案。"
 UP_CHI_preempt_japan: "对日预防战争"
 UP_CHI_preempt_japan_desc: "日本已经过伸，但仍然危险。趁帝国尚未恢复平衡，共和国可以先发制人，迫使东京在远东、中国和太平洋之间做出无法承受的选择。"
 UP_CHI_liberation_broadcasts: "解放广播网"
 UP_CHI_liberation_broadcasts_desc: "电台将越过国境，向朝鲜、满洲、日本工人和殖民地士兵广播。战争不只是炮兵的事情，也是想象力的事情。"
 UP_CHI_frontline_animation_units: "前线动画小队"
 UP_CHI_frontline_animation_units_desc: "随军文化队开始制作短篇动画、漫画传单和简易放映节目。士兵们笑着说这很幼稚，然后在下一次行军时继续哼里面的歌。"
 UP_CHI_integrate_liberated_ports: "整合解放港口"
 UP_CHI_integrate_liberated_ports_desc: "若战争夺取港口，革命就必须学会管理港口。海关、码头、仓库和工会将决定战果能否转化为力量。"
 UP_CHI_revolutionary_protectorates: "革命保护国体系"
 UP_CHI_revolutionary_protectorates_desc: "北京不再只谈边界，而开始谈秩序。被解放地区可以保留地方政府，但必须进入中国主导的亚洲革命保护体系。"
 UP_CHI_southern_doctrine: "南方战略论"
 UP_CHI_southern_doctrine_desc: "日本曾以资源和海权解释南进。中国将继承这个方向，却用反帝、革命和亚洲自主重新包装它。"
 UP_CHI_southern_liberation_offer: "南方解放橄榄枝"
 UP_CHI_southern_liberation_offer_desc: "解决日本和满洲后，中国可以继承南进论的地理方向，但赋予它革命与亚洲自主的语言。东南亚可以选择友谊，也可以选择被解放。"
 UP_CHI_southern_supply_depots: "南方补给仓网"
 UP_CHI_southern_supply_depots_desc: "中南半岛、南洋港口和沿海铁路不是口号能控制的地方。共和国必须建立仓库、转运站、码头管理队和海上补给计划，让南方战略真正拥有后勤骨架。"
 UP_CHI_liberated_asia_economic_miracle: "解放亚洲经济奇迹"
 UP_CHI_liberated_asia_economic_miracle_desc: "战争、港口、铁路、军工订单和革命保护国体系被整合成新的增长机器。共和国以战争打开边界，又以建设巩固战果。"
 UP_CHI_sino_japanese_friendship: "中日友好"
 UP_CHI_sino_japanese_friendship_desc: "这是一条危险、冷静而反直觉的道路。若北京与东京能暂时合作，亚洲秩序将彻底偏离原本历史。敌意不会消失，但国家有时会选择把敌意暂时放进抽屉。"
 UP_CHI_secret_tokyo_talks: "东京秘密会谈"
 UP_CHI_secret_tokyo_talks_desc: "公开外交会被双方强硬派撕碎，因此第一批代表只能在港口、租界和第三国饭店里秘密接触。"
 UP_CHI_common_research_front: "共同科研阵线"
 UP_CHI_common_research_front_desc: "类似苏德条约的技术合作可以让双方都获得喘息。信任并不必要，利益足够就行。工程师会说同一种机器语言，即便政治委员和参谋本部听不懂彼此。"
 UP_CHI_joint_industrial_committees: "联合工业委员会"
 UP_CHI_joint_industrial_committees_desc: "中日双方开始交换标准、合同和技术人员。每一份图纸都带着怀疑，但每一座新厂也都带着利润。"
 UP_CHI_deescalate_manchuria: "缓和满洲问题"
 UP_CHI_deescalate_manchuria_desc: "满洲是最危险的火药桶。北京与东京将尝试把它从战争导火索变成缓冲谈判桌，哪怕这张桌子随时可能被掀翻。"
 UP_CHI_tokyo_shanghai_media_current: "东京-上海媒体潮"
 UP_CHI_tokyo_shanghai_media_current_desc: "漫画杂志、动画短片、广播剧和现代都市流行语在东京与上海之间流动。政治家称之为文化交流，年轻人只是觉得新鲜。"
 UP_CHI_asian_common_front: "亚洲协作阵线"
 UP_CHI_asian_common_front_desc: "中日共同建立阵营，意味着亚洲政治从敌对走向一种更危险的共谋。它既可能结束欧洲支配，也可能制造一个更庞大的亚洲怪物。"
 UP_CHI_standardize_asian_rail: "亚洲铁路标准化"
 UP_CHI_standardize_asian_rail_desc: "若货物、部队和机器不能顺畅移动，阵营就是空话。铁路规格、港口流程和边境调度将进入统一计划。"
 UP_CHI_port_and_shipyard_accords: "港口与船厂协定"
 UP_CHI_port_and_shipyard_accords_desc: "中国需要海洋，日本需要大陆。港口、船厂和商船标准将成为双方合作最现实的交叉点。"
 UP_CHI_cooperative_reconstruction: "合作重建"
 UP_CHI_cooperative_reconstruction_desc: "港口、工厂、技术顾问和贸易网络开始服务于新的亚洲协作体系。"
 UP_CHI_choose_northern_campaign: "北上俄国废墟"
 UP_CHI_choose_northern_campaign_desc: "俄国已经碎裂。向北进军可以把革命影响力推入欧亚大陆腹地。"
 UP_CHI_choose_indian_campaign: "介入印度裂变"
 UP_CHI_choose_indian_campaign_desc: "印度红黑分裂给了中国扩大影响的机会。亚洲中心不能无视南亚。"
 UP_CHI_choose_southeast_campaign: "南下中南半岛"
 UP_CHI_choose_southeast_campaign_desc: "东南亚仍处在殖民阴影与日本南进压力之间。中国可以把这片地区纳入自己的秩序。"
 UP_CHI_external_campaign_command: "对外战役司令部"
 UP_CHI_external_campaign_command_desc: "无论下一个方向是俄国、印度还是东南亚，共和国都需要一个脱离内战经验的新型远征指挥体系。参谋、铁路、情报、宣传和外交将被放进同一张作战地图。"
 UP_CHI_berlin_liaison_mission: "柏林联络团"
 UP_CHI_berlin_liaison_mission_desc: "德国在东欧泥潭中寻找突破，中国在亚洲寻找承认。柏林联络团将试探双方能否把各自的不满拼成一套全球战略。"
 UP_CHI_german_alignment: "与德国结盟"
 UP_CHI_german_alignment_desc: "若亚洲协作阵线要挑战英法主导的旧世界，与德国达成战略同盟将把战争推向全球。德国在东欧泥潭中寻找突破，中国则在亚洲寻找承认。"
 UP_CHI_anti_allied_strategy: "反同盟国战略"
 UP_CHI_anti_allied_strategy_desc: "英法仍控制海路、殖民网络和金融秩序。若亚洲协作阵线要真正独立，就必须准备与同盟国正面摊牌。"
 UP_CHI_co_prosperity_economic_miracle: "共荣经济奇迹"
 UP_CHI_co_prosperity_economic_miracle_desc: "危险合作熬过了最脆弱的阶段。中日技术、港口、铁路、市场和资本流动共同制造了一场令旧世界不安的亚洲经济奇迹。"
 UP_CHI_army_reform_block: "陆军改革"
 UP_CHI_army_reform_block_desc: "中国拥有庞大军队，但统一后的共和国必须把它变成现代军队。"
 UP_CHI_reorganize_long_march_army: "整编长征军"
 UP_CHI_reorganize_long_march_army_desc: "长征军是胜利的象征，也是新军队的骨架。我们必须把胜利行军中的各路武装整编为中央军委可指挥的力量。"
 UP_CHI_absorb_warlord_forces: "接收旧军阀部队"
 UP_CHI_absorb_warlord_forces_desc: "许多旧军阀选择投向新共和国。收编他们可以迅速扩军，但旧习气也会随士兵和军官一同进入我们的体系。"
 UP_CHI_navy_air_block: "海空军建设"
 UP_CHI_navy_air_block_desc: "共和国不能永远只在陆地上思考战争。日本、东南亚和太平洋都要求中国拥有天空与海岸线上的力量。"
 UP_CHI_coastal_air_defense: "沿海空防"
 UP_CHI_coastal_air_defense_desc: "沿海城市、港口和工业区必须拥有防空体系。"
 UP_CHI_industrial_block: "工业重建"
 UP_CHI_industrial_block_desc: "革命胜利后，工业才真正成为国家生存的核心。"
 UP_CHI_land_reform_expansion: "土地改革扩大化"
 UP_CHI_land_reform_expansion_desc: "共和国的根基在农村。土地改革将把革命的胜利从首都传到田埂，也会激怒所有旧秩序的残余。"
 UP_CHI_manchurian_question: "东北问题"
 UP_CHI_manchurian_question_desc: "满洲保皇派声称独立，日本仍在幕后施压。东北问题是中国革命未竟事业，也是共和国无法回避的边疆考验。"
 UP_CHI_support_indian_reds: "援助印度红色势力"
 UP_CHI_support_indian_reds_desc: "印度的红色民兵正在与等级主义的黑色政权作战。中国可以成为亚洲革命的新中心。"
 UP_CHI_victory_of_revolution: "革命的胜利"
 UP_CHI_victory_of_revolution_desc: "南京革命政府已经证明旧秩序并非不可战胜。现在的问题不再是革命能否胜利，而是革命能否治理中国。"
 UP_CHI_consolidate_central_government: "巩固中央政府"
 UP_CHI_consolidate_central_government_desc: "革命同盟必须建立税收、铁路、军政和干部体系，否则南京只会成为又一个短命首都。"
 UP_CHI_revolution_still_unfinished: "革命尚未完成"
 UP_CHI_revolution_still_unfinished_desc: "西南、华南、西北、新疆、西藏和东北仍在中央权威之外。中国革命还没有走到尽头。"
 UP_CHI_chinese_unification_war: "中国统一战争"
 UP_CHI_chinese_unification_war_desc: "统一不一定总以战争开始，但所有谈判背后都必须站着革命军。南京将开始逐一处理地方问题。"
 UP_CHI_southwest_question: "中华民国问题"
 UP_CHI_southwest_question_desc: "重庆的中华民国残余政府仍与地方势力纠缠在一起。南京将单独处理这一政治问题。"
 UP_CHI_infiltrate_chongqing_bureaucracy: "渗透重庆行政系统"
 UP_CHI_infiltrate_chongqing_bureaucracy_desc: "重庆仍保留着一套旧国民政府行政机器。南京将通过联络旧部、安插交通员和控制财政线索，先撬开这套机器的缝隙。"
 UP_CHI_split_nationalist_generals: "分化国民党军官"
 UP_CHI_split_nationalist_generals_desc: "重庆的军官并非铁板一块。有人忠于旧旗帜，有人只想保住部队和地盘。南京可以利用这种分裂，削弱重庆抵抗统一的能力。"
 UP_CHI_pressure_sichuan_cliques: "压迫四川地方派系"
 UP_CHI_pressure_sichuan_cliques_desc: "四川地方派系是重庆赖以存在的后方。通过军事压力、交通封锁和政治许诺，南京将迫使他们重新考虑自己的立场。"
 UP_CHI_unlock_southwest_decisions_tt: "解锁§Y中华民国统一决议§!。"
 UP_CHI_remaining_warlords_question: "其他地方势力问题"
 UP_CHI_remaining_warlords_question_desc: "华南、西北、新疆和西藏仍维持不同程度的地方自治。南京将把这些地区纳入同一套统一事务处理流程。"
 UP_CHI_unlock_remaining_warlords_decisions_tt: "解锁§Y华南、西北、新疆和西藏统一决议§!。这些决议可以同时推进，也可以分批处理。"
 UP_CHI_manchurian_question_unification: "满洲问题"
 UP_CHI_manchurian_question_unification_desc: "满洲保皇派夹在日本、中国和远东残余势力之间。东北问题不能只靠一纸命令解决。"
 UP_CHI_northeast_revolutionary_committee: "东北革命委员会"
 UP_CHI_northeast_revolutionary_committee_desc: "东北地下组织、工人网络和地方干部将被整合为新的革命委员会。"
 UP_CHI_turn_fengtian_officers: "策反奉军军官"
 UP_CHI_turn_fengtian_officers_desc: "旧奉军军官并非都愿意为满洲宫廷卖命。南京将寻找能被争取的人。"
 UP_CHI_contact_anti_japanese_guerrillas: "联络抗日游击队"
 UP_CHI_contact_anti_japanese_guerrillas_desc: "东北山林、铁路和矿区中的抗日游击队可以成为南京伸入满洲的手。"
 UP_CHI_unlock_manchuria_decisions_tt: "解锁§Y满洲统一决议§!。"
 UP_CHI_southwest_unification: "西南统一"
 UP_CHI_southwest_unification_desc: "当重庆被控制、归顺或成为南京附庸后，西南问题就可以宣告解决。"
 UP_CHI_south_china_unification: "华南统一"
 UP_CHI_south_china_unification_desc: "当广州与两广体系被纳入南京秩序后，华南统一就可以完成。"
 UP_CHI_northwest_unification: "西北统一"
 UP_CHI_northwest_unification_desc: "当兰州与西北要道被南京掌握，或西北地方势力接受附庸地位后，西北统一就可以完成。"
 UP_CHI_xinjiang_unification: "新疆统一"
 UP_CHI_xinjiang_unification_desc: "当乌鲁木齐与新疆地方政权被纳入南京秩序后，新疆问题就可以解决。"
 UP_CHI_tibet_unification: "整合地方军阀"
 UP_CHI_tibet_unification_desc: "华南、西北、新疆和西藏事务均已完成处理。南京可以把这些地方安排整合为统一秩序的一部分。"
 UP_CHI_northeast_unification: "东北统一"
 UP_CHI_northeast_unification_desc: "当沈阳与满洲政权被控制、归顺或附庸后，东北统一就可以完成。"
 UP_CHI_military_reform: "军事改革"
 UP_CHI_military_reform_desc: "革命军的扩张速度超过了参谋、训练和后勤体系的承受能力。南京需要先建立统一的军制框架。"
 UP_CHI_local_officers: "地方军官"
 UP_CHI_local_officers_desc: "部分地方军官拥有实际带兵经验。中央可以吸收他们，但必须承担派系进入军队的风险。"
 UP_CHI_local_units: "地方部队"
 UP_CHI_local_units_desc: "地方部队可以补充革命军兵员，也会增加整编和训练压力。"
 UP_CHI_cavalry_company: "骑兵连"
 UP_CHI_cavalry_company_desc: "在道路条件较差的地区，骑兵仍能承担侦察、巡逻和通信任务。"
 UP_CHI_reorganize_revolutionary_army: "重组革命军"
 UP_CHI_reorganize_revolutionary_army_desc: "将地方部队、旧军官和革命军骨干编入统一序列，是建立现代军队的前提。"
 UP_CHI_restore_gaokao: "恢复高考"
 UP_CHI_restore_gaokao_desc: "南京将恢复统一考试制度，为军政机构和工程院校提供稳定的人才来源。"
 UP_CHI_motorization_tank_card: "机动化与坦克方案"
 UP_CHI_motorization_tank_card_desc: "中国缺少成熟装甲工业，但可以先建立机动化和装甲研究方案。"
 UP_CHI_infantry_equipment_card: "步兵装备方案"
 UP_CHI_infantry_equipment_card_desc: "步兵装备仍是革命军的主要基础。标准化枪械和弹药规格可以降低长期维护成本。"
 UP_CHI_support_equipment_card: "支援装备方案"
 UP_CHI_support_equipment_card_desc: "通信、工兵、医疗和炮兵观测设备将直接影响部队作战效率。"
 UP_CHI_motorization_and_tanks: "机动化与坦克"
 UP_CHI_motorization_and_tanks_desc: "中央军委将推动卡车、装甲车辆和装甲战术的早期研究。"
 UP_CHI_truck_and_train_card: "卡车与火车方案"
 UP_CHI_truck_and_train_card_desc: "铁路和公路运输决定部队能否跨省调动。南京需要把军需运输纳入统一规划。"
 UP_CHI_rifle_card: "枪械方案"
 UP_CHI_rifle_card_desc: "统一枪械标准可以提高军工厂效率，也能降低地方部队整编成本。"
 UP_CHI_artillery_card: "火炮方案"
 UP_CHI_artillery_card_desc: "火炮生产和训练体系将逐步摆脱临时采购和缴获依赖。"
 UP_CHI_restore_independent_research: "恢复自主研发能力"
 UP_CHI_restore_independent_research_desc: "缺少外部红色中心意味着中国必须重建自己的研究机构和技术官僚体系。"
 UP_CHI_first_university: "第一所大学"
 UP_CHI_first_university_desc: "新的国家大学将承担工程、军工、行政和师资培养任务。"
 UP_CHI_integrate_internal_industrial_forces: "整合内部工业势力"
 UP_CHI_integrate_internal_industrial_forces_desc: "南京控制区内存在国营厂、地方工坊、商团资本和旧政府资产。中央需要先完成登记和整合。"
 UP_CHI_nationalize_means_of_production: "生产资料国有化"
 UP_CHI_nationalize_means_of_production_desc: "将关键生产资料纳入国家管理可以提高计划能力，但会影响短期稳定。"
 UP_CHI_local_officer_talent: "地方军官人才"
 UP_CHI_local_officer_talent_desc: "一部分地方军官可以转入军工、后勤和训练机构，弥补中央人才不足。"
 UP_CHI_military_industry: "军用工业"
 UP_CHI_military_industry_desc: "南京将优先恢复弹药、枪械和轻型军需生产。"
 UP_CHI_civilian_industry: "民用工业"
 UP_CHI_civilian_industry_desc: "民用工业是财政和长期建设的基础，不能完全让位于军工。"
 UP_CHI_millet_and_rifles: "小米加步枪"
 UP_CHI_millet_and_rifles_desc: "在工业能力不足的阶段，基层动员和简易装备仍是革命军扩张的重要来源。"
 UP_CHI_nanjing_arms_factory: "南京军工厂"
 UP_CHI_nanjing_arms_factory_desc: "南京军工厂将成为中央直接控制的军需生产核心。"
 UP_CHI_nanjing_auto_factory: "南京汽车厂"
 UP_CHI_nanjing_auto_factory_desc: "汽车厂可以为军需运输和民用交通提供基础产能。"
 UP_CHI_repair_infrastructure: "修建基础设施"
 UP_CHI_repair_infrastructure_desc: "恢复道路、桥梁和仓储设施是统一市场和军队调动的前提。"
 UP_CHI_build_more_military_factories: "造更多的军工"
 UP_CHI_build_more_military_factories_desc: "军工扩建将提高战争准备，但会挤占其他建设资源。"
 UP_CHI_republic_civilian_entrepreneurs: "共和国的民用企业家"
 UP_CHI_republic_civilian_entrepreneurs_desc: "部分企业家愿意接受南京秩序。中央可以利用他们恢复生产和商业流通。"
 UP_CHI_land_nationalization: "土地归国有"
 UP_CHI_land_nationalization_desc: "土地国有化将加强中央对基层资源的掌握，同时引发地方利益调整。"
 UP_CHI_radical_entrepreneurs: "激进的企业家"
 UP_CHI_radical_entrepreneurs_desc: "一部分企业家愿意押注军工和国家订单，但这种路线会提高社会摩擦。"
 UP_CHI_moderate_entrepreneurs: "温和的企业家"
 UP_CHI_moderate_entrepreneurs_desc: "温和企业家更关注民用生产和商业秩序，有助于稳定经济恢复。"
 UP_CHI_initial_planned_economy: "实现初步的计划经济"
 UP_CHI_initial_planned_economy_desc: "南京将建立早期计划机构，用于协调工厂、交通、粮食和军需。"
 UP_CHI_issue_grain_coupons: "发行粮票"
 UP_CHI_issue_grain_coupons_desc: "粮票制度可以帮助中央管理城市供应，但也意味着消费受到更严格的行政限制。"
 UP_CHI_republic_solving_food_problem: "解决温饱问题的共和国"
 UP_CHI_republic_solving_food_problem_desc: "粮食调配和基层登记逐步稳定后，南京能够缓解部分地区的基本供应压力。"
 UP_CHI_suppress_local_bandits: "清剿地方土匪"
 UP_CHI_suppress_local_bandits_desc: "地方治安问题会阻碍税收、交通和征兵。中央将以军警力量恢复秩序。"
 UP_CHI_register_local_bandits: "规划地方土匪"
 UP_CHI_register_local_bandits_desc: "中央也可以登记、改编和安置部分地方武装，把治安问题转化为劳役或辅兵来源。"
 UP_CHI_develop_heavy_industry: "大力发展重工业"
 UP_CHI_develop_heavy_industry_desc: "钢铁、机械和化工是长期军工与基础设施建设的核心。"
 UP_CHI_power_from_the_gun: "枪杆下的政权"
 UP_CHI_power_from_the_gun_desc: "南京的统一仍依赖军队执行力。国家机器会围绕武装力量继续扩张。"
 UP_CHI_deal_with_localism: "处理地方主义"
 UP_CHI_deal_with_localism_desc: "中国统一只是第一步。真正麻烦的是如何处理各地残留的地方政府、军队、财政和政治承诺。"
 UP_CHI_centralization_path: "加强中央政府"
 UP_CHI_centralization_path_desc: "中央集权路线要求南京直接控制所有关键地块。地方权力将被纳入统一行政体系。"
 UP_CHI_send_central_commissioners: "派遣中央专员"
 UP_CHI_send_central_commissioners_desc: "中央专员将进入新统一地区，监督财政、警务、宣传和干部任命。"
 UP_CHI_restrict_local_armies: "限制地方军队"
 UP_CHI_restrict_local_armies_desc: "地方武装必须被整编、裁撤或纳入中央指挥。革命军不能容忍第二套军令。"
 UP_CHI_state_above_localities: "国家高于地方"
 UP_CHI_state_above_localities_desc: "南京宣布国家权威高于地方利益。中国将以更紧密的中央政府面对未来。"
 UP_CHI_local_autonomy_path: "允许地方自治"
 UP_CHI_local_autonomy_path_desc: "地方自治路线承认统一中国不能只靠命令。附庸和地方政府将获得更大的缓冲空间。"
 UP_CHI_preserve_local_governments: "保留地方政府"
 UP_CHI_preserve_local_governments_desc: "保留地方政府可以降低整合成本，也能让边疆地区更愿意接受南京名义上的最高权威。"
 UP_CHI_compromise_local_interests: "妥协地方利益"
 UP_CHI_compromise_local_interests_desc: "地方税收、宗教、商贸和军队问题都需要妥协。南京会付出代价，但能换来稳定。"
 UP_CHI_revolutionary_united_front: "革命统一战线"
 UP_CHI_revolutionary_united_front_desc: "统一战线将把中央政府、地方自治政权和附庸地区包装进同一个革命叙事。"
 UP_CHI_complete_national_unification: "完成全国统一"
 UP_CHI_complete_national_unification_desc: "重庆、广州、兰州、乌鲁木齐、拉萨和沈阳都已被控制，或已进入南京秩序。全国统一终于可以宣告完成。"
 UP_CHI_first_national_congress: "第一届全国代表大会"
 UP_CHI_first_national_congress_desc: "统一后的中国必须决定自己的未来。毛泽东路线、周恩来务实路线与黄埔军官团都将在大会后争夺国家方向。"
 UP_centralized_unified_state: "中央集权统一国家"
 UP_centralized_unified_state_desc: "南京直接掌握地方行政、军队和财政，中国的国家机器变得更加紧密。"
 UP_local_autonomy_subject_support: "地方自治安排"
 UP_local_autonomy_subject_support_desc: "南京允许地方政权保留一定自治，以换取名义统一、稳定和合作。"
 UP_china_unification_decisions: "中国统一问题"
 UP_CHI_southwest_autonomy_offer: "西南自治方案"
 UP_CHI_southwest_autonomy_offer_desc: "提出保留重庆地方行政的统一方案。政治成本较高，但对方更容易接受。"
 UP_CHI_southwest_military_pressure: "西南军事压力"
 UP_CHI_southwest_military_pressure_desc: "以军事压力迫使重庆表态。国内稳定会受到影响。"
 UP_CHI_south_china_autonomy_offer: "华南自治方案"
 UP_CHI_south_china_autonomy_offer_desc: "提出保留两广地方行政和商贸安排的统一方案。"
 UP_CHI_south_china_military_pressure: "华南军事压力"
 UP_CHI_south_china_military_pressure_desc: "以军事压力迫使两广表态。国内稳定会受到影响。"
 UP_CHI_northwest_autonomy_offer: "西北自治方案"
 UP_CHI_northwest_autonomy_offer_desc: "提出保留西北部分地方行政安排的统一方案。"
 UP_CHI_northwest_military_pressure: "西北军事压力"
 UP_CHI_northwest_military_pressure_desc: "以军事压力迫使西北地方势力表态。国内稳定会受到影响。"
 UP_CHI_xinjiang_autonomy_offer: "新疆自治方案"
 UP_CHI_xinjiang_autonomy_offer_desc: "提出保留新疆地方行政框架的统一方案。"
 UP_CHI_xinjiang_military_pressure: "新疆军事压力"
 UP_CHI_xinjiang_military_pressure_desc: "以军事压力迫使迪化表态。国内稳定会受到影响。"
 UP_CHI_tibet_autonomy_offer: "西藏自治方案"
 UP_CHI_tibet_autonomy_offer_desc: "提出保留拉萨地方行政和宗教机构的统一方案。"
 UP_CHI_tibet_military_pressure: "西藏军事压力"
 UP_CHI_tibet_military_pressure_desc: "以军事压力迫使拉萨表态。国内稳定会受到影响。"
 UP_CHI_manchuria_autonomy_offer: "东北自治方案"
 UP_CHI_manchuria_autonomy_offer_desc: "提出保留哈尔滨地方政权的统一方案。"
 UP_CHI_manchuria_military_pressure: "东北军事压力"
 UP_CHI_manchuria_military_pressure_desc: "以军事压力迫使满洲表态。国内稳定会受到影响。"
 up_asia.unification_annex.a: "要求直接并入南京。"
 up_asia.unification_puppet.a: "允许保留地方政府。"
 up_asia.warlord_agree.a: "同意南京方案。"
 up_asia.warlord_refuse.a: "拒绝南京方案。"
 up_asia.200.t: "西南统一方案"
 up_asia.200.d: "南京已经完成西南统一准备。中央政府需要决定对重庆提出直接并入，还是允许其以地方政府形式保留。"
 up_asia.201.t: "华南统一方案"
 up_asia.201.d: "南京已经完成华南统一准备。中央政府需要决定对两广提出直接并入，还是允许其以地方政府形式保留。"
 up_asia.202.t: "西北统一方案"
 up_asia.202.d: "南京已经完成西北统一准备。中央政府需要决定对西北地方势力提出直接并入，还是允许其以地方政府形式保留。"
 up_asia.203.t: "新疆统一方案"
 up_asia.203.d: "南京已经完成新疆统一准备。中央政府需要决定对迪化方面提出直接并入，还是允许其以地方政府形式保留。"
 up_asia.204.t: "西藏统一方案"
 up_asia.204.d: "南京已经完成西藏统一准备。中央政府需要决定对拉萨方面提出直接并入，还是允许其以地方政府形式保留。"
 up_asia.205.t: "东北统一方案"
 up_asia.205.d: "南京已经完成东北统一准备。中央政府需要决定对哈尔滨方面提出直接并入，还是允许其以地方政府形式保留。"

 up_asia.unification_notice.a: "记录结果。"
 up_asia.220.t: "重庆接受附庸安排"
 up_asia.220.d: "重庆方面同意保留地方行政结构，并接受南京的宗主地位。双方将开始军政联络和财政交接。"
 up_asia.221.t: "重庆归顺南京"
 up_asia.221.d: "重庆方面同意结束独立行政状态。南京将接收地方机构、军队名册和主要交通节点。"
 up_asia.222.t: "重庆拒绝统一要求"
 up_asia.222.d: "重庆方面拒绝接受南京提出的统一方案。中央政府已经获得采取军事行动的理由。"
 up_asia.223.t: "两广接受附庸安排"
 up_asia.223.d: "两广地方当局同意维持地方政府，并在名义和外交上接受南京领导。"
 up_asia.224.t: "两广归顺南京"
 up_asia.224.d: "两广地方当局同意并入南京行政体系。广东港口、地方财政和军队编制将进入交接流程。"
 up_asia.225.t: "两广拒绝统一要求"
 up_asia.225.d: "两广地方当局拒绝南京提出的统一方案。中央政府已经获得采取军事行动的理由。"
 up_asia.226.t: "西北接受附庸安排"
 up_asia.226.d: "西北地方势力同意在军事和外交上接受南京领导，同时保留一定地方行政安排。"
 up_asia.227.t: "西北归顺南京"
 up_asia.227.d: "西北地方势力同意结束事实自治。南京将接收地方军队、交通线和税务机构。"
 up_asia.228.t: "西北拒绝统一要求"
 up_asia.228.d: "西北地方势力拒绝南京提出的统一方案。中央政府已经获得采取军事行动的理由。"
 up_asia.229.t: "新疆接受附庸安排"
 up_asia.229.d: "新疆地方当局同意接受南京的宗主地位，并保留地方行政框架。中央使团将进入迪化。"
 up_asia.230.t: "新疆归顺南京"
 up_asia.230.d: "新疆地方当局同意并入南京行政体系。边疆驻军、关税和交通节点将开始交接。"
 up_asia.231.t: "新疆拒绝统一要求"
 up_asia.231.d: "新疆地方当局拒绝南京提出的统一方案。中央政府已经获得采取军事行动的理由。"
 up_asia.232.t: "西藏接受附庸安排"
 up_asia.232.d: "拉萨方面接受南京宗主地位，并保留原有地方行政与宗教机构。中央使团将继续留驻。"
 up_asia.233.t: "西藏归顺南京"
 up_asia.233.d: "拉萨方面同意纳入南京行政体系。中央政府将逐步接收边防、交通和对外事务。"
 up_asia.234.t: "西藏拒绝统一要求"
 up_asia.234.d: "拉萨方面拒绝南京提出的统一方案。中央政府已经获得采取军事行动的理由。"
 up_asia.235.t: "满洲接受附庸安排"
 up_asia.235.d: "哈尔滨方面同意接受南京宗主地位。满洲保留地方政府，但对外关系和军事安排将受南京约束。"
 up_asia.236.t: "满洲归顺南京"
 up_asia.236.d: "哈尔滨方面同意结束独立状态。南京将接收东北主要行政、铁路和军事机构。"
 up_asia.237.t: "满洲拒绝统一要求"
 up_asia.237.d: "哈尔滨方面拒绝南京提出的统一方案。中央政府已经获得采取军事行动的理由。"
 up_asia.240.t: "南京的西南方案"
 up_asia.240.d: "南京已经向重庆提出统一方案。方案可能要求直接并入，也可能允许地方政府在南京宗主地位下继续存在。重庆必须决定是否接受。"
 up_asia.241.t: "南京的华南方案"
 up_asia.241.d: "南京已经向两广提出统一方案。方案可能要求直接并入，也可能允许地方政府在南京宗主地位下继续存在。两广必须决定是否接受。"
 up_asia.242.t: "南京的西北方案"
 up_asia.242.d: "南京已经向西北地方势力提出统一方案。方案可能要求直接并入，也可能允许地方政府在南京宗主地位下继续存在。西北必须决定是否接受。"
 up_asia.243.t: "南京的新疆方案"
 up_asia.243.d: "南京已经向迪化方面提出统一方案。方案可能要求直接并入，也可能允许地方政府在南京宗主地位下继续存在。新疆必须决定是否接受。"
 up_asia.244.t: "南京的西藏方案"
 up_asia.244.d: "南京已经向拉萨方面提出统一方案。方案可能要求直接并入，也可能允许地方政府在南京宗主地位下继续存在。西藏必须决定是否接受。"
 up_asia.245.t: "南京的东北方案"
 up_asia.245.d: "南京已经向哈尔滨方面提出统一方案。方案可能要求直接并入，也可能允许地方政府在南京宗主地位下继续存在。满洲必须决定是否接受。"
 up_asia_news.1.t: "东方的新政权完成统一"
 up_asia_news.1.d: "南京宣布第一届全国代表大会召开。经过一系列地方谈判、军事压力和行政交接，中华人民革命同盟已经将中国主要地区纳入同一政治秩序。各国观察员认为，东亚力量平衡将因此发生变化。"
 up_asia_news.1.a: "亚洲局势发生变化。"

 UP_revolutionary_legitimacy: "革命合法性"
 UP_revolutionary_legitimacy_desc: "南京政府控制了中央政治舞台，但仍需要把军事胜利转化为稳定行政。"
 UP_provisional_central_government: "临时中央政府"
 UP_provisional_central_government_desc: "中央机关开始恢复运转。新的行政体系提高了决策效率，也增加了短期财政负担。"
 UP_unification_campaign_preparations: "统一行动准备"
 UP_unification_campaign_preparations_desc: "南京开始为各地统一事务准备军政人员、后勤计划和谈判方案。"
 UP_unified_revolutionary_administration: "统一革命行政"
 UP_unified_revolutionary_administration_desc: "地方交接完成后，中央政府获得了更稳定的行政、税收和动员渠道。"
 UP_mao_route_tensions: "农村改革路线压力"
 UP_mao_route_tensions_desc: "继续推进农村改革会增加行政负担，并引发地方利益冲突。"
 UP_militarist_route_tensions: "军国化路线压力"
 UP_militarist_route_tensions_desc: "军队优先的国家路线提高了动员能力，但会压缩民政资源并影响稳定。"
 UP_pan_asian_route_tensions: "泛亚路线压力"
 UP_pan_asian_route_tensions_desc: "对日和解与泛亚外交会消耗政治资源，并在短期内降低战争动员热度。"

 UP_china_revolutionary_government_decisions: "革命政府事务"
 UP_china_revolutionary_government_decisions_desc: "这些决议代表南京政府在统一战争外进行的行政、交通和基层组织工作。"
 UP_CHI_standardize_local_taxation: "统一地方税务口径"
 UP_CHI_standardize_local_taxation_desc: "整理地方税务账册，统一征收标准。短期会引起地方摩擦，但能回收一部分行政资源。"
 UP_CHI_repair_regional_railways: "修复区域铁路"
 UP_CHI_repair_regional_railways_desc: "修复一段核心区交通线，改善地方运输条件。"
 UP_CHI_expand_revolutionary_cadres: "扩充革命干部"
 UP_CHI_expand_revolutionary_cadres_desc: "向基层派遣更多干部，用于登记人口、组织群众和执行中央命令。"
 UP_CHI_emergency_grain_transport: "紧急粮食转运"
 UP_CHI_emergency_grain_transport_desc: "组织跨省粮食转运，缓解部分地区的供应压力。"

 UP_japan_focus: "日本帝国国策树"
 UP_JAP_empire_at_the_limit: "帝国抵达极限"
 UP_JAP_empire_at_the_limit_desc: "日本赢得了远东，却发现胜利本身正在吞噬财政、军队和政治秩序。"
 UP_JAP_harbin_shock: "哈尔滨冲击"
 UP_JAP_harbin_shock_desc: "满洲的挑战让东京意识到，所谓缓冲国已经不再安静，帝国必须决定如何处理这场羞辱。"
 UP_JAP_young_officers_coup: "青年军官团政变"
 UP_JAP_young_officers_coup_desc: "青年军官将财阀、政党和软弱内阁视为帝国病灶。他们准备以暴力拯救国家。"
 UP_JAP_showa_restoration: "昭和维新"
 UP_JAP_showa_restoration_desc: "维新派宣称一切行动都以天皇之名进行，旧体制的掣肘必须被清除。"
 UP_JAP_purge_the_zaibatsu: "清洗财阀"
 UP_JAP_purge_the_zaibatsu_desc: "财阀曾为扩张提供资金，如今却试图为风险踩刹车。维新派不会允许资本家决定帝国命运。"
 UP_JAP_military_dictatorship: "军事独裁"
 UP_JAP_military_dictatorship_desc: "帝国将由军队的纪律和命令重塑，议会、财阀与文官内阁都必须退后。"
 UP_JAP_rule_in_the_emperors_name: "天皇亲政名义"
 UP_JAP_rule_in_the_emperors_name_desc: "实际权力落入军方手中，但所有命令都将被包装为天皇意志。"
 UP_JAP_reconquer_manchuria: "重新征服满洲"
 UP_JAP_reconquer_manchuria_desc: "满洲若不能自愿听命，就必须重新学会沉默。关东军将恢复帝国威信。"
 UP_JAP_holy_war_against_china: "对华圣战"
 UP_JAP_holy_war_against_china_desc: "南京的革命政权被维新派视为亚洲秩序的最大威胁。帝国必须先下手。"
 UP_JAP_strike_siberia: "北进西伯利亚"
 UP_JAP_strike_siberia_desc: "俄国碎裂后的远东真空不能留给别人。西伯利亚将成为帝国北方战略的下一步。"
 UP_JAP_preserve_the_old_system: "旧体制路线"
 UP_JAP_preserve_the_old_system_desc: "政党、财阀、陆军、海军和宫廷仍能维持脆弱平衡。帝国不需要政变，只需要重新选择方向。"
 UP_JAP_army_northern_faction: "陆军北进派"
 UP_JAP_army_northern_faction_desc: "陆军认为帝国命运在大陆。满洲、远东和中国革命必须被军事力量压住。"
 UP_JAP_control_manchuria: "控制满洲"
 UP_JAP_control_manchuria_desc: "满洲是帝国大陆政策的锁钥。东京不能容忍它在夹缝中自行其是。"
 UP_JAP_far_eastern_war: "远东战争"
 UP_JAP_far_eastern_war_desc: "远东不是帝国的边缘，而是北进派眼中的新边界。"
 UP_JAP_strike_chinese_revolution: "打击中国革命"
 UP_JAP_strike_chinese_revolution_desc: "南京革命同盟若继续成长，日本在大陆的所有投入都会被红色浪潮吞没。"
 UP_JAP_navy_southern_faction: "海军南进派"
 UP_JAP_navy_southern_faction_desc: "海军拒绝继续把燃料和钢铁丢进大陆泥潭。帝国真正的资源在南方海域。"
 UP_JAP_abandon_the_continental_mire: "放弃大陆泥潭"
 UP_JAP_abandon_the_continental_mire_desc: "日本不必亲自背负每一寸远东土地。收缩大陆承诺，才能准备海洋战争。"
 UP_JAP_southern_resource_sphere: "南洋资源圈"
 UP_JAP_southern_resource_sphere_desc: "石油、橡胶、锡矿、港口和航线将决定帝国能否继续扩张。"
 UP_JAP_expand_the_pacific_fleet: "太平洋舰队扩张"
 UP_JAP_expand_the_pacific_fleet_desc: "若帝国转向南方，舰队就必须成为国家的第一工具。"
 UP_JAP_zaibatsu_civilian_faction: "财阀文官派"
 UP_JAP_zaibatsu_civilian_faction_desc: "财阀和文官并不反对帝国，只反对把帝国赌在失控的军官和无底洞般的大陆战线上。"
 UP_JAP_stabilize_the_empire: "稳定帝国"
 UP_JAP_stabilize_the_empire_desc: "财政、殖民地、贸易和军队都需要重新排队。帝国必须先停止流血，才能继续统治。"
 UP_JAP_compromise_with_anglo_america: "与英美妥协"
 UP_JAP_compromise_with_anglo_america_desc: "与其同时挑战所有海权，不如用贸易和外交争取时间。"
 UP_JAP_economic_colonial_system: "经济殖民体系"
 UP_JAP_economic_colonial_system_desc: "控制不一定总靠军靴。资本、港口、贷款、顾问和贸易网络也能组成帝国。"
 UP_JAP_measure_imperial_overstretch: "衡量帝国过伸"
 UP_JAP_measure_imperial_overstretch_desc: "远东、满洲、朝鲜、中国、太平洋，每一条战线都在要求东京付出更多。帝国必须先承认自己的负担，才能决定下一步。"
 UP_JAP_cabinet_of_exhaustion: "疲惫内阁"
 UP_JAP_cabinet_of_exhaustion_desc: "东京的会议室里没有胜利者。陆军要求更多师团，海军要求更多钢材，财阀要求停止亏损，文官只想撑过下一次预算会议。"
 UP_JAP_harbin_aftershock: "哈尔滨余震"
 UP_JAP_harbin_aftershock_desc: "满洲保皇派的宣言刺穿了帝国威信。若一个被扶植的缓冲政权都敢挑战日本，那么整个远东秩序都可能开始松动。"
 UP_JAP_army_northern_push: "陆军北进"
 UP_JAP_army_northern_push_desc: "陆军认为退让只会鼓励满洲、中国和俄国残余。只有继续北进，才能把远东变成真正的安全屏障。"
 UP_JAP_restore_kwantung_discipline: "重整关东军纪律"
 UP_JAP_restore_kwantung_discipline_desc: "关东军既是帝国大陆政策的刀，也是东京最危险的失控资产。陆军决定先把这把刀重新握稳。"
 UP_JAP_prepare_amur_line: "准备阿穆尔防线"
 UP_JAP_prepare_amur_line_desc: "俄国的碎片仍在远东边缘徘徊。阿穆尔河一线将成为日本北进派眼中的新帝国边界。"
 UP_JAP_transbaikal_clients: "外贝加尔客户国"
 UP_JAP_transbaikal_clients_desc: "日本不需要亲自统治每一片冻土。白俄军官、地方商团、哥萨克残部和反共政客都可以被包装成缓冲政权。"
 UP_JAP_preventive_war_against_china: "对华预防战争"
 UP_JAP_preventive_war_against_china_desc: "红色中国的统一让东京感到不安。陆军主张在中国完成工业重建之前发动预防战争，打断亚洲红色中心的成长。"
 UP_JAP_northern_empire_restored: "北方帝国再平衡"
 UP_JAP_northern_empire_restored_desc: "陆军用更大的大陆承诺暂时压住了内部争论。代价是帝国与亚洲大陆绑得更深。"
 UP_JAP_navy_southern_turn: "海军南进"
 UP_JAP_navy_southern_turn_desc: "海军拒绝为远东泥潭继续买单。帝国真正的资源和敌人都在南方海域。"
 UP_JAP_abandon_far_eastern_mud: "放弃远东泥潭"
 UP_JAP_abandon_far_eastern_mud_desc: "海军不是要承认失败，而是要把失败包装成战略调整。远东可以继续燃烧，但不能继续吞掉帝国的燃料。"
 UP_JAP_southern_resource_survey: "南洋资源调查"
 UP_JAP_southern_resource_survey_desc: "橡胶、石油、锡矿、港口、航线。海军把这些词写进报告时，东京终于看见另一种帝国未来。"
 UP_JAP_fortify_mandates: "加固委任统治岛链"
 UP_JAP_fortify_mandates_desc: "若日本转向南方，岛链就必须成为盾牌。机场、岸防炮、油库和船坞将被纳入太平洋防御计划。"
 UP_JAP_prepare_against_america_australia: "准备对抗美澳集团"
 UP_JAP_prepare_against_america_australia_desc: "澳大利亚正在变成太平洋上的反日基地，美国也不会永远旁观。南进意味着资源，也意味着更大的海上战争。"
 UP_JAP_southern_operation: "南方作战"
 UP_JAP_southern_operation_desc: "帝国将把目光投向南洋。资源、港口与海权将决定日本是否能从远东过伸中活下来。"
 UP_JAP_maritime_empire_restored: "海洋帝国再平衡"
 UP_JAP_maritime_empire_restored_desc: "海军用南方资源和太平洋防御圈重塑了帝国方向。日本仍然危险，但不再被远东单独拖拽。"
 UP_JAP_showa_restoration_plot: "昭和维新阴谋"
 UP_JAP_showa_restoration_plot_desc: "青年军官将财阀、政党和软弱内阁视为帝国病灶。他们想用一次清洗重铸国家。"
 UP_JAP_purge_party_cabinets: "清洗政党内阁"
 UP_JAP_purge_party_cabinets_desc: "在青年军官眼中，政党政治只是软弱、贪腐和迟疑的代名词。帝国需要刀，不需要辩论。"
 UP_JAP_break_zaibatsu_privilege: "打碎财阀特权"
 UP_JAP_break_zaibatsu_privilege_desc: "财阀曾经为扩张提供资金，如今却试图为风险踩刹车。昭和维新派不会允许工厂主决定国家命运。"
 UP_JAP_total_spiritual_mobilization: "国民精神总动员"
 UP_JAP_total_spiritual_mobilization_desc: "学校、报纸、神社、工厂和军营将被同一种语言贯穿：牺牲、纯化、进军。这个国家会变得更强，也更难刹车。"
 UP_JAP_war_against_all_encirclement: "对包围网开战"
 UP_JAP_war_against_all_encirclement_desc: "维新派认为日本已被红色中国、英美海权和衰弱政党共同包围。答案只有一个：先下手。"
 UP_JAP_imperial_contraction: "帝国收缩"
 UP_JAP_imperial_contraction_desc: "有时放弃边缘，才是保住核心的唯一办法。与中国谈判、承认满洲中立、集中本土工业，也许能让帝国从过伸中活下来。"
 UP_JAP_recognize_manchurian_neutrality: "承认满洲中立"
 UP_JAP_recognize_manchurian_neutrality_desc: "满洲不一定非要是傀儡。若它能作为缓冲区存在，日本就能少承担一块正在流血的战略负债。"
 UP_JAP_home_island_industry: "本土工业集中"
 UP_JAP_home_island_industry_desc: "帝国收缩派要求把钢材、资本和工程师带回本土。真正的力量不在地图颜色，而在可持续的工业核心。"
 UP_JAP_pacific_defense_circle: "太平洋防御圈"
 UP_JAP_pacific_defense_circle_desc: "从本土到岛链，日本将建立一套更保守也更坚固的太平洋防御体系。扩张退场，防御登台。"
 UP_JAP_restored_imperial_balance: "恢复帝国平衡"
 UP_JAP_restored_imperial_balance_desc: "收缩并不光荣，但它让日本重新拥有呼吸空间。陆军不满，海军怀疑，财阀松了一口气。"
 UP_JAP_manchurian_reconquest_question: "满洲再征服问题"
 UP_JAP_manchurian_reconquest_question_desc: "哈尔滨宣言留下了一个无法回避的问题：日本是否能容忍一个脱缰的傀儡继续存在？"
 UP_JAP_restore_puppet_in_harbin: "恢复哈尔滨傀儡"
 UP_JAP_restore_puppet_in_harbin_desc: "东京可以承认现实，也可以创造现实。若满洲不能自愿听命，关东军会让它重新学会沉默。"

 UP_manchuria_focus: "满洲保皇派国策树"
 UP_MAN_harbin_declaration: "哈尔滨宣言"
 UP_MAN_harbin_declaration_desc: "我们不再只是东京地图上的缓冲区。满洲必须废除不平等军事协定，迫使日本承认我们的独立。"
 UP_MAN_restore_qing_claim: "复兴大清"
 UP_MAN_restore_qing_claim_desc: "北京的红色政权只是叛乱者的新旗帜。真正的中国正统仍在龙旗下等待南返。"
 UP_MAN_manchu_nation: "满洲民族国家"
 UP_MAN_manchu_nation_desc: "与其追逐失去的皇位，不如承认现实：满洲必须成为独立国家，在列强和革命之间求生。"
 UP_MAN_red_manchuria: "红色满洲"
 UP_MAN_red_manchuria_desc: "工人、农民和抗日游击队正在地下积蓄力量。保皇派的宫廷梦也许会被东北自己的革命撕碎。"
 UP_CHI_india_question: "印度的问题"
 UP_CHI_india_question_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
 UP_CHI_support_black_india: "支持黑色印度（需要重建黄埔军校）"
 UP_CHI_support_black_india_desc: "该国策代表南京政府在当前路线下推进新的政治、军事或外交安排。"
