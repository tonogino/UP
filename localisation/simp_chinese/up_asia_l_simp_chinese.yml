 UP_CHI_zhang_guotao_advisor: "张国焘"
 UP_CHI_zhou_enlai: "周恩来"
 UP_CHI_zhou_enlai_advisor: "周恩来"
 UP_CHI_soong_ching_ling: "宋庆龄"
 UP_CHI_soong_ching_ling_advisor: "宋庆龄"
 UP_CHI_weng_wenhao: "翁文灏"
 UP_CHI_weng_wenhao_advisor: "翁文灏"
 UP_CHI_zhu_de: "朱德"
 UP_CHI_zhu_de_army_chief: "朱德"
 UP_CHI_peng_dehuai: "彭德怀"
 UP_CHI_peng_dehuai_army_chief: "彭德怀"
 UP_CHI_chen_shaokuan: "陈绍宽"
 UP_CHI_chen_shaokuan_navy_chief: "陈绍宽"
 UP_CHI_he_zhonghan: "贺衷寒"
 UP_CHI_he_zhonghan_advisor: "贺衷寒"
 UP_POLITICS_ZHOU_ENLAI_DESC: "周恩来以行政协调、外交平衡和务实治理维持共和国运转。他的权威来自党内妥协与国家机器的恢复。"
 UP_POLITICS_LIN_BIAO_DESC: "林彪在政变后被推为过渡领袖。他的权威来自军队、空军和黄埔青年军官的临时联盟。"
 UP_POLITICS_HE_ZHONGHAN_DESC: "贺衷寒以蓝衣社和黄埔系为核心，将中国重塑为一个军事化的民族主义国家。"
 UP_army_command_purged: "军队指挥层洗牌"
 UP_army_command_purged_desc: "一批不可靠或不合时宜的高级军官被迫退场。军队短期内承受震荡，但新参谋体系获得了更清晰的控制权。"
 UP_zhang_guotao_contacts: "张国焘联络网"
 UP_zhang_guotao_contacts_desc: "张国焘及其旧关系被重新纳入政治交易。它能提供派系筹码，也会让中央内部的互信继续下降。"
 UP_china_assassination_decisions: "刺杀毛泽东"
 UP_CHI_assassination_status: "当前刺杀成功率：§Y[?UP_CHI_mao_assassination_chance|0]%§!"
 UP_CHI_assassination_status_desc: "这个数字代表阴谋网络对行动窗口、警卫路线和情报掩护的掌控程度。"
 UP_CHI_bribe_nanjing_guards: "收买南京警卫"
 UP_CHI_prepare_false_orders: "伪造调动命令"
 UP_CHI_secure_radio_codes: "掌握无线电密码"
 UP_CHI_place_blue_shirt_cells: "布置蓝衣社行动组"
 UP_CHI_finalize_assassination_plan: "完成最终行动计划"
 UP_CHI_execute_mao_assassination: "执行刺杀行动"
 UP_CHI_execute_mao_assassination_desc: "行动开始后，结果会根据当前成功率判定。成功则林彪上台，失败则触发肃清。"
 UP_china_mao_mechanic_decisions: "毛泽东政治机制"
 UP_CHI_mao_mechanic_title: "毛泽东政治机制"
 UP_CHI_mao_mechanic_desc: "第一次全国代表大会后，党内路线斗争将围绕毛泽东的政治支持与个人怀疑展开。支持率高于50会逐渐压低怀疑度，低于50会让怀疑度缓慢增长；怀疑度过高会引爆全国性政治危机。"
 UP_CHI_mao_support_header: "毛泽东支持率"
 UP_CHI_mao_support_value: "§Y[?UP_CHI_mao_support|0]%§!"
 UP_CHI_mao_suspicion_header: "毛泽东怀疑度"
 UP_CHI_mao_suspicion_value: "§R[?UP_CHI_mao_suspicion|0]%§!"
 UP_CHI_mao_bar_zero: "0"
 UP_CHI_mao_bar_hundred: "100"
 UP_CHI_mao_pointer: "▲"
 UP_CHI_strengthen_maoist_line: "强化毛泽东路线"
 UP_CHI_strengthen_maoist_line_desc: "公开强化群众路线和毛泽东的政治权威，提高支持率并降低怀疑度。"
 UP_CHI_empower_party_balancers: "扶持党内制衡派"
 UP_CHI_empower_party_balancers_desc: "让更多党内干部、军队技术派和行政官僚参与路线讨论。毛泽东的支持率会下降，但怀疑度会上升。"
 UP_CHI_calm_maoist_suspicion: "安抚领袖警觉"
 UP_CHI_calm_maoist_suspicion_desc: "通过汇报、检讨和人事妥协降低毛泽东怀疑度。"
 japanese_congratulations_to_nanjing: "日本承认南京新政权"
 sino_japanese_manchurian_settlement: "中日东北安排"
 up_asia.300.t: "军事委员会的新位置"
 up_asia.300.d: "国家军事委员会建立后，黄埔系军官开始掌握作战、人事和动员系统。"
 up_asia.300.a: "命令比辩论更快。"
 up_asia.301.t: "行动开始"
 up_asia.301.d: "警卫路线、无线电命令和蓝衣社行动组已经同时启动。"
 up_asia.301.a: "等待结果。"
 up_asia.302.t: "刺杀成功"
 up_asia.302.d: "毛泽东被刺杀。南京被巨大震荡吞没，林彪被军官团推为过渡领袖。"
 up_asia.302.a: "新的秩序必须立刻建立。"
 up_asia.303.t: "刺杀失败"
 up_asia.303.d: "行动在最后一刻暴露。多名军官和蓝衣社联络人被捕，南京开始了一场新的肃清。"
 up_asia.303.a: "阴影没能吞下中央。"
 up_asia.310.t: "黄埔毕业生的秘密聚会"
 up_asia.310.d: "一批黄埔出身的军官在南京重新联络起来。林彪的名字开始在他们之间频繁出现。"
 up_asia.310.a: "他可以作为新旗帜。"
 up_asia.311.t: "军统系统成立"
 up_asia.311.d: "戴笠的情报网络被纳入国家机器。若拥有相关功能，南京将自动建立情报部门。"
 up_asia.311.a: "阴影也需要编制。"
 up_asia.312.t: "刺杀计划"
 up_asia.312.d: "黄埔系已经决定将政治危机推向最危险的方向。初始成功率为50%，可以通过国策和决议提高。"
 up_asia.312.a: "打开决议界面。"
 up_asia.320.t: "武装夺权"
 up_asia.320.d: "黄埔系放弃了暗杀路线，直接动员军队发动政变。"
 up_asia.320.a: "军队将决定政权。"
 up_asia.321.t: "武装夺权的胜利"
 up_asia.321.d: "政变军已经掌握中央要地。南京的新政权将用军事胜利来解释自己的合法性。"
 up_asia.321.a: "战争暂时结束，秩序还要重建。"
 up_asia.322.t: "贺衷寒接管党中央"
 up_asia.322.d: "过渡阶段结束了。贺衷寒以蓝衣社和黄埔系为核心，开始把国家机器重组为新的党国体系。"
 up_asia.322.a: "党、军、国家必须合一。"
 up_asia.323.t: "毛泽东的命运"
 up_asia.323.d: "无论是被刺杀、被迫退出权力中心，还是成为新政权的政治符号，毛泽东的时代都已经在南京改变。"
 up_asia.323.a: "新政权将书写结论。"
 up_asia.324.t: "中央防线崩溃"
 up_asia.324.d: "南京或北京的控制权已经易手。黄埔军官团宣布中央政府失去继续作战的能力，并开始接管剩余军政机关。"
 up_asia.324.a: "内战必须结束。"
 up_asia.330.t: "来自南京的回电"
 up_asia.330.d: "南京新政权正式回应了日本的贺电。两国政府都没有宣称已经解决历史问题，但双方承认继续接触符合当前利益。"
 up_asia.330.a: "先承认现实。"
 up_asia.331.t: "东北安排提案"
 up_asia.331.d: "南京提出重新处理东北问题。该方案保留日本在部分经济与安全议题上的利益，同时要求东京承认中国新政权在东北事务中的主导地位。"
 up_asia.331.a: "这比战争便宜。"
 up_asia.332.t: "南京邀请日本加入新秩序"
 up_asia.332.d: "中国邀请日本加入一个新的东亚阵营。接受意味着东京承认南京是亚洲大陆秩序中的共同核心，拒绝则会让双方再次回到互相猜疑。"
 up_asia.332.a: "加入这个新集团。"
 up_asia.332.b: "日本不应被南京牵着走。"
 up_asia.350.t: "文化大革命爆发"
 up_asia.350.d: "毛泽东对党内路线斗争的怀疑已经越过最后界线。中央文件点名党内存在隐藏的敌人，报纸、学校和机关同时被卷入清查。群众组织冲进办公楼，干部被拖上批斗台，工厂停工，铁路受阻，军队被迫站在政治命令和秩序崩溃之间。中国不是进入争论，而是进入一场会撕裂国家机器的政治爆炸。"
 up_asia.350.a: "全国被点燃了。"
 up_asia_news.2.t: "南京政权发生剧变"
 up_asia_news.2.d: "中国南京政府内部爆发重大权力转移。外界尚无法确认每一个细节，但可以确认的是，中国革命的领导核心已经被重组。"
 up_asia_news.2.a: "东亚将不得不重新判断南京。"
 up_asia_news.3.t: "中国爆发黄埔政变"
 up_asia_news.3.d: "黄埔军官团在中国发动武装政变，试图用军事机器重组革命政府。"
 up_asia_news.3.a: "中国再次站在内战边缘。"
 up_asia_news.4.t: "黄埔政变结束"
 up_asia_news.4.d: "中国境内的黄埔政变以中央要地被控制告终。新政权宣布军事委员会将接管国家重建，并重新定义中国革命的政治方向。"
 up_asia_news.4.a: "南京进入新的时代。"
 up_asia_news.5.t: "毛泽东遇刺身亡"
 up_asia_news.5.d: "南京传出消息，毛泽东在一次由军官团和秘密组织策划的行动中遇刺身亡。中国政府随即进入紧急状态，林彪被推为过渡领袖。"
 up_asia_news.5.a: "中国革命的中心被改写。"
 up_asia_news.6.t: "中国爆发文化大革命"
 up_asia_news.6.d: "来自中国的消息显示，南京政权已经陷入公开的群众运动和干部清洗。学校停课，机关瘫痪，工厂被迫接受政治审查，地方派系在街头和仓库周围爆发武斗。大量干部、教师、军官和技术人员被隔离、批斗或直接打倒，军队开始接管交通、电台和粮食节点。\n\n各国使馆报告称，中国的国家机器正在被一场由最高层怀疑引爆的运动撕开。支持者称这是继续革命，反对者则只敢在密室中称它为灾难。"
 up_asia_news.6.a: "中国在燃烧。"
 UP_CHI_mao_suspicion_warning: "毛泽东怀疑度警告"
 UP_CHI_mao_suspicion_warning_desc: "§R毛泽东怀疑度达到100时会爆发文化大革命。§!\n在第一次全国代表大会之前，该机制只显示数值，不会触发危机。大会之后，怀疑度达到60、80、90会分别造成负面事件，达到100会触发全国性政治危机，并关闭刺杀毛泽东路线。"
 UP_CHI_mao_support_plus_5_tt: "毛泽东支持率：§G+5§!"
 UP_CHI_mao_support_minus_5_tt: "毛泽东支持率：§R-5§!"
 UP_CHI_mao_suspicion_plus_5_tt: "毛泽东怀疑度：§R+5§!"
 UP_CHI_mao_suspicion_minus_5_tt: "毛泽东怀疑度：§G-5§!"
 UP_CHI_mao_suspicion_plus_10_tt: "毛泽东怀疑度：§R+10§!"
 UP_CHI_mao_suspicion_plus_15_tt: "毛泽东怀疑度：§R+15§!"
 UP_mao_suspicion_cadre_fear: "干部恐惧"
 UP_mao_suspicion_cadre_fear_desc: "越来越多干部开始相信，普通政策分歧可能被解释为路线问题。会议记录被反复修改，地方汇报趋于空洞，行政系统首先学会了沉默。"
 UP_mao_suspicion_political_paralysis: "政治瘫痪"
 UP_mao_suspicion_political_paralysis_desc: "党政机关正在把精力用于自证忠诚。技术部门等待政治表态，地方政府等待中央风向，原本可以处理的问题被拖入路线审查。"
 UP_mao_suspicion_purge_panic: "清洗恐慌"
 UP_mao_suspicion_purge_panic_desc: "军队、学校、工厂和地方委员会都开始预判即将到来的清洗。派系以自保为第一目标，国家机器的常规秩序正在裂开。"
 UP_cultural_revolution_chaos: "文化大革命"
 UP_cultural_revolution_chaos_desc: "全国性政治运动已经越过行政边界。群众组织、干部审查、停课停工和军队介入互相交织，国家必须在继续革命与维持基本秩序之间付出巨大代价。"
 UP_cr_red_guard_turbulence: "群众组织冲击"
 UP_cr_red_guard_turbulence_desc: "群众组织以革命名义冲击学校、机关和地方委员会。旧有权威迅速退却，新的秩序却尚未形成。"
 UP_cr_industrial_disruption: "生产秩序中断"
 UP_cr_industrial_disruption_desc: "工厂政治会议、派系冲突和干部审查正在压缩正常生产时间。部分工程师与管理人员被迫离开岗位。"
 UP_cr_army_politicization: "军队政治化"
 UP_cr_army_politicization_desc: "部队被要求介入地方秩序和政治表态。军事训练、参谋计划与后勤管理都受到影响。"
 up_asia.340.t: "干部开始沉默"
 up_asia.340.d: "中央文件的措辞开始变得尖锐，地方干部也变得谨慎。会议上很少有人直接反对政策，但越来越多人只复述口号，不再提出具体问题。毛泽东的怀疑尚未变成公开风暴，却已经改变了党政机关的日常空气。"
 up_asia.340.a: "沉默也是一种信号。"
 up_asia.341.t: "路线问题扩大化"
 up_asia.341.d: "原本属于财政、军队、工业和地方治理的分歧，正在被重新解释为路线问题。干部们开始互相保存材料，军队政治部门要求更频繁的学习汇报，学校和报纸则等待新的定调。国家机器还能运转，但齿轮间已经塞满纸张。"
 up_asia.341.a: "每个人都在等待下一句话。"
 up_asia.342.t: "清洗的预感"
 up_asia.342.d: "南京的政治气氛急剧恶化。有人被调离，有人突然停止露面，还有人主动递交检讨以换取安全。地方委员会向中央请求明确指示，军队则要求确认自己是否需要维持秩序。怀疑已经接近临界点。"
 up_asia.342.a: "风暴只差最后一道命令。"
 up_asia.351.t: "黄埔军官团的最后窗口"
 up_asia.351.d: "文化大革命的号召让黄埔军官团意识到，他们的秘密网络很快会被暴露。军统、蓝衣社和青年军官之间出现了同一个判断：如果不立刻行动，接下来被审查的就会是他们。"
 up_asia.351.a: "立刻引爆内战。"
 up_asia.351.b: "现在还不能动。"
 up_asia.360.t: "第一轮审查扩大"
 up_asia.360.d: "运动不再停留在会议室。大字报覆盖学校和机关外墙，干部被拉到人群前交代历史问题，旧账、私怨和路线指控混在一起。许多单位已经停止正常办公，谁也不知道下一个被点名的人是谁。"
 up_asia.360.a: "让群众继续审查干部。"
 up_asia.360.b: "优先清查工厂管理层。"
 up_asia.360.c: "要求军队表明政治立场。"
 up_asia.361.t: "学校与机关停摆"
 up_asia.361.d: "学生组织、机关派系和工厂小组互相指控，会议室被占领，档案柜被撬开，技术培训和行政会议被迫让位于无休止的政治表态。地方政府只能依靠临时命令维持粮食、交通和治安。"
 up_asia.361.a: "支持群众组织。"
 up_asia.361.b: "让生产单位接受审查。"
 up_asia.361.c: "命令部队维持秩序。"
 up_asia.362.t: "地方派系武斗"
 up_asia.362.d: "运动开始流血。不同群众组织争夺广播站、仓库和交通节点，棍棒、枪械和临时路障出现在街道上。地方委员会已经无法同时获得各方承认，中央一边要求革命继续，一边不得不面对秩序被撕碎的现实。"
 up_asia.362.a: "承认更激进的一方。"
 up_asia.362.b: "用工厂系统压住局势。"
 up_asia.362.c: "让军队接管关键节点。"
 up_asia.363.t: "干部队伍断裂"
 up_asia.363.d: "一批有经验的干部被打倒、隔离、关押或迫于压力停止工作。新提拔者拥有更激烈的政治表态，却缺少治理经验。国家机关开始依靠临时小组和军代表处理日常事务，许多命令在送出前就已经失去执行对象。"
 up_asia.363.a: "继续清理旧干部。"
 up_asia.363.b: "让生产优先服从政治。"
 up_asia.363.c: "扩大军代表权限。"
 up_asia.364.t: "全国秩序的代价"
 up_asia.364.d: "数月的运动已经把中国拖进深坑。支持者称其清除了隐藏在革命内部的旧势力，反对者则只敢私下记录被打倒的人、停摆的机器和消失的干部。无论口号如何，国家已经付出真实的人力、工业和行政代价。"
 up_asia.364.a: "革命不能半途而废。"
 up_asia.364.b: "生产必须承受代价。"
 up_asia.364.c: "军队必须继续介入。"
 UP_cultural_revolution_aftermath: "文化大革命的影响"
 UP_cultural_revolution_aftermath_desc: "运动已经结束，但被打断的教育、受损的行政系统、停摆的生产秩序和干部队伍中的恐惧仍然留在国家机器内部。"
 UP_cultural_revolution_revolutionary_legacy: "继续革命的遗产"
 UP_cultural_revolution_revolutionary_legacy_desc: "文化大革命被重新解释为无产阶级继续革命的一部分。国家恢复了基本秩序，但革命动员、路线斗争和政治审查仍深深嵌入体制。"
 UP_maoist_mass_line_state: "群众路线国家"
 UP_maoist_mass_line_state_desc: "国家机器继续依靠基层组织、政治动员和群众路线维持统治。"
 UP_second_five_year_plan_spirit: "第二个五年计划"
 UP_second_five_year_plan_spirit_desc: "第二个五年计划把工业、基建和科研纳入更稳定的国家规划。"
 UP_great_leap_mobilization: "大跃进动员"
 UP_great_leap_mobilization_desc: "国家用政治动员强行推动生产和军工扩张，但这种速度也带来了严重的管理风险。"
 UP_pragmatic_revolutionary_system: "务实的革命系统"
 UP_pragmatic_revolutionary_system_desc: "革命政权开始依靠行政、技术和市场供应来维持国家运转。"
 UP_zhou_enlai_restored_authority: "周恩来恢复权威"
 UP_zhou_enlai_restored_authority_desc: "周恩来重新获得处理行政、外交和经济事务的空间。"
 UP_world_commonwealth_socialism: "天下为公"
 UP_world_commonwealth_socialism_desc: "中国把社会主义建设、技术现代化和公共生活改善结合起来，试图证明革命可以通向更有秩序的未来。"
 UP_people_victory_state: "人民万岁"
 UP_people_victory_state_desc: "革命最终回到人民生活本身。政治路线必须服务于粮食、住房、教育、工业和国家稳定。"
 UP_CHI_continue_socialist_path: "继续坚持社会主义道路"
 UP_CHI_continue_socialist_path_desc: "第一次全国代表大会之后，中国仍将以社会主义为国家建设的基本方向。"
 UP_CHI_chairman_mao: "毛泽东主席"
 UP_CHI_chairman_mao_desc: "毛泽东继续作为革命与国家路线的核心象征。"
 UP_CHI_premier_zhou: "周恩来总理"
 UP_CHI_premier_zhou_desc: "周恩来将承担更多行政、外交和经济恢复责任。"
 UP_CHI_deepen_countryside: "深入乡村"
 UP_CHI_deepen_countryside_desc: "革命必须继续深入乡村基层，巩固农民动员和地方组织。"
 UP_CHI_class_struggle_never_forgotten: "阶级斗争不能忘"
 UP_CHI_class_struggle_never_forgotten_desc: "国家必须警惕革命内部重新出现的旧势力和新特权。"
 UP_CHI_marginalize_zhou_enlai: "边缘化周恩来"
 UP_CHI_marginalize_zhou_enlai_desc: "务实行政路线被视为削弱革命锐气的危险倾向，周恩来的影响将被系统性削弱。"
 UP_CHI_restore_national_economy: "恢复国民经济"
 UP_CHI_restore_national_economy_desc: "战争和统一造成的经济断裂必须尽快修复。"
 UP_CHI_zhou_pragmatic_system: "务实的革命系统"
 UP_CHI_zhou_pragmatic_system_desc: "周恩来将以行政、外交和经济协调为核心，建立一套能让革命国家正常运转的务实系统。"
 UP_CHI_support_poor_peasants: "支援贫农"
 UP_CHI_support_poor_peasants_desc: "贫农仍然是革命政权最重要的基层支柱。"
 UP_CHI_criticize_dogmatism: "批判教条主义"
 UP_CHI_criticize_dogmatism_desc: "照搬外来理论不能解决中国现实，路线斗争必须指向具体问题。"
 UP_CHI_publicly_struggle_opposition: "公开批斗反对派"
 UP_CHI_publicly_struggle_opposition_desc: "反对派将被推到公开政治审查之下。"
 UP_CHI_criticize_empiricism: "批判经验主义"
 UP_CHI_criticize_empiricism_desc: "旧经验不能成为阻挡继续革命的借口。"
 UP_CHI_stabilize_revolutionary_gains: "稳定革命成果"
 UP_CHI_stabilize_revolutionary_gains_desc: "纠正错误路线并不意味着否定革命，而是让革命成果能够被制度保存。"
 UP_CHI_retain_technocrats: "保留技术官僚"
 UP_CHI_retain_technocrats_desc: "技术人员和专业官僚可以为工业、交通和财政恢复提供必要能力。"
 UP_CHI_unite_veteran_cadres: "团结老干部"
 UP_CHI_unite_veteran_cadres_desc: "有经验的干部仍是国家恢复秩序的重要力量。"
 UP_CHI_restore_state_administration: "恢复国家行政"
 UP_CHI_restore_state_administration_desc: "行政系统必须重新拥有稳定、清晰和可执行的权威。"
 UP_CHI_advance_land_reform_again: "土地改革再推进"
 UP_CHI_advance_land_reform_again_desc: "土地改革仍需深入到尚未完成基层重组的地区。"
 UP_CHI_rectify_peoples_army: "整顿人民军队"
 UP_CHI_rectify_peoples_army_desc: "人民军队必须服从政治路线，同时保持基本战斗力。"
 UP_CHI_first_five_year_plan_mao: "第一个五年计划"
 UP_CHI_first_five_year_plan_mao_desc: "新国家将用第一个五年计划恢复工业、基建和财政秩序。"
 UP_CHI_urban_supply_system: "城市供应体系"
 UP_CHI_urban_supply_system_desc: "城市粮食、燃料和日用品供应必须纳入稳定体系。"
 UP_CHI_reshuffle_generals: "将领大洗牌"
 UP_CHI_reshuffle_generals_desc: "军队高级指挥层将接受政治审查和重新调整。"
 UP_CHI_correct_wrong_line: "纠正错误路线"
 UP_CHI_correct_wrong_line_desc: "革命需要纠正扩大化、简单化和行政失序的倾向。"
 UP_CHI_correctly_handle_people_contradictions: "正确处理人民内部矛盾"
 UP_CHI_correctly_handle_people_contradictions_desc: "人民内部矛盾不能简单等同于敌我矛盾。"
 UP_CHI_party_self_criticism: "党内自我批评"
 UP_CHI_party_self_criticism_desc: "党内整风应当保留自我纠错机制，而不是只剩清算。"
 UP_CHI_liquidate_local_opportunism: "清算地方机会主义"
 UP_CHI_liquidate_local_opportunism_desc: "地方派系借革命名义保存私利的现象必须被清除。"
 UP_CHI_state_planning_commission: "国家计划委员会"
 UP_CHI_state_planning_commission_desc: "国家计划委员会将统一协调工业、交通和资源分配。"
 UP_CHI_heavy_industry_development: "重工业发展"
 UP_CHI_heavy_industry_development_desc: "重工业是国家独立和军事现代化的基础。"
 UP_CHI_balanced_industrial_development: "平衡发展工业"
 UP_CHI_balanced_industrial_development_desc: "工业建设必须兼顾军工、民生和长期技术能力。"
 UP_CHI_grain_purchase_and_sale: "粮食统购统销"
 UP_CHI_grain_purchase_and_sale_desc: "粮食流通体系将被中央统一组织。"
 UP_CHI_liquidate_capitalist_running_dogs: "彻底清算资本主义走狗"
 UP_CHI_liquidate_capitalist_running_dogs_desc: "国家将把阶级斗争推进到更尖锐的政治清算阶段。"
 UP_CHI_precision_strike_petty_bourgeois: "对小资实现精准打击"
 UP_CHI_precision_strike_petty_bourgeois_desc: "小资产阶级倾向将被纳入重点审查范围。"
 UP_CHI_unite_democratic_figures: "团结民主人士"
 UP_CHI_unite_democratic_figures_desc: "革命政府可以继续吸纳民主人士参与建设。"
 UP_CHI_unite_new_generation_talent: "团结新一代人才"
 UP_CHI_unite_new_generation_talent_desc: "新一代技术和行政人才将进入国家建设体系。"
 UP_CHI_people_supervise_party: "民众督促党"
 UP_CHI_people_supervise_party_desc: "群众监督将成为压迫官僚主义和路线偏差的政治工具。"
 UP_CHI_new_machine_factories: "建设新型机械厂"
 UP_CHI_new_machine_factories_desc: "机械工业将支撑装备制造和工业升级。"
 UP_CHI_civilian_industry_recovery: "民用工业恢复"
 UP_CHI_civilian_industry_recovery_desc: "民用工业恢复将改善城市供应和社会稳定。"
 UP_CHI_people_livelihood_guarantee: "人民生活保障"
 UP_CHI_people_livelihood_guarantee_desc: "社会主义建设必须最终落实到人民生活。"
 UP_CHI_restore_market_supply: "恢复市场供应"
 UP_CHI_restore_market_supply_desc: "在国家计划之外，有限恢复供应链可以缓解城市和农村压力。"
 UP_CHI_class_struggle_escalation: "阶级斗争扩大化"
 UP_CHI_class_struggle_escalation_desc: "阶级斗争将从路线争论扩大为全国政治运动。"
 UP_CHI_second_five_year_plan: "第二个五年计划"
 UP_CHI_second_five_year_plan_desc: "第二个五年计划将把国家建设带入更系统的工业化阶段。"
 UP_CHI_great_leap_forward: "大跃进"
 UP_CHI_great_leap_forward_desc: "中国将用群众动员和政治意志强行推动生产跃升。"
 UP_CHI_cultural_revolution_spark: "文化革命的火种"
 UP_CHI_cultural_revolution_spark_desc: "革命火种将被投向学校、机关和基层组织。"
 UP_CHI_big_character_posters: "大字报"
 UP_CHI_big_character_posters_desc: "大字报会把路线斗争推到墙面、街头和每一个单位。"
 UP_CHI_comprehensive_modernization: "全面现代化"
 UP_CHI_comprehensive_modernization_desc: "国家建设将转向工业、教育、科研和民生的全面现代化。"
 UP_CHI_pragmatic_revolutionary_system: "务实的革命系统"
 UP_CHI_pragmatic_revolutionary_system_desc: "革命将通过更稳定的行政、市场供应和群众监督继续存在。"
 UP_CHI_self_reliance: "自力更生"
 UP_CHI_self_reliance_desc: "中国必须依靠自己的工业、人民和政治意志建设国家。"
 UP_CHI_smash_old_order: "彻底粉碎旧秩序"
 UP_CHI_smash_old_order_desc: "旧秩序不仅要被击败，还要被从思想和组织上清除。"
 UP_CHI_bombard_headquarters: "炮打司令部"
 UP_CHI_bombard_headquarters_desc: "路线斗争将直接指向党内最高层的保守和官僚倾向。"
 UP_CHI_new_socialist_construction: "中国新社会主义建设"
 UP_CHI_new_socialist_construction_desc: "一个更现代、更稳定、更有工业能力的社会主义中国正在成形。"
 UP_CHI_people_long_live: "人民万岁"
 UP_CHI_people_long_live_desc: "革命必须回到人民生活和国家稳定。"
 UP_CHI_proletarian_continuing_revolution: "无产阶级继续革命"
 UP_CHI_proletarian_continuing_revolution_desc: "文化大革命将被纳入继续革命理论，并转化为新的国家政治遗产。"
 UP_CHI_reemploy_zhou_enlai: "重用周恩来"
 UP_CHI_reemploy_zhou_enlai_desc: "周恩来将重新承担行政、外交和经济协调职责。"
 UP_CHI_rebuild_state_council: "重建国务院"
 UP_CHI_rebuild_state_council_desc: "国务院系统将重新成为国家日常治理的核心。"
 UP_CHI_peaceful_construction: "和平建设"
 UP_CHI_peaceful_construction_desc: "国家需要一段不被路线斗争吞噬的和平建设时期。"
 UP_CHI_restore_administrative_system: "恢复行政系统"
 UP_CHI_restore_administrative_system_desc: "行政系统必须恢复流程、责任和执行力。"
 UP_CHI_restore_diplomatic_channels: "恢复外交渠道"
 UP_CHI_restore_diplomatic_channels_desc: "中国将重新打开与外部世界沟通的正式渠道。"
 UP_CHI_introduce_technical_talent: "引进技术型人才"
 UP_CHI_introduce_technical_talent_desc: "技术人才将被重新放到国家建设的关键位置。"
 UP_CHI_stable_socialist_system: "稳定的社会主义制度"
 UP_CHI_stable_socialist_system_desc: "社会主义制度需要稳定的法律、行政和经济基础。"
 UP_CHI_democratic_greater_china: "民主大中国"
 UP_CHI_democratic_greater_china_desc: "在统一国家内部，制度化参与和行政协商将成为治理工具。"
 UP_CHI_modern_judicial_system: "建立现代司法体系"
 UP_CHI_modern_judicial_system_desc: "现代司法体系将为社会秩序和经济活动提供基本保障。"
 UP_CHI_freedom_of_expression: "全面实现言论自由"
 UP_CHI_freedom_of_expression_desc: "有限而制度化的表达空间可以降低政治爆炸的风险。"
 UP_CHI_introduce_foreign_tech_companies: "引进外国科技公司"
 UP_CHI_introduce_foreign_tech_companies_desc: "外国技术公司可以帮助中国加速产业升级。"
 UP_CHI_all_for_one_one_for_all: "人人为我，我为人人"
 UP_CHI_all_for_one_one_for_all_desc: "公共生活、国家建设和个人命运将被纳入共同体叙事。"
 UP_CHI_higher_education_expansion: "全面开展高等教育"
 UP_CHI_higher_education_expansion_desc: "高等教育扩张将为工业和科研提供人才。"
 UP_CHI_raise_cultural_education: "全面提高文化教育"
 UP_CHI_raise_cultural_education_desc: "文化教育水平提升是现代国家长期稳定的基础。"
 UP_CHI_new_technology_new_life: "新科技，新生活"
 UP_CHI_new_technology_new_life_desc: "技术进步将被直接转化为民生改善和生产效率。"
 UP_CHI_world_commonwealth: "天下为公"
 UP_CHI_world_commonwealth_desc: "中国将以公共利益、技术现代化和社会主义建设作为新的国家承诺。"
 UP_CHI_mao_political_career: "毛泽东领袖生涯"
 UP_CHI_mao_political_career_desc: "毛泽东的政治生涯必须被制度化处理。"
 UP_CHI_mao_smooth_landing: "平稳落地"
 UP_CHI_mao_smooth_landing_desc: "在没有文革阴影的情况下，毛泽东可以以革命领袖的身份平稳退出日常权力中心。"
 UP_CHI_mao_balanced_judgement: "功过分明"
 UP_CHI_mao_balanced_judgement_desc: "文化大革命之后，国家必须同时承认毛泽东的革命功绩和政治灾难的代价。"
 UP_1936_BOOKMARK_NAME: "未葬之章：1936"
 UP_JAP_imperial_conference: "御前会议"
 UP_JAP_imperial_conference_desc: "远东战争的胜利没有带来安稳，反而让帝国背负漫长边境、驻军成本和财政赤字。内阁必须召集御前会议，让皇道派、统制派与海军部在天皇名义下争夺帝国战略。"
 UP_JAP_kodoha_budget: "皇道派预算"
 UP_JAP_kodoha_budget_desc: "皇道派认为远东不是泥潭，而是胜利尚未完成的前线。更多陆军预算将提高皇道派威望，并推动北进准备。"
 UP_JAP_toseiha_budget: "统制派预算"
 UP_JAP_toseiha_budget_desc: "统制派主张重新制定大陆战略，把帝国力量转向满洲与中国东北。煤、铁、粮食与铁路才是日本真正需要的东西。"
 UP_JAP_navy_budget: "海军部预算"
 UP_JAP_navy_budget_desc: "海军部认为帝国的经济命脉不在冻土，而在南洋的石油、橡胶与海上交通线。舰队必须获得预算。"
 UP_JAP_fiscal_compromise: "财政妥协"
 UP_JAP_fiscal_compromise_desc: "内阁与财界要求各派暂时收敛。帝国可以扩张，但国库不能永远替所有野心买单。"
 UP_japan_imperial_conference_decisions: "御前会议"
 UP_JAP_imperial_conference_status: "御前会议状态"
 UP_JAP_imperial_conference_status_desc: "御前会议正在决定帝国战略。皇道派、统制派与海军部的威望会影响当前主导派系。"
