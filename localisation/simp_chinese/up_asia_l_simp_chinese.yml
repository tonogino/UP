 UP_1936_BOOKMARK_DESC: "十月革命失败、俄国瓦解、德国取得东线优势而陷入东欧泥潭。亚洲方面，中国革命在缺少苏联支援的情况下独立胜利，日本提前进入远东并承担过度扩张的代价，印度则在英帝国撤退后分裂为红黑两极。"
 UP_CHI_BOOKMARK_DESC: "南京革命政府控制中国核心地区，但重庆残余政权、满洲、西藏、新疆和其他地方势力仍未完全归顺。统一战争、路线斗争与毛泽东政治机制将决定中国未来。"
 UP_JAP_BOOKMARK_DESC: "日本在远东扩张中取得巨大地缘收益，也背负了财政、驻军、陆海军对立和满洲失控的压力。帝国可以北进、南进、收缩，或被青年军官推向极端路线。"
 UP_MAN_BOOKMARK_DESC: "满洲保皇派曾是日本扶植的缓冲傀儡，如今在东京内耗与关东军失控之间寻找独立空间。哈尔滨宣言将决定满洲是否能脱离日本控制。"
 UP_GER_BOOKMARK_DESC: "德国没有走向原版时间线的失败，而是在东线胜利后建立东欧保护体系。这个帝国既强大又沉重，保守改革、激进民族主义、工人革命和中欧霸权都可能改变欧洲。"
 UP_ENG_BOOKMARK_DESC: "英国没有在一战初期立刻卷入大陆战争，如今更像离岸仲裁者。它保有海权和金融影响力，但必须面对德国大陆优势、亚洲动荡和帝国边缘的松动。"
 UP_FRA_BOOKMARK_DESC: "法国没有被速败，却在德国东线胜利后长期承受羞辱和安全焦虑。莱茵、阿尔萨斯洛林和德国霸权让复仇主义成为法国政治绕不开的核心。"
 UP_ITA_BOOKMARK_DESC: "意大利仍在欧洲均势中寻找机会。德国的半胜利、奥匈的延续和地中海秩序的不稳定，都为罗马提供了危险的选择空间。"
 UP_TUR_BOOKMARK_DESC: "奥斯曼帝国仍未完全退场，但它面对的是民族问题、阿拉伯地区治理压力和列强重新分配中东影响力的现实。"
 UP_PET_BOOKMARK_DESC: "彼得格勒共和国是俄国崩溃后的继承者之一，控制北方与旧首都周边。它缺少统一俄国的力量，却保有政治合法性的残影。"
 UP_SIB_BOOKMARK_DESC: "西伯利亚共和国控制广阔内陆，却被铁路、补给和地方势力拖住。俄国继承战争的未来很大程度上取决于它能否把空间变成国家能力。"
 UP_CAU_BOOKMARK_DESC: "高加索联盟在俄国崩溃后维持脆弱联合。民族、能源、山地防线和外部势力让这里成为欧亚之间的火药桶。"
 UP_FEA_BOOKMARK_DESC: "远东残余政权夹在日本、满洲和西伯利亚之间。它拥有战略港口和边疆资源，却随时可能成为北进与反北进斗争的牺牲品。"
 UP_CKG_BOOKMARK_DESC: "重庆国民政府保存了旧国民政府残余和西南地方势力。南京革命政府若要完成统一，重庆问题必然被推上日程。"
 UP_RIN_BOOKMARK_DESC: "红色印度主张工农革命、反种姓与反帝国主义。它拥有强烈动员能力，也面对行政、军官和工业基础不足的现实。"
 UP_BIN_BOOKMARK_DESC: "黑色印度以等级秩序、宗教威权和强力安全机器维持统治。它稳定而压抑，并可能与日本、英国残余或欧洲势力进行交易。"
 up_asia.365.t: "文化大革命终止"
 up_asia.365.d: "中央宣布全国性政治运动结束。群众组织被整编，学校和工厂逐步恢复秩序，军队撤出部分行政岗位。但伤口没有消失，被打倒的干部、断裂的教育和停摆的生产都会继续影响中国。"
 up_asia.365.a: "至少风暴停下了。"
 up_asia.366.t: "继续革命被制度化"
 up_asia.366.d: "文化大革命没有被简单否定，而是被重新解释为无产阶级继续革命的历史经验。最混乱的阶段结束了，但路线斗争、群众监督和政治审查被保留下来，成为新制度的一部分。"
 up_asia.366.a: "革命仍要继续。"
 up_asia.370.t: "周恩来重新掌权"
 up_asia.370.d: "周恩来重新获得处理行政、外交和经济事务的权力。各部委开始恢复例行会议，外交渠道被重新整理，经济系统也获得了更稳定的协调者。"
 up_asia.370.a: "让他收拾局面。"
 up_asia.371.t: "周恩来被边缘化"
 up_asia.371.d: "周恩来被逐步排除出核心决策圈。他的行政网络被拆散，支持务实路线的干部被迫后退。国家短期内获得了更高的政治一致性，也失去了一位重要的平衡者。"
 up_asia.371.a: "路线必须纯粹。"
 up_asia.372.t: "毛泽东平稳退居幕后"
 up_asia.372.d: "毛泽东保留革命领袖的历史地位，但日常治理逐步交给更制度化的行政体系。权力转移没有引发全国风暴，中国获得了一次难得的平稳过渡。"
 up_asia.372.a: "这是最温和的结局。"
 up_asia.373.t: "功过分明"
 up_asia.373.d: "中央决定对毛泽东的政治遗产作出更复杂的结论：他的革命功绩不可否认，文化大革命造成的破坏也不能再被遮掩。这个判断不会让所有人满意，但它为国家继续前进留下了空间。"
 up_asia.373.a: "历史必须被说清。"
 up_asia.374.t: "人民万岁"
 up_asia.374.d: "国家宣布革命的最终目的不是无休止的清算，而是人民生活、社会秩序和国家建设。政治运动退潮后，粮食、教育、工业和行政重新成为政府工作的中心。"
 up_asia.374.a: "把国家还给日常生活。"
 up_asia.375.t: "无产阶级继续革命"
 up_asia.375.d: "中央没有否定文化大革命，而是将其转化为继续革命的制度遗产。群众监督、干部审查和路线斗争被重新约束，却仍然保留在国家政治结构内部。"
 up_asia.375.a: "革命不是一次完成的。"
 up_asia.376.t: "天下为公"
 up_asia.376.d: "中国选择以公共利益、技术现代化、教育扩张和社会保障来证明革命的未来。经历统一和政治危机后，国家终于把重心重新转向建设。"
 up_asia.376.a: "天下为公。"
 up_asia.377.t: "南京请求德国军事援助"
 up_asia.377.d: "南京的新军事集团向柏林提出采购与援助请求，希望获得步枪、火炮、支援装备和少量技术顾问。对德国而言，这既是影响中国局势的机会，也可能刺激英国、日本和其他亚洲势力。"
 up_asia.377.a: "批准有限援助。"
 up_asia.377.b: "德国不能被拖入中国问题。"
 up_asia.378.t: "南京请求日本军事援助"
 up_asia.378.d: "南京的军官集团向东京发出试探，希望以政治承认和安全合作换取一批武器装备。日本政府必须决定，是利用这个机会影响中国新政权，还是保持距离。"
 up_asia.378.a: "向南京提供装备。"
 up_asia.378.b: "这不是日本该冒的风险。"
 UP_JAP_imperial_overload: "帝国过载"
 UP_JAP_imperial_overload_desc: "远东战争带来了辽阔的边境，却没有带来充盈的国库。日本获得了铁路、港口、冻土、白军、哥萨克和无尽的驻军账单。帝国不是没有胜利，而是胜利得太贵了。"
 UP_JAP_imperial_conference_spirit: "御前会议"
 UP_JAP_imperial_conference_spirit_desc: "内阁已经无法独自决定帝国方向。皇道派要求第二次北进，统制派要求满洲战略，海军部要求南洋预算。天皇授权建立御前会议，让三方在帝国名义下共同决策。"
 UP_JAP_far_eastern_security_war: "远东治安战"
 UP_JAP_far_eastern_security_war_desc: "远东并没有真正臣服。白军、地方军阀、商团、哥萨克和铁路匪帮仍然存在。日本军队每天都在赢得小规模胜利，但每一场胜利都在消耗国库。"
 UP_JAP_zaibatsu_creditors: "财阀债权"
 UP_JAP_zaibatsu_creditors_desc: "帝国扩张需要金钱，而金钱掌握在财阀手中。三井、三菱、住友、安田愿意支持国家，但他们绝不会免费支持国家。"
 UP_JAP_fiscal_plenty: "财政宽裕"
 UP_JAP_fiscal_plenty_desc: "帝国财政仍有周转空间。预算争论仍在继续，但至少东京还能支付自己的胜利。"
 UP_JAP_fiscal_controlled_deficit: "可控赤字"
 UP_JAP_fiscal_controlled_deficit_desc: "赤字已经成为常态，但尚未压垮国家机器。内阁仍然相信下一次借款、下一次预算调整或下一次胜利可以解决问题。"
 UP_JAP_fiscal_tension: "财政紧张"
 UP_JAP_fiscal_tension_desc: "远东驻军、海军预算和满洲计划正在同时争夺国库。财政紧张已经开始影响工厂、内阁和军队耐心。"
 UP_JAP_fiscal_crisis: "赤字危机"
 UP_JAP_fiscal_crisis_desc: "账本上的数字已经无法靠措辞遮掩。财阀要求保证，军部要求预算，文官要求削减开支，而所有人都声称自己才是帝国未来。"
 UP_JAP_fiscal_collapse: "财政崩溃"
 UP_JAP_fiscal_collapse_desc: "东京的国库正在失去支付能力。帝国扩张、远东治安战、舰队预算和大陆野心共同逼近了国家财政的极限。"
 UP_JAP_imperial_construction_bonds: "帝国建设债券"
 UP_JAP_imperial_construction_bonds_desc: "政府向财阀和国民发行帝国建设债券，以维持远东、满洲和海军预算。但所有借来的钱，最后都要偿还。"
 UP_JAP_expanded_zaibatsu_credit: "财阀债权扩大"
 UP_JAP_expanded_zaibatsu_credit_desc: "财阀继续为帝国扩张提供资金，也因此在铁路、矿山、港口和军需合同中获得更深的影响力。"
 UP_JAP_manchurian_border_intelligence: "满洲边境情报"
 UP_JAP_manchurian_border_intelligence_desc: "满洲的铁路、工厂、兵站和地方派系被重新列入参谋本部档案。东京正在为可能到来的大陆行动收集筹码。"
 UP_JAP_zaibatsu_controlled_economy: "财阀控制经济"
 UP_JAP_zaibatsu_controlled_economy_desc: "强制借款没有打垮财阀，反而让他们用合同、债券和供应链插进国家经济的骨缝。"
 UP_JAP_naval_budget_frozen: "南洋舰队预算冻结"
 UP_JAP_naval_budget_frozen_desc: "为了阻止财政崩溃，内阁冻结了部分海军扩张预算。海军部把这视为对帝国未来的背叛。"
 UP_JAP_zaibatsu_terms_accepted: "接受财阀条件"
 UP_JAP_zaibatsu_terms_accepted_desc: "内阁接受了财阀提出的合同和特权要求。国库暂时获得喘息，代价是经济主权被进一步抵押。"
 UP_JAP_zaibatsu_terms_refused: "拒绝财阀勒索"
 UP_JAP_zaibatsu_terms_refused_desc: "政府拒绝让财阀用国债绑架国家，但市场信心和建设投资随之降温。"
 UP_JAP_state_economic_control_committee: "国家经济统制委员会"
 UP_JAP_state_economic_control_committee_desc: "统制派推动国家直接协调资金、合同与军需生产。财阀仍然重要，但不能再单方面开价。"
 UP_JAP_far_east_officer_exile: "远东军官放逐"
 UP_JAP_far_east_officer_exile_desc: "一批激进青年军官被送往远东前线。东京少了几份请愿书，远东多了几支愿意开枪的巡逻队。"
 UP_JAP_convene_imperial_conference: "召开御前会议"
 UP_JAP_convene_imperial_conference_desc: "帝国不能再依靠临时妥协维持统治。远东、满洲、南洋、财政、军费和殖民地治安，所有问题都必须被摆上御前会议的桌面。"
 UP_JAP_audit_far_eastern_army_costs: "审计远东军费"
 UP_JAP_audit_far_eastern_army_costs_desc: "远东胜利的账单终于被送进东京。铁路、港口、驻军、矿山、粮食和镇压行动，每一项都比最初承诺的更加昂贵。"
 UP_JAP_manchurian_resource_survey: "满洲资源调查"
 UP_JAP_manchurian_resource_survey_desc: "满洲拥有日本真正需要的一切。煤、铁、粮食、铁路、工厂和人口。东京开始意识到，六年前放弃满洲或许是帝国最大的战略错误。"
 UP_JAP_southern_lifeline: "南洋生命线"
 UP_JAP_southern_lifeline_desc: "如果日本想成为真正的大国，就不能被困在冻土和铁路之间。海军部认为，南洋资源才是帝国的生命线。"
 UP_JAP_heirs_of_northern_victory: "北方胜利的继承者"
 UP_JAP_heirs_of_northern_victory_desc: "皇道派拒绝承认远东是一场战略错误。他们认为日本已经站在胜利门口，只要继续前进，整个西伯利亚都会向天皇臣服。"
 UP_JAP_imperial_strategy_ruling: "帝国战略裁决"
 UP_JAP_imperial_strategy_ruling_desc: "御前会议必须把争吵转化为战略。皇道派、统制派和海军部都声称自己能拯救帝国，但国库不可能同时支付所有人的未来。"
 UP_JAP_route_kodoha_tt: "§Y皇道派§!将在后续国策中主导帝国战略。"
 UP_JAP_route_toseiha_tt: "§Y统制派§!将在后续国策中主导帝国战略。"
 UP_JAP_route_navy_tt: "§Y海军部§!将在后续国策中主导帝国战略。"
 UP_JAP_route_showa_integration_tt: "§Y昭和统合路线§!将在后续国策中开启。"
 UP_JAP_kodoha_prestige_65_required_tt: "§Y皇道派威望§!至少达到§Y65§!（当前：[?UP_JAP_kodoha_prestige|0]）。"
 UP_JAP_toseiha_prestige_65_required_tt: "§Y统制派威望§!至少达到§Y65§!（当前：[?UP_JAP_toseiha_prestige|0]）。"
 UP_JAP_navy_prestige_65_required_tt: "§Y海军部威望§!至少达到§Y65§!（当前：[?UP_JAP_navy_prestige|0]）。"
 UP_JAP_kodoha_prestige_minus_5_tt: "皇道派威望：§R-5§!"
 UP_JAP_kodoha_prestige_minus_10_tt: "皇道派威望：§R-10§!"
 UP_JAP_kodoha_prestige_minus_20_tt: "皇道派威望：§R-20§!"
 UP_JAP_toseiha_prestige_minus_5_tt: "统制派威望：§R-5§!"
 UP_JAP_toseiha_prestige_minus_10_tt: "统制派威望：§R-10§!"
 UP_JAP_toseiha_prestige_minus_20_tt: "统制派威望：§R-20§!"
 UP_JAP_navy_prestige_minus_5_tt: "海军部威望：§R-5§!"
 UP_JAP_navy_prestige_minus_10_tt: "海军部威望：§R-10§!"
 UP_JAP_navy_prestige_minus_20_tt: "海军部威望：§R-20§!"
 UP_JAP_fiscal_pressure_plus_10_tt: "财政压力：§R+10§!"
